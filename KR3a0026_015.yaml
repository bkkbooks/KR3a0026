body:
  text: 張子全書卷十五附録程子曰訂頑之言極純無雜秦漢以來學者所未到訂頑一篇意極完備乃仁之體也學者其體此意令有諸已其地位已高到此地位自别有見處不可窮高極遠恐於道無補也訂頑立心便可達天德學者須先識仁仁者渾然與物同體義禮知信皆仁也識得此理以誠敬存之而已不須防檢不須窮索若心懈則有防心若不懈何防之有理有未得故須窮索存久自明安待窮索此道與物無對大不足以名之天地之用皆我之用孟子言萬物皆備於我須反身而誠乃為大樂若反身未誠則猶是二物有對以已合彼終未有之又安得樂訂頑意思乃備言此體以此意存之更有何事必有事焉而勿正心勿忘勿助長未嘗致纎毫之力此其存之之道若存得便合有得蓋良知良能元不喪失以昔日習心未除卻須存養此心久則可奪舊習此理至約惟患不能守既能體之而樂亦不患不能守也西銘某得此意只是須得子厚如此筆力他人無緣做得孟子以後未有人及此得此文字省多少言語要之仁孝之理備乎此須臾而不於此則便不仁不孝也遊酢於西銘讀之已能不逆於心言語外立得箇意思便能道中庸矣孟子之後只有原道一篇其間言語固多病然大要儘近理若西銘則是原道之宗祖也原道卻只説道元未到西銘意思據子厚之文醇然無出此文也自孟子後蓋未見此書問西銘如何曰此橫渠文之粹者也曰充得盡時如何曰聖人也橫渠能充盡否曰言有兩端有有德之言有造道之言有德之言説自已事如聖人言聖人事也造道之言則知足以知此如賢人説聖人事也橫渠道儘高言儘醇自孟子後儒者都無他見識西銘明理一而分殊𢎞而不毅則難立毅而不𢎞則無以居之西銘言𢎞之道觀張子厚所作西銘能養浩然之氣者也以上見性理子厚高才其學更先從雜博中過來張子厚聞生皇子喜甚見餓莩者食便不美明正叔謂某接人治經論道者亦甚多肯言及治體者誠未有如子厚子厚以禮教學者最善使學者先有所據守問橫渠言由明以至誠由誠以至明此言恐過當曰由明以至誠此句卻是由誠以至明則不然誠即明也孟子曰我知言我善養吾浩然之氣只我知言一句已盡橫渠之言不能無失類若此若西銘一篇誰説得到此今以管窺天固是見北斗别處雖不得見然見北斗不可謂不是也正問橫渠之書有迫切處否曰子厚謹嚴才謹嚴便有迫切氣象無寬舒之氣立清虛一大為萬物之源恐未安須兼清濁虛實乃可言神道體物不遺不應有方所橫渠教人本只是謂世學膠固故説一箇清虛一大只圖得人稍損得沒去就道理來然而人又更别走今日且只道敬伯淳嘗與子厚在興國寺曾講論終日而曰不知舊日曾有甚人於此處講此事子厚言關中學者用禮漸成俗正叔言自是關中人剛徑敢為子厚言亦是自家規矩寬大關中學者以今日觀之師死而遂倍之卻未見其人只是更不復講張子厚罷太常禮院歸關中過洛而見程子子曰比太常禮院所議可得聞乎子厚曰大事皆為禮房檢正所奪所議惟小事爾子曰小事謂何子厚曰如定諡及龍女衣冠子曰龍女衣冠如何子厚曰當依夫人品秩蓋龍女本封善濟夫人子曰某則不然既曰龍則不當被人衣冠矧大河之塞本上天降祐宗廟之靈朝廷之德而吏士之勞也龍何功之有又聞龍有五十三廟皆曰三娘子一龍邪五十三龍邪一龍則不當有五十三廟五十三龍則不應盡為三娘子也子厚默然正子厚言今日之往來俱無益不如間居與學者講論資養後生卻成得事正叔言何必然義當來則來當往則往爾子厚謂程卿夙興幹事良由人氣清則勤間不得正叔謂不可若此則是專為氣所使子厚謂此則自然也伯淳言雖然且欲凡事皆不恤以恬養則好闕此義在學者也闕氣使可知人先生亦安可言闕橫渠常以此觀人未嘗不中然某不與他如此後來其弟戩亦學他如此觀人皆不中此安可學人物自是人才有通悟處學不得也張子厚善鑒裁其弟天祺學之便錯以上見程氏遺書橫渠昔在京師坐虎皮説周易聽從甚衆一夕二程先生至論易次日橫渠撤去虎皮曰吾平日為諸公説者皆亂道有二程近到深明易道吾所弗及汝輩可師之逐日虎皮出是日更不出虎皮也橫渠乃歸陜西張橫渠著正蒙時處處置筆硯得意即書伯淳云子厚卻如此不熟張子正蒙云冰之融釋海不得而與焉伊川改與為有橫渠學堂雙牖右書訂頑左書砭愚伊川曰是起爭端改之曰東銘西銘橫渠嘗言吾十五年學箇恭而安不成明道曰可知是學不成有多少病在神宗問明道以張載邢恕之學奏云張載臣所畏邢恕從臣遊呂與叔作橫渠行狀有見二程盡棄其學之語尹子言之先生曰表叔平生議論謂頥兄弟有同處則可若謂學於頤兄弟則無是事頃年屬與叔刪去不謂尚存斯言幾於無忌憚按行狀今有兩本一本云盡棄其學而學焉一本云於是盡棄異學淳如也恐是後來所改以上見程氏外書橫渠言氣自是橫渠作用立標以明道楊時致書伊川先生曰西銘言體而不及用恐其流遂至于兼愛先生答之曰橫渠立言誠有過者乃在正蒙西銘之為書推理以存義擴前聖所未發與孟子性善養氣之論同功豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分子比而同之過矣且謂言體而不及用彼欲使人推而行之本為用也反謂不及不亦異乎見程氏文集下同伊川先生答先生書曰觀吾叔之見志正而謹嚴如虛空即氣則無無之語深探遠賾豈後世學者所嘗慮及也然此語未能無過餘所論以大槩氣象言之則有苦心極力之象而無寬裕溫厚一作和之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之明所照者如目所覩纎微盡識之矣考索至者如揣料於物約見髣佛耳能無差乎更望完養思慮涵泳義理他日當自條暢橫渠教人以禮為先大要欲得正容謹節其意謂世人汗漫無守便當以禮為地教他就上面做工夫然其門人下稍頭溺於刑名度數之間行得來困無所見處如喫木扎相似更沒滋味遂生厭倦故其學無傳之者明道先生則不然先使學者有知識窮得物理卻從敬上涵養出來自然是别上蔡語朱子曰西銘前一段如棊盤後一段如人下棋西銘一篇首三句似人破義題天地之帥之塞兩句恰似做原題乃一篇緊要處民吾同胞至顚連而無告者也乃統論如此於時保之以下是做工夫處西銘有箇直劈下底道理又有箇橫截斷底道理問西銘仁孝之理曰他不是説孝是將這孝來形容這仁事親底道理便是事天底樣子西銘之書指吾體性之所自來以明父乾母坤之實極樂天踐形窮神知化之妙以至於無一行之不慊而沒身焉故伊川先生以為充得盡時便是聖人恐非專為始學者一時所見而發也橫渠之意直借此以明彼以見天地之間隨大隨小此理未嘗不同耳其言則固為學者而設若大賢以上又豈須説耶伊川嘗言若是聖人則乾坤二卦亦不消得正謂此也所論西銘名虛而理實此語甚善名雖假借然其理則未嘗有少異也若本無此理則又如之何而可強假耶橫渠西銘初看有許多節卻似狹充其量是甚麼樣大合下便有箇乾健坤順意思自家身已便如此形體便是這箇物事性便是這箇物事同胞是如此吾與是如此主腦便是如此尊高年所以長其長慈孤弱所以幼其幼又是做工夫處後面節節如此於時保之子之翼也樂且不憂純乎孝者也其品節次第又如此橫渠説這般話體用兼備豈似他人只説得一邊問自其節目言之便是各正性命充其量而言之便是流行不息曰然又語林夔孫曰公既久在此可將一件文字與衆人共理會夔孫請所看文字曰且將西銘看及看畢夔孫依先生所解説過先生曰而今解得分曉了便易看又曰橫渠云吾學既得於心則修其辭命辭無差然後斷事斷事無失吾乃沛然看來理會道理須是説得出一字不穩便無下落所以橫渠中夜便筆之於紙只要有下落而今理會得有下落底臨事尚腳忙手亂况不曾理會得下落橫渠如此若論道理他卻未熟然他地位卻要如此高明底則不必如此橫渠之學是苦心得之乃是致曲與伊川異以孔子為非生知渠蓋執好古敏以求之故有此説不知好古敏以求之非孔子做不得又曰橫渠教人道夜間自不合睡只為無可應接他人皆睡了已不得不睡他做正蒙時或夜裏默坐徹曉他直是恁地勇方做得因舉曾子任重道遠一段曰子思曾子直恁地方被他打得透問程張之門於六經多指説道之精微學之要領與夫下手處雖甚精切易見然被他開了四至便覺規模狹了曰橫渠最親切程氏規模廣大學者少有能如橫渠輩用功者近看得橫渠用工最親切直是可畏問橫渠似孟子否曰橫渠嚴密孟子宏闊又問孟子平正橫渠高處太高僻處太僻曰是又曰橫渠之於程子猶伯夷伊尹之於孔子或云諸先生説話皆不及小程先生雖大程亦不及曰不然明道説話儘高邵張説得端的處儘好且如伊川説仁者天下之公善之本也大段寬而不切如橫渠説心統性情這般所在説得的當又如伊川謂鬼神者造化之迹卻不如橫渠所謂二氣之良能也明道之學從容涵泳之味洽橫渠之學苦心力索之功深曾子剛毅立得牆壁在而後可傳之子思孟子伊川橫渠甚嚴遊楊之門倒塌了若天資大段高則學明道若不及明道則且學伊川橫渠贊先生像曰早悅孫吳晚逃佛老勇撤臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居和靖尹氏曰見伊川後半年方得大學西銘看人本與天地一般大只為人自小了若能自處以天地之心為心便是與天地同體西銘備載此意顔子克己便是能盡此道龜山楊氏曰西銘只是發明一箇事天底道理所謂事天者循天理而已西銘會古人用心要處為文正如杜順作法界觀樣西銘只是要學者求仁而已南軒張氏曰西銘謂以乾為父坤為母有生之類無不皆然所謂理一也而人物之生血脈之屬各親其親各子其子則其分亦安得而不殊哉是則然矣然即其理一之中乾則為父坤則為母民則為同胞物則為吾與若此之類分固未嘗不具焉龜山所謂用未嘗離體者蓋有見於此也似更須説破耳人之有是身也則易以私私則失其正理矣西銘之作唯患夫私勝之流也故推明理之一以示人理則一而其分森然自不可易惟識夫理一乃見其分之殊明其分殊則所謂理之一者斯周流而無敝矣此仁義之道所以常相須也學者存此意涵泳體察求仁之要也天地位而萬物散殊其親疏皆有一定之勢然不知理一則私意將勝而其流敝將至於不相管攝而害夫仁故西銘因其分之立而明其理之本一所謂以止私勝之流仁之方也雖推其理之一而其分森然者自不可亂義蓋所以存也大抵儒者之道為仁之至義之盡者仁立則義存義精而後仁之體為無敝也如以民為同胞謂尊高年為老其老慈孤弱為幼其幼是推其理一而其分殊固自在也故曰分立而推理一以止私勝之流仁之方也若龜山以無事乎推為理一且引聖人老者安之少者懷之為説恐未知西銘推理一之指也雙峰饒氏曰西銘一書規模宏大而條理精密有非片言之所能盡然其大指不過中分為兩節前一節明人為天地之子後一節言人事天地當如子之事父母何謂人為天地之子蓋人受天地之氣以生而有是性猶子受父母之氣以生而有是身父母之氣即天地之氣也分而言之人各一父母也合而言之舉天下同一父母也人知父母之為父母而不知天地之為大父母故以人而視天地常漠然與己如不相關人於天地既漠然如不相關則其所存所發宜乎無適而非已私而欲其順天理遏人欲以全天地賦豫之本然亦難矣此西銘之作所以首因人之良知而推廣之言天以至健而始萬物則父之道也地以至順而成萬物則母之道也吾以藐然之身生於其間稟天地之氣以為形而懷天地之理以為性豈非子之道乎其下繼之以民吾同胞物吾黨與而同胞之中復推其大君者為宗子大臣者為宗子之家相高年者為兄孤弱者為弟聖者為兄弟之合德乎父母賢者為兄弟之秀出乎等夷疲癃殘疾惸獨鰥寡者為兄弟之顚連而無告者則皆所以著夫並生天地之間而與我同類者雖有貴賤貧富長幼賢愚之不齊而均之為天地之子也知並生天地之間而與我同類者均之為天地之子則天地為吾之父母也豈不昭昭矣乎故曰前一節明人為天地之子何謂人事天地當如子之事父母蓋子受父母之氣以生則子之身即父母之身人受天地之氣以生則人之性亦即天地之性子之身即父母之身故事親者不可不知所以保愛其身人之性即天地之性則事天者亦豈可不知所以保養其性邪此西銘之作所以既明人為天地之子而復因事親之孝以明事天之道也樂天者不思不勉而順行乎此性猶人子愛親之純而能愛其身者也畏天者戰戰兢兢以保持乎此性猶人子敬親之至而能敬其身者也若夫循私以違乎理縱欲以害其仁無能改於氣稟之惡而復增益之則是反此性而為天地悖德賊親不才之子矣盡此性而能踐其形者其惟天地克肖之子乎窮神知化樂天踐形者之事也存心養性而不愧屋漏畏天以求踐乎形者之事也以此修身則為顧養以此及人則為錫類以此處常而盡其道則為底豫為歸全以此處變而不失其道則為待烹為順令愛惡逆順處之若一生順死安兩無所憾事親而至於是則可以為孝子事天而至於是豈不可以為仁人乎故曰後一節言人之事天地當如子之事父母此篇之指大略如此朱夫子所謂推親親之厚以大無我之公因事親之誠以明事天之道亦此意也嗚呼繼志述事孝子之所以事親也存心養性君子之所以事天也事親事天雖若兩事然事親者即所以為事天之推而善事天者乃所以為善事其親者也臨川吳氏曰天地者吾之父母也父母者吾之天地也天即父父即天地即母母即地人事天地當如事父母子事父母當如事天地保者持守此理而不敢違賢人也樂者從容順理而自然中聖人也蓋是理即天地之理而天地即吾之父母也持守而不敢違吾父母之理非子之翼敬者乎從容而自然順吾父母之理非孝之極純者乎不愛其親而愛他人者謂之悖德天理者父母所以與我者也而乃違之是不愛其親也賊仁者謂之賊仁者父母所以與我之心德也而乃害之是戕其親也世濟其惡增其惡名則是父母之不才子矣若能踐其所以得五行秀為萬物靈者之形則是與天地相似而克肖乎父母矣知者聖人踐形惟肖有以默契乎是理非但聞見之知也化則天地化育之事乾道變化發育萬物各正性命者知得天地化育之事則吾亦能為天地之事是善述吾父母所為之事矣窮者聖人窮理盡性有以究極乎是理而知之無不盡也神則天地神妙之心維天之命至誠無息於穆不已者窮得天地神妙之心則吾亦能心天地之心是善繼吾父母所存之志矣此造聖之終事踐形惟肖者之盛德所謂樂且不憂純之孝者也不愧屋漏者已私克盡心自然存性得其養雖於屋漏之奧尚無愧怍之事夫其無愧於天則是無忝辱所生之父母也存心養性者用力克己惕然惟恐有愧於天操而不舍其主於身之心順而不害其具於心之理存心養性所以事天夫其不怠於存養此天理則是不懈怠於事父母也此作聖之始事學踐形惟肖者之工夫所謂於時保之子之翼也然知化者必能窮神窮神然後能知化不愧屋漏者必能存心養性存心養性然後能不愧屋漏善述事者必能繼志善繼志者然後能述事無忝者必能匪懈匪懈然後能無忝存心養性然後有以不愧屋漏不愧屋漏然後可以至於窮神窮神然後有以知化匪懈然後有以無忝無忝然後可以至於善繼志善繼志者然後可以善述事也遊氏曰子厚學成德尊與孟子比然猶祕其學明道曰處今之時當隨其資教之雖識有明暗亦各有得焉子厚用其言故關中學者躬行之多與洛人並呂晦叔薦先生于朝曰張載學有本源西方之學者皆宗之神宗即命召見問治道皆以復三代為對他日見執政執政語之曰新政之更懼不能任事求助于子何如先生曰朝廷將大有為天下士願與下風若與人為善則孰敢不盡如教玉人追琢則人亦故有不能執政默然以上見性理邵氏聞見録曰橫渠再移疾西歸過洛見二程先生曰載病不起尚可及長安也行至臨潼沭浴更衣而寢及旦視之亡矣門生衰絰挽車以葬行狀呂大臨先生諱載字子厚世大粱人曾祖某生唐末歷五代不仕以子貴贈禮部侍郎祖復仕真宗朝為給事中集賢院學士贈司空父迪仕仁宗朝終於殿中丞知涪州事贈尚書都官郎中涪州卒于西官諸孤皆幼不克歸僑寓於鳯翔郿縣橫渠鎮之南大振谷口因徙而家焉先生嘉祐二年登進士第始仕祁州司法參軍遷丹州雲巖縣令又遷著作佐郎簽書渭州軍判官公事熙寧二年冬被召入對除崇文院校書明年移疾十年春復召還館同知太常禮院是年冬謁告西歸十有二月乙亥行次臨潼卒于館舍享年五十有八是月以其喪歸殯於家卜以元豐元年八月癸酉葬于涪州墓南之兆先生娶南陽郭氏有子曰因尚幼先生始就外傅志氣不羣知虔奉父命守不可奪涪州器之少孤自立無所不學與邠人焦寅遊寅喜談兵先生説其言當康定用兵時年十八慨然以功名自許上書謁范文正公公一見知其逺器欲成就之乃責之曰儒者自有名教何事于兵因勸讀中庸先生讀其書雖愛之猶未以為足也於是又訪諸釋老之書纍年盡究其説知無所得反而求之六經嘉祐初見洛陽程伯淳正叔昆弟于京師共語道學之要先生渙然自信曰吾道自足何事旁求乃盡棄異學淳如也間起從仕日益久學益明方未第時文潞公以故相判長安聞先生名行之美聘以束帛延之學宮異其禮際士子矜式焉其在雲巖政事大抵以敦本善俗為先每以月吉具酒食召鄉人高年會于縣庭親為勸酬使人知養老事長之義因問民疾苦及告所以訓戒子弟之意有所告教常患文檄之出不能盡達于民每召鄉長于庭諄諄口諭使往告其閭里間有民因事至庭或行遇于道必問某時命某告某事聞否聞即已否則罪其受命者故一言之出雖愚夫孺子無不預聞知京兆王公樂道嘗延致郡學先生多教人以德從容語學者曰孰能少置意科舉相從于堯舜之域否學者聞法語亦多有從之者在渭渭帥蔡公子正特所尊禮軍府之政小大咨之先生夙夜從事所以贊助之力為多並塞之民常苦乏食而貸于官帑不能足又屬霜旱先生力言于府取軍儲數十萬以救之又言戍兵徒往來不可為用不若損數以募土人為便上嗣位之二年登用大臣思有變更御史中丞呂晦叔薦先生于朝曰張載學有本原四方之學者皆宗之可以召對訪問上即命召既入見上問治道皆以漸復三代為對上説之曰卿宜日見二府議事朕且將大用卿先生謝曰臣自外官赴召未測朝廷新政所安願徐觀旬月繼有所獻上然之他日見執政執政嘗語曰新政之更懼不能任事求助于子何如先生對曰朝廷將大有為天下之士願與下風若與人為善則孰敢不盡如教玉人追琢則人亦故有不能執政默然所語多不合寖不悅既命校書崇文先生辭未得謝復命案獄浙東或有為之言曰張載以道德進不宜使之治獄執政曰淑問如臯陶猶且獻囚此庸何傷獄成還朝會弟天祺以言得罪先生益不安乃謁告西歸居于橫渠故居遂移疾不起橫渠至僻陋有田數百畝以供歲計約而不足人不堪其憂而先生處之益安終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須臾息亦未嘗須臾忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後己聞者莫不動心有進又以為教之必能養之然後信故雖貧門人之無資者雖糲蔬亦共之其自得之者窮神化一天人立大本斥異學自孟子以來未之有也嘗謂門人曰吾學既得于心則修其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已矣近世喪祭無法喪惟致隆三年自期以下未始有衰麻之變祭先之禮一用流俗節序燕褻不嚴先生繼遭期功之喪始治喪服輕重如禮家祭始行四時之薦必盡誠潔聞者始或疑笑終乃信而從之一變從古者甚衆皆先生倡之先生氣質剛毅德盛貌嚴然與人居久而日親其治家接物大要正己以感人人未之信反躬自治不以語人雖有未諭安行而無悔故識與不識聞風而畏非其義也不敢以一毫及之其家童子必使灑掃應對給侍長者女子之未嫁者必使親祭祀納酒漿皆所以養孫弟就成德嘗曰事親奉祭豈可使人為之聞人之善喜見顔色答問學者雖多不倦有不能者未嘗不開其端其所至必訪人才有可語者必丁寧以誨之惟恐其成就之晚歲適大歉至人相食家人惡米不鑿將舂之先生亟止之曰飢殍盈野雖蔬食且自愧又安忍有擇乎甚或咨嗟對案不食者數四熙寧九年秋先生感異夢忽以書屬門人乃集所立言謂之正蒙出示門人曰此書于歷年致思之所得其言殆于前聖合與大要發端示人而已其觸類廣之則吾將有待于學者正如老木之株枝别固多所少者潤澤華葉爾又嘗謂春秋之為書在古無有乃聖人所自作唯孟子為能知之非理明義精殆未可學先儒未及此而治之故其説多穿鑿及詩書禮樂之言多不能平易其心以意逆志方且條舉大例考察文理與學者緒正其説先生慨然有意三代之治望道而欲見論治人先務未始不以經界為急講求法制粲然備具要之可以行于今如有用我者舉而措之爾嘗曰仁政必自經界始貧富不均教養無法雖欲言治皆茍而已世之病難行者未始不以亟奪富人之田為辭然兹法之行悅之者衆茍處之有術期以數年不刑一人而可復所病者特上未之行爾乃言曰縱不能行之天下猶可驗之一鄉方與學者議古之法共買田一方畫為數井上不失公家之賦役退以其私正經界分宅里立斂法廣儲蓄興學校成禮俗救災恤患敦本抑末足以推先王之遺法明當今之可行此皆有志未就會秦鳳帥呂公薦之曰張載善發聖人之道略可措之以復古乞召還舊職訪以治體詔從之先生曰吾是行也不敢以疾辭庶幾有遇焉及至都公卿聞風慕之然未有深知先生者以所欲言嘗試于人多未之信會有言者欲講行冠婚喪祭之禮詔下禮官禮官安習故常以古今異俗為説先生獨以為可行且謂稱不可非儒生博士所宜衆莫能奪然議卒不決郊廟之禮禮官預焉先生見禮不致嚴亟欲正之而衆莫之助先生益不悅會有疾謁告以歸知道之難行欲與門人成其初志不幸告終不卒其願沒之日唯一甥在側囊中索然明日門人之在長安者繼來奔哭之賻襚始克斂遂奉柩歸殯以葬又卜以三月而葬其治喪禮一用古以終先生之志某惟先生之學之至備存于書略述于諡議矣然欲求文以表其墓必得行事之迹敢次以書哭子厚先生詩明道先生歎息斯文約共修如何夫子便長休東山無復蒼生望西土誰供後學求千古聲名聯棣蕚二年零落去山丘寢門慟哭知何恨豈獨交親念舊遊論諡書司馬光橫渠之沒門人欲諡為明誠夫子質于明道先生先生疑之訪于溫公以為不可此帖不見于文集今藏龜山楊公家光啓昨日承問張子厚諡倉卒奉對以漢魏以來此例甚多無不可者退而思之有所未盡竊惟子厚平生用心欲率今世之人復三代之禮者也漢魏以下蓋不足法郊特牲曰古者生無爵死無諡爵謂大夫以上也檀弓記禮所由失以為士之有誄自縣賁父始子厚官比諸侯之大夫則已貴宜有諡矣然曾子問曰賤不誄貴幼不誄長禮也惟天子稱天以誄之諸侯相誄非禮也諸侯相誄猶為非禮况弟子而誄其師乎孔子之沒哀公誄之不聞弟子復為之諡也子路欲使門人為臣孔子以為欺天門人厚葬顔淵孔子歎不得視猶子也君子愛人以禮今關中諸君欲諡子厚而不合于古禮非子厚之志與其以陳文範陶靖節王文中孟貞曜為比其尊之也曷若以孔子為比乎承關中諸君決疑于伯淳而伯淳謙遜博謀及于淺陋不敢不盡所聞而獻之以備萬一惟伯淳擇而折衷之光再拜張子全書卷十五
