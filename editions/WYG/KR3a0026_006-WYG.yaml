body:
  text: 張子全書卷六義理學未至而好語變者必知終有患盖變不可輕議若驟然語變則知操術已不正吾徒飽食終日不圖義理則大非也工商之輩猶能晏寐夙興以有為焉知之而不信而行之愈於不知矣學者須得中道乃可守人到向道後俄頃不舍豈暇安寢然君子向晦入燕處君子隨物而止故入燕處然其仁義功業之心未嘗忘但以其物之皆息吾兀然而坐無以為接無以為功業須亦入息此學以為絶耶何因復有此議論以為興耶然而學者不博孟子曰無有乎爾則亦無有乎爾孔子曰天之未喪斯文也匡人其如予何今欲功及天下故必多栽培學則道可傳矣人不知學其任智自以為人莫及以理觀之其用智乃癡耳碁酒書畫其術固均無益也坐寢息其術同差近有益也惟與朋友燕㑹議論良益也然大義大節須要知若微細亦必知也凡人為上則易為下則難然不能為下亦未能使下不盡其情偽也大抵使人常在其前已嘗為之則能使人凡事蔽盖不見底只是不求益有人不肯言其道義所得所至不得見底又非於吾言無所不說人雖有功不及於學心亦不宜忘心苟不忘則雖接人事即是實行莫非道也心若忘之則終身由之只是俗事今人自强自是樂已之同惡已之異便是有固必意我無由得虚學者理㑹到此虚心處則教者不湏言求之書合者即是聖言不合者則後儒添入也要見聖人無如論孟為要論孟二書於學者大足只是須涵泳以有限之心止可求有限之事欲以致博大之事則當以博大求之知周乎萬物而道濟天下也尊其所聞則高明行其所知則光大凡未理㑹至實處如空中立終不曾踏著實地性剛者易立和者易達人只有立與達已欲立而立人已欲達而達人然則剛與和猶是一偏惟大達則必立大立則必達學者欲其進須欽其事欽其事則有立有立則有成未有不欽而能立不立則安可望有成人若志趣不逺心不在焉雖學無成人惰於進道無自得達自非成德君子必勉勉至從心所欲不踰矩方可放下德薄者終學不成也聞見之善者謂之學則可謂之道則不可須是自求已能尋見義理則自有㫖趣自得之則居之安矣合内外平物我此見道之大端道德性命是常在不死之物也已身則死此則常在耳目役於外攬外事者其實是自墮不肯自治只言短長不能反躬者也天地之道要一言而道盡亦可有終日善言而只在一物者當識其要總其大體一言而乃盡爾釋氏之學言以心役物使物不役心周孔之道豈是物能役心虛室生白今之性滅天理而窮人欲令復反歸其天理古之學者便立天理孔孟而後其心不傳如荀揚皆不能知義理之學亦須深沉方有造非淺易輕浮之可得也盖惟深則能通天下之志只欲說得便似聖人若此則是釋氏之所謂祖師之類也此道自孟子後千有餘嵗今日復有知者若此道天不欲明則不使今日人有知者旣使人知之似有復明之理志於道者能自出義理則是成器人一能之已百之人十能之已千之曰能者是今日不能而能之若以聖人之能而為不能則狂者矣終身而莫能得也學貴心悟守舊無功知德斯知言已嘗自知其德然後能識言也人雖言之己未嘗知其德豈識其言須是已知是德然後能識是言猶曰知孝之德則知孝之言也三代時人自幼聞見莫非義理文章學者易為力今須自作為學大益在自能變化氣質不爾卒無所發明不得見聖人之奥故學者先須變化氣質變化氣質與虛心相表裏大中天地之道也得大中隂陽鬼神莫不盡之矣仁不得義則不行不得禮則不立不得智則不知不得信則不能守此致一之道也大率玩心未熟可求之平易勿迂也若始求太深恐自兹愈逺學不能推究事理只是心粗至如顔子未至於聖人處猶是心粗觀書必總其言而求作者之意學者言不能識得盡多相違戾是為無天德今顰眉以思已失其心也盖心本至神如此則已將不神害其至神矣能亂吾所守脫文有言經義須人人說得别此不然天下義理只容有一箇是無兩箇是且滋養其明明則求經義將自見矣又不可徒養有觀他前行往行便畜得已德若要成德須是速行之當自立說以明性不可以遺言附㑹解之若孟子言不成章不達及四體不言而喩此非孔子曽言而孟子言之此是心解也讀書少則無由考校得義精盖書以維持此心一時放下則一時德性有懈讀書則此心常在不讀書則終看義理不見書須成誦精思多在夜中或靜坐得之不記則思不起但通貫得大原後書亦易記所以觀書者釋己之疑明己之未達每見每知所益則學進矣於不疑處有疑方是進矣學者潛心畧有所得即且誌之紙筆以其易忘失其良心若所得是充大之以養其心立數千題旋注釋常改之改得一字即是進得一字始作文字須當多其詞以包羅意思常人教小童亦可取益絆已不出入一益也授人數次已亦了此文義二益也對之必正衣冠尊瞻視三益也嘗以因已而壊人之才為之憂則不敢墮四益也有急求義理復不得於閒暇有時得盖意樂則易見急而不樂則失之矣盖所以求義理莫非天地禮樂鬼神至大之事心不洪則無由得見語道不簡易盖心未簡易須實有是德則言自歸約盖趣向自是居簡久則至於簡也聞之知之得之有之孔子適周誠有訪樂於萇𢎞問禮於老􅅨老􅅨未必是今老子觀老子薄禮恐非其人然不害為兩老子猶左丘明别有作傳者也家語國語雖於古事有所證明然皆亂世之事不可以證先王之法觀書且勿觀史學理㑹急處亦無暇觀也然觀史又勝於遊山水林石之趣始似可愛終無益不如游心經籍義理之間心解則求義自明不必字字相校譬之目明者萬物紛錯於前不足為害若目昏者雖枯木朽株皆足為梗觀書且不宜急迫了意思則都不見須是大體上求之言則指也指則所視者逺矣若只泥文而不求大體則失之是小兒視指之類也常引小兒以手指物示之而不能求物以視焉只視於手及無物則加怒耳博大之心未明觀書見一言大一言小不從博大中來皆未識盡旣聞中道不易處且休㑹歸諸經義巳未能盡天下之理如何盡天下之言聞一句語則起一重心所以處得心煩此是心小則百物皆病也今旣聞師言此理是不易雖掩卷守吾此心可矣凡經義不過取證明而已故雖有不識字者何害為善易曰一致而百慮旣得一致之理雖不百慮亦何妨旣得此心復因狂亂而失之譬諸亡羊者挾策讀書與飲酒博塞其亡羊則一也可不鑒人之迷經者盖已所守未明故常為語言可以移動已守旣定雖孔孟之言有紛錯亦不須思而改之復鋤去其繁使詞簡而意備經籍亦須記得雖有舜禹之智吟而不言不如聾盲之指麾故記得便說得說得便行得故始學亦不可無誦記某觀中庸義二十年每觀每有義已長得一格六經循環年欲一觀觀書以靜為心但只是物不入心然人豈能長靜須以制其亂發源端本處旣不誤則義可以自求學者信書且須信論語孟子詩書無舛雜理雖雜出諸儒亦若無害義如中庸大學出於聖門無可疑者禮記則是諸儒雜記至如禮文不可不信己之言禮未必勝如諸儒如有前後所出不同且闕之記有疑議亦且闕之就有道而正焉嘗謂文字若史書歴過見得無可取則可放下如此則一日之力可以了六七卷書又學史不為為人對人恥有所不知意只在相勝醫書雖聖人存此亦不須大段學不㑹亦不甚害事㑹得不過恵及骨肉間延得頃刻之生決無長生之理若窮理盡性則自㑹得如文集文選之類看得數篇無所取便可放下如道藏釋典不看亦無害旣如此則無可得看唯是有義理也故唯六經則須著循環能使晝夜不息理㑹得六七年則自無可得看若義理則儘無窮待自家長得一格則又見得别語道㫁自仲尼不知仲尼以前更有古可稽雖文字不能傳然義理不滅則須有此言語不到得絶由學者至顔子一節由顔子至仲尼一節是至難進也二節猶二關然而得仲尼地位亦少詩禮不得孔子謂學詩學禮以言以立不止謂學者聖人旣到後直知須要此不可闕不學詩直是無可道除是穿鑿任己知詩禮易春秋書六經直是少一不得大凡說義理命字為難看形器處尚易至要妙處本自博以語言復小卻義理差之毫釐繆以千里從此學者苟非將大有為必有所甚不得已也學大原上學者且須觀禮盖禮者滋養人德性又使人有常業守得定又可學便可行又可集得義養浩然之氣須是集義集義然後可以得浩然之氣嚴正剛大必須得禮上下達義者克己也書多閱而好忘者只為理未精耳理精則須記了無去處也仲尼一以貫之盖只著一義理都貫卻學者但養心識明靜自然可見死生存亡皆知所從來胸中􅉷然無疑止此理爾孔子言未知生焉知死盖畧言之死之事只生是也更無别理下學而上達者兩得之人謀又得天道又盡人私意以求是未必是虚心以求是方為是夫道仁與不仁是與不是而已旣學而先有以功業為意者於學便相害旣有意必穿鑿創意作起事也德未成而先以功業為事是代大匠斵希不傷手也為學須是要進有以異於人若無以異於人則是鄉人雖貴為公卿若所為無以異於人未免為鄉人富貴之得不得天也至於道德則在己求之而無不得者也漢儒極有知仁義者但心與迹異戲謔直是大無益出於無敬心戲謔不已不惟害事志亦為氣所流不戲謔亦是持氣之一端善戲謔之事雖不為無傷聖人於文章不講而學盖講者有可否之疑須問辨而後明學者有所不知問而知之則可否自決不待講論如孔子之盛德惟官名禮文有所未知故其問老子郯子旣知則遂行而更不須講忠信所以進德者何也閑邪則誠自存誠自存斯為忠信也如何是閑邪非禮而勿視聴言動邪斯閑矣日月星辰之事聖人不言必是顔子輩皆己理㑹得更不須言也學者不可謂少年自緩便是四十五十二程從十四嵗時便銳然欲學聖人今盡及四十未能及顔閔之徒小程可如顔子然恐未如顔子之無我心旣虗則公平公平則是非較然易見當為不當為之事自知正心之始當以己心為嚴師凡所動作則知所懼如此一二年間守得牢固則自然心正矣其始且須道體用分别以執守至熟後只一也道初亦須一意慮㕘較比量至已得之則非思慮所能致古者惟國家則有有司士庶人皆子弟執事又古人於提孩時已教之禮今世學不講男女從幼便驕惰壊了到長益凶狠只為未嘗為子弟之事則於其親己有物我不肯屈下病根常在近來思慮大率少不中處今則利在閑閑得數日便意思長逺觀書到無可推考處顔子所謂有不善者必只是以常意有迹處便為不善而知之此知幾也於聖人則無之矣耳不可以聞道夫子之言性與天道子貢以為不聞是耳之聞未可以為聞也憂道則凡為貧者皆道憂貧則凡為道者皆貧道理今日卻見分明雖仲尼復生亦只如此今學者下達處行禮下而又見性與天道他日須勝孟子門人如子夏子貢等人必有之乎氣質猶人言性氣氣有剛柔緩速清濁之氣也質才也氣質是一物若草木之生亦可言氣質惟其能克己則為能變化卻習俗之氣性制得習俗之氣所以養浩然之氣是集義所生者集義猶言積善也義須是常集勿使有息故能生浩然道德之氣某舊多使氣後來殊減更期一年庶幾無之如太和中容萬物任其自然人早起未嘗交物須意銳精徤平正故要得整頓一早晨及接物日中須汩没到夜則自求息反靜仁之難成久矣人人失其所好盖人人有利欲之心與學正相背馳故學者要寡欲孔子曰棖也慾焉得剛樂則生矣學至於樂則自不已故進也生猶進有知乃德性之知也吾曹於窮神知化之事不能絲髪禮使人來悅己則可已不可以妄悅於人婢僕始至者本懐勉勉敬心若到所提掇更謹則加謹慢則棄其本心便習以性成故仕者入治朝則德日進入亂朝則德日退只觀在上者有可學無可學爾學得周禮他日有為卻做得些實事以某且求必復田制只得一邑用法若許試其所學則周禮田中之制皆可舉行使民相趨如骨肉上之人保之如赤子謀人如己謀衆如家則民自信火宿之微茫存之則烘然少假外物其生也易久可以燎原野彌天地有本者如是也孔子謂柴也愚參也魯亦是不得已須當語之如正甫之隨昞之多疑須當告使知其病則病上偏治莊子謂牧羊者止鞭其後人亦有不須驅策處則治其所不足某只是大直無隠凡某人有不善即面舉張子全書卷六
