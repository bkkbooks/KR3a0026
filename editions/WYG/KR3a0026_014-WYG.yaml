body:
  text: 張子全書卷十四性理拾遺横渠言日月五星亦隨天轉如二十八宿隨天而定皆有光芒五星逆行而動無光芒張子曰天地變化至著至速者目為鬼神所謂吉凶害福誅殛窺伺豈天所不能耶必有耳目口鼻之象而後能之耶張子曰范巽之嘗言神姦物怪某以言難之謂天地之雷霆草木至怪也以其有定形故不怪人之陶冶舟車亦至怪也以其有定理故不怪今言鬼者不可見其形或云有見者且不定一難信又以無形而移變有形之物此不可以理推二難信又嘗推天地之雷霆草木人莫能為之人之陶冶舟車天地亦莫能為之今之言鬼神以其無形則如天地言其動作則不異于人豈謂人死之鬼反能兼天人之能乎今更就世俗之言評之如人死皆有知則慈母有深愛其子者一旦化去獨不日日憑人言語託人夢寐存恤之耶言能福善禍淫則或小惡反遭重罰而大憝反享厚福不可勝數又謂人之精明者能為厲秦皇獨不罪趙高唐太宗獨不罰武后耶又謂衆人所傳不可全非自古聖人獨不傳一言耶聖人或容不言自孔孟而下荀況楊雄王仲淹韓愈學亦未能及聖人亦不見畧言者以為有數子又或偶不言今世之稍信實亦未嘗有言親見者張子曰所謂山川門􅋼之神與郊社天地隂陽之神有以異乎易謂天且不違而况於鬼神乎仲尼以何道而異其稱耶又謂游魂為變魂果何物其游也情狀何如試求之使無疑然後可以拒怪神之說知亡者之歸此外學素所援據以質成其論者不可不察以自祛其疑耳張子曰天下凡謂之性者如言金性剛火性熱牛之性馬之性也莫非固有凡物莫不有是性由通蔽開塞所以有人物之别由蔽有厚薄故有智愚之别塞者牢不可開厚者可以開而開之也難薄者開之也易開則逹於天道與聖人一張子曰富貴貧賤者皆命也今有人均為勤苦有富貴者有終身窮餓者其富貴者即是幸㑹也求而有不得則是求無益于得也道義則不可言命是求在我者也問智愚之識殊疑於有性善惡之報差疑於有命曰性通極於無氣其一物爾命稟同於性遇乃適然爾張子曰心統性情者也有形則有體有性則有情發於性則見于情發于情則見于色以類而應也張子曰道所以可久可大以其肖天地而不雜也與天地不相似其違道也遠矣事無大小皆有道在其間能安分則謂之道不能安分謂之非道顯諸仁天地生萬物之功則人可得而見也所以造萬物則人不可得而見是藏諸用也接物處皆是小德統㑹處便是大德洪鐘未嘗有聲由扣乃有聲聖人未嘗有知由問乃有知或謂聖人無知則當不問之時其猶木石乎曰有不知則有知無不知則無知故曰聖人未嘗有知由問乃有知也聖人無私無我故功高天下而無一介累於其心蓋有一介存焉未免乎私已也張子曰孟子於聖人猶是麄者為學所急在於正心求益若求之不已無有不獲惟勉勉不忘為要耳人若志趣不遠心不在焉雖學無成人惰於進道無自得達自非成德君子必勉勉至從心所欲不踰矩方可放下德薄者終學不成也明善為本固執之乃立擴充之則大易視之則小在人能𢎞之而已利利於民則可謂利利於身利於國皆非利也利之言利猶言美之為美利誠難言不可一槩而言教之而不受則雖强告之無益莊子謂内無受者不入外無正者不行張子曰近臣守和和平也和其心以備顧對不可徇其喜怒好惡井田而不封建猶能養而不能教封建而不井田猶能教而不能養封建井田而不肉刑猶能教養而不能使然此未可遽行之禮但去其不可者其他取力能為之者近思録拾遺橫渠先生謂范巽之曰吾輩不及古人病源何在巽之請問先生曰此非難悟設此語者蓋欲學者存意之不忘庶游心浸熟有一日脫然如大寐之得醒耳未知立心惡思多之致疑既知所立惡講治之不精講治之思莫非術内雖勤而何厭所以急於可欲者求立吾心于不疑之地然後若決江河以利吾往遜此志務時敏厥脩乃來故雖仲尼之才之美然且敏以求之今特不逮之資而欲徐徐以聽其自適非所聞也今且只將尊德性而道問學為心日自求於問學者有所背否於德性有所懈否此義亦是博文約禮下學上達以此警策一年安得不長每日須求多少為益知所亡改得少不善此德性上之益讀書求義理編書須理㑹有所歸著勿徒寫過又多識前言往行此學問上益也勿使有俄頃閒度逐日似此三年庶幾有進為天地立心為生民立命為往聖繼絶學為萬世開太平人多以老成則不肯下問故終身不知又為人以道義先覺處之不可復謂有所不知故亦不肯下問從不肯問遂生百端欺妄人我寧終身不知論語說多聞不足以盡天下之故茍以多聞而待天下之變則道足以酬其所嘗知若刼之不測則遂窮矣孟子說竊嘗病孔孟既没諸儒囂然不知反約窮源勇於茍作持不逮之資而急知後世明者一覽如見肺肝然多見其不知量也方且創艾其弊黙養吾誠顧所患日夕不足而未果他為也博學于文者只要得習坎心亨蓋人經歴險阻艱難然後其心亨通凡致思到說不得處始復審思明辨乃為善學也若告子則到說不得處遂已更不復求孟子說春秋之書在古無有乃仲尼所自作惟孟子能知之非理明義精殆未可學先儒未及此而治之故其說多鑿橫渠先生曰始學之要當知三月不違與日月至焉内外賔主之辨使心意勉勉循循而不能已過此幾非在我者文集人又要得剛太柔則入於不立亦有人生無喜怒者則又要得剛剛則守得定不囘進道勇敢載則比他人自是勇處多語錄敦篤虚靜者仁之本不輕妄則是敦厚也無所繫閡昏塞則是虚靜也此難以頓悟茍知之須久於道實體之方知其味夫仁亦在乎熟之而已孟子說有潛心於道忽忽為他慮引去者此氣也舊習纒繞未能脫灑畢竟無益但樂於舊習耳古人欲得朋友與琴瑟簡編常使心在於此惟聖人知朋友之取益為多故樂得朋友之來論語說舜之事親有不悅者為父頑母嚚不近人情若中人之性其愛惡畧無害理姑必順之親之故舊所喜者當極力招致以悅其親凡於父母賔客之奉必極力營辦亦不計家之有無然為養又須使不知其勉强勞苦茍使見其為而不易則亦不安矣記說斯干詩言兄及弟矣式相好矣無相猶矣言兄弟宜相好不要厮學猶似也人情大抵患在施之不見報則輟故恩不能終不要相學已施之而已詩說下同人不為周南召南其猶正牆面而立常深思此言誠是不從此行甚隔著事向前推不去蓋至親至近莫甚於此故須從此始横渠先生曰兵謀師律聖人不得已而用之其術見三王方策歴代簡書惟志士仁人為能識其遠者大者素求預備而不敢忽忘文集肉辟於今世死刑中取之亦足寛民之死過此當念其散之之久橫渠先生曰古者有東宮有西宮有南宮有北宮異宮而同財此禮亦可行古人慮遠目下雖似相疎其實如此乃能久相親蓋數十百口之家自是飲食衣服難為得一又異宮乃容子得伸其私所以避子之私也子不私其父則不成為子古之人曲盡人情必也同宮有叔父伯父則為子者何以獨厚於其父為父者又烏得而當之父子異宮為命壬以上愈貴則愈嚴故異宮猶今世有逐位非如異居也樂說鄭衞之音悲哀令人意思流連又生怠惰之意從而致驕淫之心雖珍玩奇貨其始感人也亦不如是切從而生無限嗜好故孔子曰必放之亦是聖人經歴過但聖人能不為物所移耳禮樂說孟子言反經者特於鄉原之後者以鄉原大者不先立心中初無作惟是左右看順人情不欲違一生如此孟子說二程書拾遺橫渠於墓祭合一分食而祭之故告墓之文有曰奔走荆棘殽亂杯盤之列觀秦中氣艷衰邊事所困累歲不稔昨來餽邊喪亡今日事未可知大有可憂者以至士人相繼淪喪為足粧㸃關中者則遂化去吁可怪也凡言王氣者實有此理生一物須有此氣不論美惡須有許大氣艷故生是人至如闕里有許多氣艷故此道之流以至今日昔橫渠說出此道理至此幾乎衰矣只介父一箇氣艷大小大理則須窮性則須盡命則不可言窮與盡只是至於命也橫渠昔常譬命是源窮理與盡性如穿渠引源然則渠與源是兩物後來此議必改來正叔謂子厚越獄以謂卿監已上不追攝之者以其貴朝廷有旨追攝可也又請枷項非也不已太辱矣貴貴以其近於君子厚謂若終不伏則將奈何正叔謂寧使公事勘不成則休朝廷大義不可虧也子厚以為然橫渠墓祭為一位恐難推同几之義同几唯設一位祭之謂夫婦同牢而祭也禮言惟天地之祭為越紼而行事此事難行既言越紼則是猶在殯宮于時無由致得齋又安能脫喪服衣祭服此皆難行縱天地之祀為不可廢只消使冡宰攝爾昔者英宗初即位有人以此問先生答曰古人居喪百事皆此有闕字如常特於祭祀廢之則不若無廢為愈也子厚正之曰父在為母喪則不敢見其父不敢以非禮見也今天子為父之喪以此見上帝是以非禮見上帝也故不如無祭張橫渠謂范文正才氣老成笑指揮趙俞恭而安張兄十五年學伯淳謂天下之士亦有其志在朝廷而才不足才可以為而誠不足今日正須才與至誠合一方有濟子厚謂才與誠須一物只是一物伯淳言才而不誠猶不是也若非至誠雖有忠義功業亦出於事為浮氣幾何時而不盡也一本無只是一物四字二程謂地形不必謂寛平可以畫方只可用算法折計地畝授民子厚謂必先正經界經界不正則法終不定地有坳垤處不管只觀四標竿中間地雖不平饒與民無害就一夫之間所爭亦不多又側峻處田亦不甚美又經界必須正南北假使地形有寛狹尖斜經界則不避山河之曲其田則就得井處為井不能就成處或五七或三四或一夫其實田數則在又或就不成一夫處亦可計百畝之數而授之無不可行者如此則經界隨山隨河皆不害於畫之也茍如此畫定雖便使暴君汙吏亦數百年壞不得經界之壞亦非專在秦時其來亦遠漸有壞矣正叔云至如魯二吾猶不足如何得至十一也子厚言百畝而徹言徹取之徹則無義是透徹之徹透徹而耕則功力均且相驅率無一家得惰者及已收穫則計畝數裒分之以裒分之數取十一之數亦可或謂井議不可輕示人恐致笑及有議論子厚謂有笑有議論則方有益也若有人聞其說取之以為己功先生云如有能者則已願受一㕓而為氓亦幸也伯淳言井田今取民田使貧富均則願者衆不願者寡正叔言亦未可言民情怨怒止論可不可爾須使上下都無此怨怒方可行正叔言議法既大備卻在所以行之之道子厚言豈敢某止欲成書庶有取之者正叔言不行於當時行於後世一也子厚曰徒善不足以為政徒法不能以自行須是行之之道又雖有仁心仁聞而政不行者不由先王之道也須是法先王正叔言孟子於此善為言只極目力焉能盡方圓平直須是要規矩正叔說堯夫對上之詞言陛下富國彊兵後待做甚以為非是此言安足諭人主如周禮豈不是富國之術存焉子厚言堯夫抑上富强之說正猶為漢武帝言神仙之學長年不足惜言豈可入聖賢之域曉人不如此之拙如梁惠王問何以利國則說利不可言之理極言之以至不奪不饜正叔言人志於王道是天下之公議反以為私說何也子厚言只為心不大心大則做得大正叔言只是做一喜好之事為之不知只是合做伯淳言邵堯夫病革且言試與觀化一遭子厚言觀化他人便觀得自家自家又如何觀得化嘗觀堯夫詩意纔做得識道理卻於儒術未見所得正叔言蜥蜴含水隨雨震起子厚言未必然雹儘有大者豈盡蜥蜴所致也今以蜥蜴求雨枉求他他又何道致雨正叔言昏禮結髪無義欲去久矣不能言結髪為夫婦者只是指其少小也如言結髪事君李廣言結髪事匈奴只言初上頭也豈謂合髻子子厚云絶非禮義便當去之古人凡禮講修已定家家行之皆得如此今無定制每家各定此所謂家殊俗也至如朝廷之禮皆不中節有人言郭璞以鳩鬬占吉凶子厚言此為他誠實信之所以就而占得吉凶正叔言但有意向此便可以兆也非鳩可以占吉凶耳正叔言郭逵新貴時衆論喧然未知其人如何後聞人言欲買韓王宅更不問可知也如韓王者當代功臣一宅已致而欲有之大煞不識好惡子厚言昔年有人欲為范希文買綠野堂希文不肯識道理自不然在唐如晉公者是可尊也一旦取其物而有之如何得安在他人猶可如王維莊之類獨有晉公則不可寧使耕壞及他有力者致之已則不可取正叔謂今唱名何不使伊儒冠徐歩進見何用二人把見趨走得不使殿上大臣有愧色子厚言只先出榜使之見其先後何用旋開卷呼名伯淳謂才與誠一物則周天下之治子厚因謂此何事於仁必也聖乎子厚言十詩之作止是欲驗天心於語黙間耳正叔謂若有他言語又烏得已也子厚言十篇次叙固自有先後二程解窮理盡性以至於命只窮理便是至於命子厚謂亦是失於大快此義儘有次序須是窮理便能盡得已之性則推類又盡人之性既盡得人之性須是并萬物之性一齊盡得如此然後至於天道也其間煞有事豈有當下理㑹了學者須是窮理為先如此則方有學今言知命與至於命儘有近遠豈可以知便謂之至也正叔謂洛俗恐難化於秦人子厚謂秦俗之化亦先自和叔有力焉亦是士人敦厚東方亦恐難肯向風子厚謂昔嘗謂伯淳優於正叔今見之果然其救世之志甚誠切亦於今日天下之事儘記得熟二程言人不易知子厚言人誠知之為難然至於伎術能否人情善惡便可知惟似秦武陽殺人於市見秦始皇懼此則不可知世人之學博聞强識者豈少其終無有不入禪學者就其間特立不惑無如子厚堯夫然其說之流恐未免此敝蘇昞錄橫渠語云和叔言香聲横渠云香與聲猶是有形隨風往來可以斷續猶為麄耳不如清水今以清冷水置之銀器中隔外便見水珠㑹何漏隙之可通此至清之神也先生云此亦見不盡卻不說此是水之清銀之清若云是水因甚置甆碗中不如此中庸之說其本至於無聲無臭其用至於禮儀三百威儀三千自禮儀三百威儀三千復歸於無聲無臭此言聖人心要處與佛家之言相反儘教說無形迹無色其實不過無聲無臭必竟有甚見處大抵語論間不難見如人論黃金曰黃色此人必是不識金若是識金者更不言設或言時别自有道理張子厚嘗謂佛如大富貧子橫渠論此一事甚當以上遺書或問維摩詰云火中生蓮花是可謂希有在欲而行禪希有亦如是此豈非儒者事子曰此所以與儒者異也人倫者天理也彼將其妻子當作何等物看望望然以為累者文王不如是也有生者必有死有始者必有終此所以為常也為釋氏者以成壞為無常是獨不知無常乃所以為常也今夫人生百年者常也一有百年而不死者非所謂常也釋氏推其私智所及而言之至以天地為妄何其陋也張子厚尤所切齒者此耳以上外書張子全書卷十四
