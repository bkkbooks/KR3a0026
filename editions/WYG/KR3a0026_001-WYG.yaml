body:
  text: 張子全書卷一西銘此篇論乾坤一大父母人物皆己之兄弟一輩而人當盡事親之道以事天地朱子曰横渠姓張名載字子厚秦人也學古力行篤志好禮為闗中士子宗師嘗於學堂雙牖左書砭愚右書訂頑伊川先生曰是啓爭端改曰東銘西銘二銘雖同岀於一時之作然其詞義之所指氣象之所及淺深廣狹判然不同是以程門專以西銘開示學者而於東銘則未嘗言盖學者誠於西銘之言反復玩味而有以自得之則心廣理明意味自别若東銘則雖分别長傲遂非之失於毫釐之間所以開警後學亦不為不切然意未有窮而於下學工夫盖猶有未盡者又安得與西銘徹上徹下一以貫之之㫖同日語哉乾稱父坤稱母予兹藐焉乃混然中處天陽也以至徤而位乎上父道也地隂也以至順而位乎下母道也人禀氣於天賦形於地以藐然之身混合無間而位乎中子道也然不曰天地而曰乾坤者天地其形體也乾坤其性情也乾者徤而無息之謂萬物之所資以始者也坤者順而有常之謂萬物之所資以生者也是乃天地之所以為天地而父母乎萬物者故指而言之朱子曰須子細看他説理一而分殊而今道天地不是父母父母不是天地不得分明是一理乾道成男坤道成女則凡天下之男皆乾之氣凡天下之女皆坤之氣從這裏便徹上徹下都即是一箇氣都透過了地自一家言之父母是一家之父母自天下言之天是天下之父母混然中處言混合無間盖此身便是從天地來者人之一身固是父母所生然父母之所以為父母即是乾坤若以父母而言則一物各一父母若以乾坤而言則萬物同一父母矣萬物既同一父母則吾體之所以為體者豈非天地之塞吾性之所以為性者豈非天地之帥哉古之君子惟其見得道理真實如此所以親親而仁民仁民而愛物推其所為以至於能以天下為一家中國為一人而非億之也今若必謂人物只是父母所生更與乾坤都無干渉其所以有取於西銘者但取其姑為宏闊廣大之言以形容仁體破有我之私而已則是所謂仁體者全是虚名初無實體而小己之私郤是實理合有分别聖賢如此郤初不見義理只見利害而妄以己意造作言語以増餙其所無破壊其所有也某所論西銘之意正為長者以横渠之言不當謂乾坤實為父母而以膠固斥之故竊疑之以為若如長者之意則是人物實無所資於天地恐有所未安爾今來誨猶以横渠只是假借之言而未察父母之與乾坤雖其分之有殊而初未嘗有二體但其分之殊則又不得不辨也我西山真氏曰西銘推事親之心以事夭盖父母生者也而所以生之者天地也天賦以氣地賦以形父母固我之父母也天地亦我之父母也朱子曰父母者一身之父母也天地者人與物已與人皆共以為父母者也父母之生我也四肢百骸無一不全必能全其身之形然後為不忝於父母天地之生我也五常百善無一不備必能全其性之理然後為不負於天地故仁人事親如事天事天如事親此又西銘之妙旨不可以不知也故天地之塞吾其體天地之帥吾其性乾陽坤隂此天地之氣塞乎兩間而人物之所資以為體者也故曰天地之塞吾其體乾徤坤順此天地之志為氣之帥而人物之所得以為性者也故曰天地之帥吾其性深察乎此則父乾母坤混然中䖏之實可見矣朱子曰西銘大要在天地之塞吾其體天地之帥吾其性兩句上塞是說氣孟子所謂以直養而無害則塞乎天地之間即用這箇塞字張子此篇大抵皆古人說話集來塞只是氣吾之體即天地之氣帥是主宰乃天地之常理也吾之性即天地之理妙問天地之塞如何是塞曰塞與帥字皆張子用字處塞乃孟子塞天地之間體乃孟子氣體之充者有一毫不滿之處則非塞矣帥乃志氣之帥而有主宰之意此西銘借用孟子論浩然之氣處若不是此二句為之闗紐則下文言同胞言兄弟等句在他人中物皆與我初何干渉其謂之兄弟同胞乃是此一理與我相為貫通故上說父母下說兄弟皆是其血脉過度處西銘解塞帥二字只說大概若要說盡須用起疏注可也問天地之帥吾其性先生解以乾徤坤順為天地之志天地安得有志曰復其見天地之心天地之情可見安得謂天地無心情乎或問福善禍淫天之志否曰程先生說天地以生物為心最好此乃是無心之心也天地之塞似亦著擴充宇未得但謂充滿乎天地之間莫非氣而吾所得以為形骸者皆此氣耳天地之帥則天地之心而理在其中也問西銘之義曰他𦂳要血脈盡在天地之塞吾其體天地之帥吾其性兩句上上面乾稱父至混然中處是頭下面民吾同胞物吾與也便是箇項下面便撤開說許多大君吾父母宗子云云盡是從民吾同胞物吾與也說來到得知化則善述其事窮神則善繼其志這志便只是那天地之帥吾其性底志為人子便要述得父之事而繼得父之志如此方是事親如事天便要述得天之事繼得天之志方是事天若是違了此道理便是天之悖徳之子若害了這仁便是天之賊子若是濟惡不悛便是天之不才之子若能踐形便是克肖之子這意思血脉都是從天地之塞吾其體天地之帥吾其性說𦂳要都是這兩句若不是此兩句則天自是天我自是我有何干渉或問此兩句便是理一處否曰然問天地之塞吾其體塞者日月之徃來寒暑之迭更與夫星辰之運行山川之融結又五行質之所具氣之所行無非塞乎天地者曰塞字意得之之且逐日自把身心來體察便見得吾身便是天地性吾性便是天地之帥問先生解西銘天地之塞作窒塞之塞如何曰後來又改了只作充塞横渠不妄下字各有來處向要到雲谷自下上山半塗大雨通身皆濕得到地頭因思著天地之塞吾其體天地之帥吾其性時季通及某人同在那裏某因各人解此兩句自亦作兩句解後來看也自說得著所以迤邐便作西銘等解北溪陳氏曰性只是理人之生不成只空得箇理須有箇形骸方載得此理其實理不外乎氣得天地之氣成這形得天地之理成這性所以横渠曰天地之塞吾其體天地之帥吾其性塞字只是就孟子浩然之氣塞乎天地句掇一字來說氣帥字只是就孟子志氣之帥句掇一字來說理民吾同胞物吾與也人物竝生於天地之間其所資以為體者皆天地之塞其所得以為性者皆天地之帥也然體有偏正之殊故其於性也不無明暗之異惟人也得其形氣之正是以其心最靈而有以通乎性命之全體於竝生之中又為同類而最貴焉故曰同胞則其視之也皆如己之兄弟矣物則得夫形氣之偏而不能通乎性命之全故與我不同類而不若人之貴然原其體性之所自是亦本之天地而未嘗不同也故曰吾與則其視之也亦如己之儕軰矣惟同胞也故以天下為一家中國為一人如下文所云惟吾與也故凡有形於天地之間者若動若植有情無情莫不有以若其性遂其宜焉此儒者之道所以必至於参天地贊化育然後為功用之全而非有所强於外也朱子曰通是一氣初無間隔民吾同胞物吾與也萬物雖皆天地所生而人獨得天地之正氣故人為最靈故民吾同胞物則亦我之儕軰孟子所謂親親而仁民仁民而愛物其等差自然如此大抵即事親者以明事天否問西銘理一分殊莫是民吾同胞物吾與也之意曰民物固是分殊須是就民物中又各知得分殊不是伊川說破也難理會然看久自覺裏面有分别問物吾與也莫是黨與之與否曰然西山真氏曰凡生於天壤之間者莫非天地之子而吾之同氣者也是之謂理一然親者吾之同體民者吾之同類而物則異類矣是之謂分殊以其理一故仁愛之施無不徧以其分殊故仁愛之施則有差黄巖孫曰程子云所以謂萬物一體者皆有此理只為從那裏來生生之謂易生則一時生皆完此理人則能推物則氣昏推不得不可道他物不得有也人只為自私將自家軀殻上頭起意故看得道理小了他底放這身來都在萬物中一例看大小大快活大君者吾父母宗子其大臣宗子之家相也尊髙年所以長其長慈孤弱所以幼其幼聖其合徳賢其秀也凡天下疲癃殘疾惸獨鰥寡皆吾兄弟之顛連而無告者也乾父坤母而人生其中凡天下之人皆天地之子矣然繼承天地統理人物則大君而已故為父母宗子輔佐大君綱紀衆事則大臣而已故為宗子之家相天下之老一也故凡尊天下之髙年者乃所以長吾之長天下之幼一也故凡慈天下之孤弱者乃所以幼吾之幼聖人與天地合其徳是兄弟之合徳乎父母者也賢者才德過於常人是兄弟之秀出乎等夷者也是皆以天地之子言之則凡天下之疲癃殘疾惸獨鰥寡非吾兄弟無告者而何哉朱子曰西銘狀仁之體元自昭著以昧者不見故假父母宗子家相等名以曉譬之初未嘗謂與乾坤都無干渉而姑為是言以形容之也君人皆天地之子而大君乃其適長子所謂宗子有道者也故曰大君者乃吾父母之宗子爾非如所謂既為父母又降而為子也問宗子如何是適長子曰此正以繼襧之宗為喻爾繼襧之宗兄弟宗之非父母之適長子而何許多人物生於天地之間同此一氣同此一性便是吾兄弟黨與大小等級之不同便是親疏逺近之分凡天下疲癃殘疾惸獨鰥寡吾兄弟顛連而無告者也君子之為政且要主張這一等人于時保之子之翼也樂且不憂純乎孝者也畏天自保者猶其敬親之至也樂天而不憂者猶其愛親之純也朱子曰西銘首論天地萬物與我同體之意固極宏大然其所論事天功夫則自于時保之以下方極親切處問西銘自乾稱父坤稱母至民吾同胞物吾與也是仁之體于特保之以下是做工夫處曰若言同胞吾與了便說著博施濟衆郤不是所以只教人做工夫處只在敬與恐懼故曰于時保之子之翼也能常敬而恐懼則這箇道理自在違曰悖徳害仁曰賊濟惡者不才其踐形惟肖者也不循天理而狥人欲者不愛其親而愛他人也故謂之悖徳戕滅天理自絶本根者賊殺其親大逆無道也故謂之賊長惡不悛不可敎訓者世濟其凶增其惡名也故謂之不才若夫盡人之性而有以充人之形則與天地相似而不違矣故謂之肖朱子曰人之有形有色無不各有自然之理所謂天性也踐如踐言之踐盖衆人有是形而不能盡其理故無以踐其形惟聖人有是形又能盡其理然後可以踐其形而無慊也西山真氏曰天之予我以是理也莫非至善而我悖之即天之不才子也具人之形而能盡人之理即天之克肖子也知化則善述其事窮神則善繼其志孝子善繼人之志善述人之事者也聖人知變化之道則所行者無非天地之事矣通神明之徳則所存者無非天地之心矣此二者皆樂天踐形之事也問知化則善述其事窮神則善繼其志其旨如何朱子曰聖人之於天地如孝子之於父母化者天地之用一過而無迹者也知之則天地之用在我如子之述父事也神者天地之心常存而不測者也窮之則天地之心在我如子之繼父志也得其心而後可以語其用故曰窮神知化而中庸曰致中和天地位焉萬物育焉亦此之謂歟知如知得恁地便生知得恁地便死知得恁地便消得恁地便長此皆是繼天地之志隨他恁地進退消長盈虚與時偕行小而言之飢食渇飲出作入息大而言之君臣便有義父子便有仁此都是述天地之事化底是氣故喚做天地之事神底是理故喚做天地之志窮神者窺見天地之志這箇無形無迹耶化底郤又都見得到陳氏曰神是天地之心化是天地之用窮神以至言知化非聞見之知如知化育之知乃黙契之謂耳不愧屋漏為無忝存心養性為匪懈孝經引詩曰無忝爾所生故事天者仰不愧俯不怍則不忝乎天地矣又曰夙夜匪懈故事天者存其心養其性則不懈乎事天矣此二者畏天之事而君子所以求踐夫形者也惡旨酒崇伯子之顧養育英才頴封人之錫類好飲酒而不顧父母之養者不孝也故遏人欲如禹之惡旨酒則所以顧天之養者至矣性者萬物之一源非有我之得私也故育英才如頴考叔之及莊公則所以永錫爾類者廣矣不弛勞而底豫舜其功也無所逃而待烹申生其恭也舜盡事親之道而瞽瞍底豫其功大矣故事天者盡事天之道而天心豫焉則亦天之舜也申生無所逃而待烹其恭至矣故事天者夭夀不貳而修身以俟之則亦天之申生也體其受而歸全者參乎勇於從而順令者伯竒也父母全而生之子全而歸之若曾子之啓手啓足則體其所受乎親者而歸其全也况天之所以與我者無一善之不備亦全而生之也故事天者能體其所受於天者而全歸之則亦天之曾子矣子於父母東西南北唯令之從若伯竒之履霜中野則勇於從而順令也况天之所以命我者吉凶禍福非有人欲之私故事天者能勇於從而順受其正則亦天之伯竒矣問自惡㫖酒至勇於從令此六聖賢事可見理一分殊乎朱子曰惡㫖酒育英才是事天顧養及鍚類則是事親每一句皆存兩義推類可見豈問頴封人之錫類申生其恭二子皆不能無失處能盡得孝道曰西銘本不說孝只是說事天但推事親之心以事天耳二子就此處論之誠是如此盖事親郤未免有正不正處若天道純然則無正不正之處只是推此心以奉事之耳問西銘無所逃而待烹申生未盡此道何故取之曰天不到得似獻公也人有妄天則無妄若教自家死便是理合如此只得聽受之耳問申生之不去伯竒之自沉皆陷父於惡非中道也而取之與舜曾同何也曰舜之底豫贊化育也故曰功申生待烹順受而已故曰恭曾子歸全全其所以與我者終身之仁也伯竒順令順其所以使我者一事之仁也伯竒尹吉甫之子其事不知據何書為實自沉恐未可盡信然彼所事者人也人則有妄故有陷父之失此所事者天也天豈有妄而又何陷邪西銘大率借彼以明此不可著迹論也黄巖孫曰履霜操伯竒所作也吉甫聽後妻之言逐之伯竒編木荷而衣採亭花而食清朝履霜自傷無罪見逐乃援琴而歌曲終投河而死家語曰曾參遣妻告其子曰髙宗以後妻殺孝已尹吉甫以後妻殺伯竒伯竒事後母至孝後母譛之伯竒乃亡走山林說苑王國子竒事與此正同必有一誤又按程子遺書問舜與曾子之孝優劣如何曰家語載耘𤓰事雖不可信郤有此義理曾子耘𤓰誤斬其根曾晢建大杖以擊其背曾子仆地不知人事良久而蘇欣然起進曰大人用力殺參得無疾乎乃退援琴而歌使知體康孔子聞而怒曾子至孝如此亦有這些失處若是舜百事事父母只殺他不得又問如申生待烹之事如何曰此只是恭若舜須逃也富貴福澤將厚吾之生也貧賤憂戚庸玉女於成也富貴福澤所以大奉於我而使吾之為善也輕貧賤憂戚所以拂亂於我而使吾之為志也篤天地之於人父母之於子其設心豈有異哉故君子之事天也以周公之富而不至於驕以顔子之貧而不改其樂其事親也愛之則喜而不㤀惡之則懼而無怨其心亦一而已矣朱子曰敬天當如敬親戰戰兢兢無所不至愛天當如愛親無所不順天之生我安頓得好令我富貴崇髙便如父母愛我當喜而不㤀安頓得不好令我貧賤憂戚便如父母欲成就我當勞而不怨存吾順事沒吾寜也孝子之身存則其事親者不違其志而已沒則安而無所愧於親也仁人之身存則其事天者不逆其理而已没則安而無愧於天也盖所謂朝聞夕死吾得正而斃焉者故張子之銘以是終焉問存吾順事沒吾寜也朱子曰二句所論甚當舊說誤矣然以上句富貴貧賤之語例之則亦不可太相連説今改云孝子之身存則其事親也不違其志而已沒則安而無所愧於親也仁人之身存則其事天也不逆其理而已沒則安而無所愧於天也盖所謂夭夀不貳而修身以俟之者故張子之銘以是終焉似得張子之本意論曰天地之間理一而已然乾道成男坤道成女二氣交感化生萬物則其大小之分親疎之等至於十百千萬而不能齊也不有聖賢者出孰能合其異而反其同哉西銘之作意盖如此程子以為明理一而分殊可謂一言以蔽之矣盖以乾為父以坤為母有生之類無物不然所謂理一也而人物之生血脈之屬各親其親各子其子則其分亦安得而不殊哉一統而萬殊則雖天下一家中國一人而不流於兼愛之弊萬殊而一貫則雖親疎異情貴賤異等而不梏於為我之私此西銘之大指也觀其推親親之厚以大無我之公因事親之誠以明事天之道盖無適而非所謂分立而推理一也夫豈專以民吾同胞長長幼幼為理一而必黙識於言意之表然後知其分之殊哉且所謂稱物平施者正謂稱物之宜以平吾之施云爾若無稱物之義則亦何以知夫所施之平哉龜山第二書盖欲發明此意然言不盡而理有餘也故愚得因其說而遂言之如此同志之士幸相與折衷焉熹既為此解後得尹氏書云楊中立答伊川先生論西銘書有釋然無惑之語先生讀之曰楊時也未釋然乃知此論所疑第二書之說先生盖亦未之許也然龜山語録有曰西銘理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等耳或曰如是則體用果離而為二矣曰用未嘗離體也以人觀之四肢百骸具於一身者體也至其用處則首不可以加履足不可以納冠盖即體而言而分已在其中矣此論分别異同各有歸􅃐大非答書之比豈其年髙徳盛而所見始益精與因復表而出之以明答書之說誠有未釋然者而龜山所見盖不終於此而已也乾道壬辰孟冬朔旦熹謹書龜山楊氏上程子書曰竊謂道之不明知者過之西銘之書其幾於過乎昔之問仁於孔子者多矣雖顏子仲弓之徒所以告之者不過求仁之方耳至於仁之體未嘗言也孟子曰仁人心也義人路也言仁之最親無如此者然亦體用兩言之未聞如西銘之說也孔孟豈有隠哉盖不敢過之以起後學之弊也且墨氏之兼愛固仁者之事也其流遂至於無父豈墨氏之罪哉孟子力攻之必歸罪於墨子者正其本也故君子言必慮其所終行必稽其所敝正謂此耳西銘發明聖人之㣲意至深然而言體而不及用恐其流遂至於兼愛則後世有聖賢者出推本而論之未免歸罪於横渠也時竊妄意此書盖西人共守而謹行之者欲得先生一言推明其用與西銘並行庶乎體用兼明使學者免於流蕩也横渠之學造極天人之藴非後學所能窺測然所疑如此故輙言之先生以謂何如程子曰前所寄史論十篇其意甚正才一觀便為人借去俟更子細西銘之論則未然横渠之言誠有過者乃在正䝉西銘之為書推理以存義擴先聖所未發與孟子性善養氣之論同功二者亦前聖所未發豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分老幼及人理一也愛無差等本二也分殊之敝私勝而失仁無分之罪兼愛而無義分立而推理一以正私勝之流仁之方也無别而迷兼愛至於無父之極義之賊也子比而同之過矣且謂言體而不及用彼欲使人推而行之本為用也反謂不及不亦異乎龜山第二書曰辱示西銘㣲旨伏讀竟日曉然具悉如侍几席親訓誨也時昔從明道即授以西銘使讀之尋繹累日乃若有得於是始知為學之大方固將終身佩服豈敢妄疑其失比同於墨氏前書所論西銘之書以民為同胞長其長幼其幼以鰥寡孤獨為兄弟之無告盖所謂明理一也然其辭無親親之殺非明者黙識於言意之表烏知所謂理一而分殊哉故竊恐其流遂至兼愛非謂西銘之書為兼愛而發與墨氏同也古之人所以大過人者無他善推其所為而已老吾老以及人之老幼吾㓜以及人之幼所謂推之也孔子曰老者安之少者懐之則無事乎推矣無事乎推者理一故也理一而分殊故聖人稱物平施兹所以為仁之至義之盡也歟何謂稱物逺近親疎各當其分所謂稱也何謂平施所以施之其心一焉所謂平也時昔者竊意西銘之書有平施之心無稱物之義故曰言體而不及用盖指仁義為說也故仁之過其敝無分無分則妨義義之過其流自私自私則害仁害仁則楊氏之為我也妨義則墨氏之兼愛也二者其失雖殊其得罪於聖人則均矣西銘之旨隠奥難知固前聖所未發也前書所論竊謂過之者疑其辭有未達耳今得先生開論丁寜傳之學者自當釋然無惑也能延平李氏答朱子書曰來諭仁是心之正理能發用底一箇端緒如胎育包涵其中生氣無不純備而流動發生自然之機又無頃刻停息憤盈發洩觸處貫通體用相循初無間斷此説推廣得甚好但又云人之所以為人而異乎禽獸者以是而已若犬之性牛之性則不得而與焉若如此説恐有礙盖天地中所生物本源則一雖禽獸草木生理亦無頃刻停息間斷者但人得其秀而最靈五常中和之氣所聚禽獸得其偏而已此其所以異也若謂流動發生自然之機與夫無頃刻停息間斷即禽獸之體亦自如此若以為此理惟人獨得之即恐推測體認處未精於他處便見差也又云須體認到此純一不雜處方見渾然與物同體氣象一段語郤無病又云從此推出分殊合宜處便是義以下數句莫不由此而仁一以貫之盖五常百行無徃而非仁也此説大概是然細推之郤似不曾體認得伊川所謂理一而分殊龜山云知其理一所以為仁知其分殊所以為義之意盖全在知字上用著力禽朱子問昨謂仁之一字乃人之所以為人而異乎獸者先生不以為然某因以先生之言思之而得其説竊謂天地生物本乎一源人與禽獸草木之生莫不各具此理其一體之中即無絲毫欠剩其一氣之運亦無頃刻停息所謂仁也延平李氏曰有有血氣者有無血氣者更體究此處又問氣有清濁故禀有偏正惟人得其正故能知其本具此理而行之而見其為仁物得其偏故雖具此理而不自知而無以見其為仁然則仁之為仁人與物不得不同知仁之為仁而存之人與物不得不異故伊川夫子既言理一分殊而龜山又有知其理一知其分殊之説而先生以為全在知字上用著力恐亦是此意否曰大概得之又問詳伊川之語推測之竊謂理一而分殊此一句言理之本然故盡在性分之内本體未發時看曰須是兼本體已發未發時看合内外為可又問合而言之則莫非此理然其中無一物之不該便自有許多差别雖散殊錯揉不可名狀而纎毫之間同異畢舉所以理一而分殊也知其理一所以為仁知其分殊所以為義此二句乃是於發用處該攝本體而言因此端緒而下工夫以推尋之處也大抵仁者正是天理流動之機以其包容和粹涵育融漾不可名貌故特謂之仁其中自然文理宻察各有定體處便是義只此二字包括人道已盡義固不能出乎仁之外仁亦不離義之内也然則理一而分殊者乃是本然之仁義前此乃以從此推出分殊合宜處為義失之逺矣曰推測一段甚宻為得之加以涵養何患不見道也分或問西銘理一而分殊知其理一所以為仁知其殊所以為義朱子曰仁只是流出來底便是仁各自成一箇物事底便是義仁只是那流行底義是合當做處仁只是發出來底及至發出來有截然不可亂處便是義且如愛其親愛兄弟愛親戚愛鄉里愛宗族推而大之以至於天下國家只是這一箇愛流出來而愛之中便有許多等差且如敬只是這一箇敬便有許多合當敬底如敬長敬賢便有許多分别始予作太極西銘二解未嘗敢出以示人也近見儒者多議兩書之失或乃未嘗通其文義而妄肆詆訶予竊悼焉因出此解以示學徒使廣其傳庶幾讀者由辭以得意而知其未可以輕議也淳熈戊申二月己巳晦翁題西銘總論程子曰訂頑之言極純無雜秦漢以來學者所未到訂頑一篇意極完備乃仁之體也學者其體此意令有諸已其地位已髙到此地位自别有見處不可窮髙極逺恐於道無補也北溪陳氏曰非指與萬物為一處為仁之體乃言天理流行無間為仁之體也又問此下云實有諸已其地位已髙到此地位自别有見處不可窮髙極逺曰見得此理渾然無間實有諸已後日用酬酢無徃而非此理更有何事更何用窮髙極逺訂頑立心便可達天徳學者須先識仁仁者渾然與物同體義禮知信皆仁也識得此理以誠敬存之而已不須防檢不須窮索若心懈則有防心苟不懈何防之有理有未得故須窮索存久自明安待窮索此道與物無對大不足以名之天地之用皆我之用孟子言萬物皆備於我須反身而誠乃為大樂若反身未誠則猶是二物有對以已合彼終未有之又安得樂訂頑意思乃備言此體以此意存之更有何事必有事焉而勿正心勿㤀勿助長未嘗致纖毫之力此其存之之道若存得便合有得盖良知艮能元不䘮失以昔日習心未除郤須存養此心久則可奪舊習此理至約惟患不能守既能體之而樂亦不患不能守也朱子曰明道學者須先識仁一段說話極好只是說得太廣學者難入北溪陳氏曰明道此一段説話乃地位髙者之事學者取此甚逺在學者工夫只從克己復禮入為最要此工夫徹上徹下無所不宜問物字是人物是事物曰仁者與物同體只是言其理之一爾人物與事物非判然絶異事物只自人物而出凡已與人物接方有許多事物出來若於已獨立時初無甚多事此物字皆可以包言所謂訂頑備言此體者亦只是言其理之一爾西銘某得此意只是須得子厚如此筆力他人無縁做得孟子以後未有人及此得此文字省多少言語要之仁孝之理備乎此須臾而不於此則便不仁不孝也游酢於西銘讀之已能不逆於心言語外立得箇意思便能道中庸矣西山真氏曰昔游先生見西銘即渙然不逆於心曰此中庸之理也明道先生稱其能求之語言之外近世學者或未諭其旨愚謂中庸綱領在性道教三言而終篇之義無非教人以全天命之性西銘綱領亦只在其體其性之二言而終篇反復推明亦欲人不失乾父坤母之所賦予者為天地克肖之子而已故游先生以為即中庸之理也豈不信哉孟子之後只有原道一篇其間言語固多病然大要儘近理若西銘則是原道之宗祖也原道郤只說道元未到西銘意思據子厚文醇然無出此文也自孟子後盖未見此書或問伊川謂西銘原道之宗祖如何朱子曰西銘更從上面説來原道言率性之謂道西銘連天命之謂性説了不問原道上數句如何曰首句極不是定名虚位郤妨有仁之道義之道仁之徳義之徳故曰虛位大要未説到上頭故伊川言西銘原道之宗祖韓子於道見其大體規模極分明但未能究其所從來而體察操履處皆不細宻其排佛老亦據其所見而言之耳程先生説西銘乃原道宗祖此言可以推其深淺也一韓退之郤見得又較活亦只是見得第二層上面層郤不曾見得大概諸子之病皆是如此都只是見得下面一層源頭處都不曉所以伊川説西銘是原道之宗祖盖謂此也問西銘如何曰此横渠文之粹者也曰充得盡時如何曰聖人也横渠能充盡否曰言有兩端有有徳之言有造道之言有徳之言説自己事如聖人言聖人事也造道之言則知足以知此如賢人説聖人事也横渠道儘髙言儘醇自孟子後儒者都無他見識西銘明理一而分殊朱子曰西銘要句句見理一而分殊説理一分殊因人疑後方說此一句西銘本不曾西銘通體是一箇理一分殊一句是一箇理一分殊只先看乾稱父三字一篇中錯綜此意問西銘言理一處某頗見之言分殊處郤未見曰有父有母有宗子家相此即分殊也問看西銘覺得句句是理一分殊曰合下便有一箇理一分殊從頭至尾又有一箇理一分殊是逐句恁地又曰合下一箇理一分殊截作兩截只是一箇天人又問他説乾稱父坤稱母予兹藐焉乃混然中處如此則是三箇曰混然中處則便是一箇許多物事都在我身中更那裏去討一箇乾坤理問西銘理一而分殊曰今人只説得中間五六句一而分殊據某看時乾稱父坤稱母直至存吾順事沒吾寜也句句皆是理一分殊喚做乾稱坤稱便是分殊如云知化則善述其事是我述其事窮神則善繼其志是我繼其志又如存吾順事沒吾寜也以自家父母言之生當順事之死當安寜之以天地言之生能順事而無所違拂死則安寜也此皆是分殊處逐句渾淪看便見理一當中横截斷看便見分殊因問如先生復論云推親親之厚以大無我之公因事親之誠以明事天之道看此一句足以包括西銘之統體可見得理一分殊處分曉曰然西銘一篇始末皆是理一分殊以乾為父坤為母便是理一而分殊予兹藐焉混然中處便是分殊而理一天地之塞吾其體天地之帥吾其性分殊而理一民吾同胞物吾與也理一而分殊逐句推之莫不皆然某於篇末亦嘗發此意乾父坤母皆是以天地之大喻一家之小乾坤是天地之大父母是一家之小大君大臣是大宗子家相是小類皆如此推之舊嘗看此寫作旁通圖子分為二截上下推布亦甚分明問西銘理一而分殊若大君宗子大臣家相與民物等皆是分殊處否曰也是如此但這有兩種看這是一直看下更須横截看若只恁地看怕淺了且如乾稱父坤稱母道是父母固是天氣而地質然與自家父母自是有箇親疎從這處便理一分殊了等而下之以至為大君為宗子為大臣為家相其理則一其分未嘗不殊民吾同胞同胞裏面便有理一分殊底意物吾與也吾與裏面也有理一分殊底意無不如此看見伊川説這意較多龜山便正是疑同胞吾與為近於墨氏之兼愛不知他同胞吾與裏面便自分箇理一分殊了如公所説恁地分别分殊殊得也不多這處若不細分别直是與墨氏兼愛一般問西銘句句是理一分殊亦只是事天事親分否曰是乾稱父坤稱母只下稱字便别這箇有直説底意思有横説底意思理一而分殊龜山說得又别他只是以民吾同胞物吾與及長長幼幼為理一分殊曰龜山是直説底意思否曰是然龜山只説得頭一小截伊川意則闊大統一篇言之曰何謂横説底意思曰乾稱父坤稱母便是這箇不是即那事親底便是事天底曰横渠只是借那事親底來形容那事天底做箇様子否曰是先西銘之書横渠先生所以示人至為深切而伊川生又以理一而分殊者贊之言雖至約而理則無餘矣盖乾之為父坤之為母所謂理一者也然乾坤者天下之父母也父母者一身之父母也則其分不得而不殊矣故以民為同胞物為吾與也自其天下之父母者言之所謂理一者也然謂之民則非真以為吾之同胞謂之物則非真以為吾之同類矣此自其一身之父母者言之所謂分殊者也又况其曰同胞曰吾與曰宗子曰家相曰老曰幼曰聖曰賢曰顛連而無告則於其中間又有如是等差之殊哉但其所謂理一者貫乎分殊之中而未始相離耳此天地自然古今不易之理而二夫子始發明之問謝艮齋説西銘理一分殊在上之人當理會理一在下之人當理會分殊如此是分西銘做兩節了艮齋看得西銘錯曰然横渠之言不能無失若西銘一篇誰說得到此今以管窺天固是見北斗别處雖不得見不可謂不是也或問横渠清虚一大之説又要兼清濁虚實朱子曰渠初云清虚一大為伊川詰難乃云清兼濁虚兼實一兼二大兼小渠本要説形而上反成形而下最是於此處不分明如參兩云以參為陽兩為隂陽有太極隂無太極他要强索精思必得於已而其差如此又問横渠云太虛即氣乃是指理為虛似非形而下曰縱指理為虚亦如何夾氣作一處問西銘所見又的當何故郤於此差曰伊川云譬如以管窺天四旁雖不見而其見處甚分明渠他處見錯獨於西銘見得是𢎞而不毅則難立毅而不𢎞則無以居之西銘言𢎞之道觀子厚所作西銘能養浩然之氣者也和靖尹氏曰見伊川後半年方得大學西銘看道夫問尹彦明見伊川後半年方得大學西銘看此意如何朱子曰也是敎他自就切已處思量自看平時箇是不是未便把那書與之讀耳又問如此則末後以此二書併授之還是以尹子已得此意還是以二書互相發故曰他好把西銘與學者讀也是教他知天地間有箇道理恁地開濶尹和靖從伊川半年後方得見西銘大學不知那半年是在做甚麽想見只是且教他聽説話曾光祖云也是初入其門未知次第驟時與他看未得曰豈不是如此人本與天地一般大只為人自小了若能自處以天地之心為心便是與天地同體西銘備載此意顔子克己便是能盡此道龜山楊氏曰西銘只是發明一箇事天底道理所謂事天者循天理而已西銘㑹古人用心要處為文正如杜順作法界觀様西銘只是要學者求仁而已朱子曰西銘前一段如棊盤後一段如人下棊勉齋黄氏曰嘗記師説西銘自乾稱處以下至顛連無告如棊局子之翼也以下如人下棊未曉其意後因思之方知其然乾父坤母至混然中處此四句是綱領言天地人之父母人天地之子也天地之塞帥為吾之體性言吾所以為天地之子之實民吾同胞至顛連無告言民物並生天地之間則皆天地之子而吾之兄弟黨與特有差等之殊吾既為天地之子則必當全吾體養吾性愛敬吾兄弟黨與然後可以為孝子不然則謂之悖逆之子于時保之以下即言人子盡孝之道以明人之所以事天之道所以全吾體養吾性愛敬吾兄弟黨與之道盡於此矣西銘一篇首三句似人破義題天地之帥之塞兩句恰似做原題乃一篇𦂳要處民吾同胞至顛連而無告者也乃統論如此于時保之以下是做工夫處西銘有箇直劈下底道理又有箇横截斷底道理勉齋黄氏曰竊意當時語意似謂每句直下而觀之事天事親之理皆在焉全篇中斷而觀之則上專是事天下專是事親各有攸屬問西銘仁孝之理曰他不是説孝是將這孝來形容這仁事親㡳道理便是事天㡳様子朱子曰道理只是一箇道理中間句句段段只説事親事天問西銘只是言仁孝繼志述事曰是以父母比乾坤主意不是說孝只是以人所易見者明其所難曉耳因事親之誠以明事天之道只是譬喻出來下面一句事親一句事天如匪懈無忝是事親不愧屋漏存心養性是事天下面説事親兼常變而言如曾子是常舜伯竒之徒皆是變此在人事言者如此天道則不然直是順之無有不合者西銘之書指吾體性之所自來以明父乾母坤之實極樂天踐形窮神知化之妙以至於無一行之不慊而沒身焉故伊川先生以為充得盡時便是聖人恐非專為始學者一時所見而發也横渠之意直借此以明彼以見天地之間隨大隨小此理未嘗不同耳其言則固為學者而設若大賢以上又豈須說耶伊川嘗言若是聖人則乾坤二卦亦不消得正謂此也所論西銘名虛而理實此語甚善名雖假借然其理則未嘗有少異也若本無此理則又如之何而可强假耶横渠西銘初看有許多節郤似狹充其量是甚麽樣大合下便有箇乾徤坤順意思自家身已便如此形體便是這箇物事性便是這箇物事同胞是如此吾與是如此主腦便是如此尊髙年所以長其長慈孤弱所以幼其幼又是做工夫處後面節節如此于時保之子之翼也樂且不憂純乎孝者也其品節次第又如此横渠説這般話體用兼備豈似他人只説得一邊問自其節目言之便是各正性命充其量而言之便是流行不息曰然又語林䕫孫曰公既久在此可將一件文字與衆人共理會䕫孫請所看文字曰且將西銘看及看畢䕫孫依先生所解説過先生曰而今解得分曉了便易看南軒張氏曰西銘謂以乾為父坤為母有生之類無不皆然所謂理一也而人物之生血脈之屬各親其親各子其子則其分亦安得而不殊哉是則然矣然即其理一之中乾則為父坤則為母民則為同胞物則為吾與若此之類分固未嘗不具焉龜山所謂用未嘗離體者盖有見於此也似更須説破耳人之有是身也則易以私私則失其正理矣西銘之作唯患夫勝私之流也故推明理之一以示人理則一而其分森然自不可易惟識夫理一乃見其分之殊明其分殊則所謂理之一者斯周流而無敝矣此仁義之道所以常相須也學者存此意涵泳體察求仁之要也天地位而萬物散殊其親疎皆有一定之勢然不知理一則私意將勝而其流敝將至於不相管攝而害夫仁故西銘因其分之立而明其理之本一所謂以止私勝之流仁之方也雖推其理之一而其分森然者自不可亂義盖所以存也大扺儒者之道為仁之至義之盡者仁立則義存義精而後仁之體為無敝也如以民為同胞謂尊髙年為老其老慈孤弱為幼其幼是推其理一而其分殊固自在也故曰分立而推理一以止私勝之流仁之方也若龜山以無事乎推為理一且引聖人老者安之少者懐之為説恐未知西銘推理一之指也雙峰饒氏曰西銘一書規模宏大而條理精宻有非片言之所能盡然其大指不過中分為兩節前一節明人為天地之子後一節言人事天地當如子之事父母何謂人為天地之子盖人受天地之氣以生而有是性猶子受父母之氣以生而有是身父母之氣即天地之氣也分而言之人各一父母也合而言之舉天下同一父母也人知父母之為父母而不知天地之為大父母故以人而視天地常漠然與已如不相闗人於天地既漠然如不相闗則其所存所發宜乎無適而非己私而欲其順天理遏人欲以全天地賦予之本然亦難矣此西銘之作所以首因人之良知而推廣之言天以至徤而始萬物則父之道也地以至順而成萬物則母之道也吾以藐然之身生於其間禀天地之氣以為形而懐天地之理以為性豈非子之道乎其下繼之以民吾同胞物吾黨與而同胞之中復推其大君者為宗子大臣者為宗子之家相髙年者為兄孤弱者為弟聖者為兄弟之合徳乎父母賢者為兄弟之秀出乎等夷疲癃殘疾惸獨鰥寡者為兄弟之顛連而無告者則皆所以著夫竝生天地之間而與我同類者雖有貴賤貧富長幼賢愚之不齊而均之為天地之子也知竝生天地之間而與我同類者均之為天地之子則天地為吾之父母也豈不昭昭矣乎故曰前一節明人為天地之子何謂人事天地當如子之事父母盖子受父母之氣以生則子之身即父母之身人受天地之氣以生則人之性亦即天地之性子之身即父母之身故事親者不可不知所以保愛其身人之性即天地之性則事天者亦豈可不知所以保養其性邪此西銘之作所以既明人為天地之子而復因事親之孝以明事天之道也樂天者不思不勉而順行乎此性猶人子愛親之純而能愛其身者也畏天者戰戰兢兢以保持乎此性猶人子敬親之至而能敬其身者也若夫狥私以違乎理縱欲以害其仁無能改於氣禀之惡而復增益之則是反此性而為天地悖徳賊親不才之子矣盡此性而能踐其形者其惟天地克肖之子乎窮神知化樂天踐形者之事也存心養性而不愧屋漏畏天以求踐乎形者之事也以此修身則為顧養以此及人則為錫類以此處常而盡其道則為底豫為歸全以此處變而不失其道則為待烹為順令愛惡逆順處之若一生順死安兩無所憾事親而至於是則可以為孝子事天而至於是豈不可以為仁人乎故曰後一節言人之事天地當如子之事父母此篇之指大畧如此朱夫子所謂推親親之厚以大無我之公因事親之誠以明事天之道亦此意也嗚呼繼志述事孝子之所以事親也存心養性君子之所以事天也事親事天雖若兩事然事親即所以為事天之推而善事天者乃所以為善事其親者也張子全書卷一
