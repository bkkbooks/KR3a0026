body:
  text: 張子全書卷八祭祀無後者必祭借如有伯祖至孫而絶則伯祖不得言無後蓋有子也至從父然後可以言無後也夫祭者必是正統相承然後祭禮正有所統屬今既宗法不正則無緣得祭祀正故且須參酌古今順人情而為之今為士者而其廟設三世几筵士當一廟而設三世似是只於禰廟而設祖與曾祖位也有人又有伯祖與伯祖之子者當如何為祭伯祖則自當與祖為列從父則自當與父為列苟不如此使死者有知以人情言之必不安禮於親疏逺近則禮自有煩簡或月祭之或享嘗乃止故拜朔之禮施於三世伯祖之祭止可施於享嘗平日藏其位版於櫝中至祭時則取而夾之其位則自如尊卑只欲尊祖豈有逆祀之禮若使伯祖設於他所則似不得夾祭皆人情所不安便使庶人亦須祭及三代大夫士有大事省於其君干祫及其高祖近世亦有祭禮於男子之位禮物皆同而於其配皆有降殺凡器皿俎豆筵席純緣之類莫不異也此意亦近得之其從食者必又有降雖古人必須有此降殺以明尊卑親疏故今設袝位雖以其班亦須少退其禮物當少損其主祭者於袝食者若其尊也則不必親執其禮必使有司或子弟為之祭接鬼神合宗族施德惠行教化其為備須是豫故至時受福也羞無他物則雖羞一品足矣既曰庶矣則惟恐其不多有則共載一器中簿正之外多無妨古者既為孟月之祭又為仲月之薦薦者祭之略今之祭不若仲月祭之大抵仲月為薦新今將新物便可仲月祭之蓋物之成不如仲月因時感念之深又不如仲月祭必卜日若不卜日則時同時同則大宗小宗之家無由相助今之士大夫主既在一堂何不合祭之分而作夏秋特祭則無義天子七廟一日而行則力不給故禮有一特一祫之說仲特則祭一祫則偏祭如春祭享祖夏祫羣廟秋祭曽冬又祫來春祭祖夏又祫秋祭禰冬又祫鋪筵設同几只設一位以其精神合也後又見合葬孔子善之知道有此義然不知一人數娶設同几之道又如何此未易處奠酒奠安置也若言奠摰奠枕是也謂注之於地非也祭則香茶非古也香必燔柴之意茶用生人意事之膟骨升首今已用之所以達臭也古人因祭祀大事飲食禮樂以㑹賔客親族重専殺必因重事今人之祭但致其事生之禮陳其數而已其於接鬼神之道則未也祭祀之禮所總者博其理甚深今人所知者其數猶不足又安能達聖人致祭之義凡薦如有司執事者在外庖為之則男子薦之又如籩豆之類本婦人所為者復婦人薦之禮義之家雖奴婢出而之他必能笑人之喪祭無理者賢者之效不為細也五更而祭非禮也庶羞不踰牲不豐於牲也傳者以品之不踰非也豈有牲體少而羞掩豆是謂之踰牲尸惟虞則男女皆有是初祔廟時也至於吉祭則惟見男尸而不見女尸則必女無尸也當初祔時則不可以無尸節服氏言郊祀而送逆尸車則祀天有尸也天地山川之類非人鬼者恐皆難有尸節服氏言郊祀有亦不害后稷配天而有尸也詩序有言靈星之尸此說似不可取絲衣之詩正是既祭之明日求神於門其始必有祭其實所以賔禮尸也天子既以臣為尸不可祭罷便使出門而就臣位故其退尸也皆有漸言絲衣已是不著冕服言辨已是不冠冕也漸有從便之禮至於燕尸必極醉飽所謂不吳不敖胡考之休吳敖猶言娛樂也不娛樂何以成其休考祭所以有尸也蓋以示教若接鬼神則室中之事足矣至於事尸分明以孫行反以子道事之則事親之道可以喻矣抱孫不抱子父於子主尊嚴故不抱孫自有其父故在祖則可抱非謂尸而抱也七廟之主聚於太祖者此蓋有意以其當有祧者且祧者當易擔故盡用出之因而祧之用意婉轉古者言遷主不見所以安置之所若祭器祭服則有焚埋之說木主不知置之何地又公出疆及大夫出聘皆載遷廟之主而行以此觀之則是主常存也然則當其祫時必皆取而合祭也庶人當祭五世以恩須當及也然其祫也止可謂之合食祫祭既不見男女異廟之文今以人情推之且不若男從東方女從西方而太祖居南面男祔其祖婦祔其姑雖一人數娶猶不妨東方虛其位以應西方之數其次世則復對西方之配也凡人家正㕔似所謂廟也猶天子之受正朔之殿人不可常居以為祭祀吉凶冠婚之事於此行之㕔後謂之寢又有適寢是下室所居之室也去壇為墠去墠曰鬼從廟數以至壇墠皆有等差定數至於鬼只是鬼饗之又非孝經所謂鬼饗也此言鬼饗既不在廟與壇墠之數即并合上世一齊饗之而已非更有位次分别直共一饗之耳只是懷精神也鬼者只是歸之太虛故共饗之也既曰鬼饗之又分别世數位次則後將有百世之鬼也既是壇墠則其禮必不如宗廟但鬼饗之耳鬼饗之者血毛以為尚也孝經言為之宗廟而鬼饗之又不與此意同彼之為鬼者只以人死為鬼猶周禮言天神地祇人鬼山川之祀止是其如此巍然而高淵然而深蒸潤而足以興雲致雨必報之故祀之視三公諸侯何嘗有此人像聖人為政必去之八蠟先嗇一也始治稼穯者據易則神農是也司嗇是修此職者二也農三也郵表畷四也貓虎五也坊六也水庸七也百種八也百種百穀之種舊說以昆蟲為八昆蟲是為害者不當祭此嵗終大報也龍見而雩當以孟夏為百穀祈甘雨也水旱既其氣使然祈禱復何用意也民患若此不可坐視聖人憂民而已如人之疾其子祈禱不過卒歸無益也故曰丘之禱久矣月令統秦為月令必取先王之法以成文字未必實行之道千乘之國敬事而信節用而愛人使民以時此皆法外之意秦苟有愛民為惠之心方能行徒法不以行須實有其心也有其心而無其法則是雖有仁心仁聞不行先王之道不能為政於天下古者諸侯之建繼世以立此象賢也雖有不賢者象之而已天子使吏治其國彼不得暴其民如舜封象是不得已用禮建國大小必參相得蓋皆建大國其勢不能相下皆小國則無紀以小事大莫不有法泰社王為羣姓所立必在國外也民各有社不害為泰社王社王自立為社必在城內在漢猶有泰社在唐只見一社章旒之數自九降至五皆降差以兩竒數有君之象四以下恐是諸侯卿大夫之服井田而不封建猶能養而不能教封建而不井田猶能教而不能養封建井田而不肉刑猶能教養而不能使然此未可遽行之四時搜狩田獵教師行於草莽之法行於草莽則潛師潛師夜戰聲相聞易曰伏戎于莽喪紀喪不慮居也非無薪也必毁屋扉明於死者無所愛惜所以趨其急也鄭氏之說恐非喪須三年而祔若卒哭而祔則三年都無事禮卒哭猶存朝夕哭若無祭於殯宮則哭於何處古者君薨三年喪畢吉禘然後祔因其祫祧主藏於夾室新主遂自殯宮入於廟國語言日祭月享禮中豈有日祭之禮此正謂三年之中不徹几筵故有日祭朝夕之饋猶定省之禮如其親之存也至於祔祭須是三年喪終乃可祔也卒哭者卒去非常之時哭非不哭也故伯魚期而猶哭也古人於忌日不為薦奠之禮特致哀示變而已古人亦不為影像繪畫不真世逺則棄不免於褻慢也故不如用主古人猶以主為藏之於櫝設之於位亦為褻慢故始無設為重鬲以為主道其形制甚陋止用葦蔑為之又設於中庭則是敬鬼神而逺之之義重主道也士大夫得其重應當有主既埋重不可一日無主故設苴及其已作主即不用苴重主道也謂人所嗜者飲食故死以飲食依之既葬然後為主未葬之時棺柩尚存未可為主故以重為主今人之喪既設魂帛又設重則是兩主道也古之椁言井椁以大木自下排上來非如今日之籠棺也故其四隅有隙可以置物也祔葬祔祭極至理而論只合祔一人夫婦之道當其初昏未嘗約再配是夫只合一娶婦只是合一嫁今婦人夫死而不可再嫁如天地之大義然夫豈得而再娶然以重者計之養親承家祭祀繼續不可無也故有再娶之理然其葬其祔雖為同穴同筵几然譬之人情一室中豈容二妻以義斷之須祔以首娶繼室别為一所可也正叔嘗為葬說有五相地須使異日決不為道路不置城郭不為溝渠不為貴家所奪不致耕犁所及安穴之次設如尊穴南面北首陪葬者前為兩列亦須北首各於其穴安夫婦之位坐於堂上則男東而女西臥於室中則男外而女內也葬法有風水山岡此全無義理不足取南方用青囊猶或得之西方人用一行尤無義理南方試葬地將五色帛埋於地下經年而取觀之地美則采色不變地氣惡則色變矣又以器貯水養小魚埋經年以死生卜地美惡取草木之榮枯亦可卜地之美惡韓退之以少孤養於嫂故為嫂服加等大抵族屬之喪不可有加若為嫂養便以有恩而加服則是待兄之恩至薄大抵無母不養於嫂更何處可養若為族屬之親有恩而加等則待己無恩者可不服乎哉昔有士人少養於嫂生事之如母死自處以齊衰或告之非先王之禮聞而遂除之惟持心喪遂不復應舉人以為得體禮云大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以娶婦疑大功之末以下十二字為衍宜直云父大功之末云云父大功之末則是已小功之末也而已之子緦麻之末也故可以冠娶也蓋冠娶者固己無服矣凡卒哭之後皆是末也所以言衍者以上十二字義無所附著已雖小功既卒哭可與冠取妻是己自冠取妻也子上之母死而不喪門人問諸子思曰昔者先君子喪出母乎曰然子之不使白也喪之何也子思曰昔先君子無所失道道隆則從而隆道汙則從而汙伋則安能出妻不當使子喪之禮子於母則不忘喪若父不使子喪之為子固不可違父當默持心喪亦禮也若父使之喪而喪之亦禮也子思以我未至於聖孔子聖人處權我循禮而已聖人不制師之服師無定體如何是師見彼之善而已效之便是師也故有得其一言一義如朋友者有相親炙而如兄弟者有成就己身而恩如天地父母者豈可一槩服之故聖人不制其服心喪之可也孔子死弔服如麻亦是服也卻不得謂無服也禮稱母為長子斬三年此理未安父存子為母期母如何卻服斬此為父只一子死則世絶莫大之戚故服斬不如此豈可服斬父在母服三年之喪則家有二尊有所嫌也處今之宜但可服齊衰一年外可以墨衰從事可以合古之禮全今之制同母異父之兄弟小功服之可也或云未之前聞當古之時又豈有此事三年之喪二十五月而畢又兩月為禫共二十七月禮鑽燧改火天道一變其期已矣情不可以已於是再期再期又不可以已於是加之三月是二十七月也大功以下算閏月期已上以朞斷不算閏月三年之喪禫祥閏月亦算之古者為舅姑齊衰期正服也今斬衰三年從夫也孔子惡哭諸野者謂其有服之喪不哭諸家而哭諸野者也師不立服不可立也當以情之厚薄事之大小處之如顔閔於孔子雖斬衰三年可也其成己之功與君父並其次各有淺深稱其情而已下至曲藝莫不有師豈可一槩制服受祥日食肉彈琴恐不是聖人舉動使其哀未忘則子於是日哭不飲酒食肉以全哀况彈琴可乎使其哀已忘何必彈琴為人後者為其父母不論其族逺近並以期服服之據今之律五服之內方許為後以禮文言又無此文若五服之內無人使後絶可乎必須以疏屬為之後也有適母在其所生母死禮雖服緦亦當心喪難以求仕祭器祭服以其嘗用於鬼神不敢褻用故具埋焚之禮至於衰絰冠履不見所以毁之丈惟杖則言棄諸隱者棄諸隱者不免有時而褻何不即焚埋之常謂喪服非為死者己所以致哀也不須道敬喪服也禮云齊衰不以邊坐大功不以服勤皆言主在哀也非是為敬喪服不邊坐專席而坐禮云有憂者側席而坐有喪者專席而坐有憂則意不安故側席而坐側席者坐不安也有喪者則專在於哀不為容也故專席而坐得席則坐更無所遜於前後是以無容也大功不以服勤不以服勤勞之事皆是不二事之義也毁喪服者必於除日毁以散諸貧者或諸守墓者皆可也蓋古人不惡凶事而今人以為嫌留之家人情不悅不若散之焚埋之又似惡喪服練亦謂之功衰蓋練其功衰而衣之爾據曾子問三年之喪不弔又雜記三年之喪雖功衰不以弔又服三年之喪既練矣有期之喪既葬矣則服其功衰又雜記有父母之喪尚功衰此云尚功衰蓋未祥之前尚衣輕練之功衰耳知既練猶謂之功衰者以下文云則練冠三年之喪禮不當弔而雜記又云雖功衰不以弔兼服之服重者以易輕者舊注不可用此為三年之喪以上而言故作記者以斬齊及大功明之若斬衰既練齊衰既卒哭則首帶皆葛又有大功新衰之麻則與齊之首絰麻葛兩施之既不敢易斬葛之輕以斬葛大於大功之麻又不敢易齊首之重輕者方敢易去則重者固當存故麻葛之絰兩施於首若大功既葬則當服齊首之葛不服大功之葛所謂兼服之服重者則變輕者正謂此爾若齊麻未葛則大功之麻亦止當免則絰之而已如此喪變雖多一用此制前後禮文不相乖戾練衣必煅煉大功之布以為衣故有言功衰功衰上之衣也以其著衰於上故通謂之衰必著受服之上稱受者以此得名受蓋受始喪斬疏之衰而著之變服其意以喪久變輕不欲摧割之心亟忘於內也此說昔嘗與學者言之今二年始獲二人同矣古之冠也縮縫古之吉冠縮縫也今之冠也衡縫今之吉冠衡縫也吉冠當縮縫喪冠當衡縫今喪反吉非古也小功大功言末恐止是以卒哭之後為末齊衰不言末謂其無是禮也小祥乃練其功衰而衣之則練與功衰非二物也有父母之喪尚功衰此尚功衰謂末祥猶衣所練之功衰未衣麻衣也特牲少牢饋食一出孺悲之學不勝欽歎父母張子全書卷八
