body:
  text: 張子全書卷十一易說下繫辭上天尊地卑乾坤定矣卑高以陳貴賤位矣先分天地之位乾坤立則方見易故其事無非易也所以先言天地乾坤易之門户也不言高卑而曰卑高者亦有義高以下為基亦是人先見卑處然後見高也不見兩則不見易闕物物象天地不曰天地而乾坤云者言其用也乾坤亦何形猶言神也人鮮識天天竟不可方體姑指日月星辰處視以為天隂陽言其實乾坤言其用如言剛柔也乾坤則所包者廣動靜有常剛柔斷矣動靜隂陽性也剛柔其體未必形靜專動直不為物纍則其動靜有常不牽制於物也然則乾為剛果斷然不疑矣直一作著天地動靜之理天圓則須動轉地方則須安靜在天成象在地成形變化見矣有形有象然後知變化之驗是故剛柔相摩以人言之喘息是剛柔相摩氣一出一入上下相摩錯也於鼻息見之人自鼻息相摩以蕩於腹中物既消爍氣復升騰乾知大始坤作成物乾以易知坤以簡能天地雖一物理須從分别大始者語物之始乾全體之而不遺故無不知也知之先者蓋莫如乾成物者物既形矣故言作已入於形氣也初未嘗有地而乾漸形不謂知作謂之何哉然而乾以不求知而知故其知也速坤以不為而為故其成也廣易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣天下之理得而成位乎其中矣此皆言人體天地之德然也可久者以久逺推行可大者其得體也大凡語道理之徒道達不已竟亦何所求推行及民故以賢人措諸事業而言易簡理得而成乎天地之中蓋盡人道並立乎天地以成三才則是與天地參矣但盡人道理自當耳不必受命仲尼之道豈不可以參天地言知者知而己言能者涉於形氣能成物者也易則易知易知則有親今夫虎豹之為物豢之雖馴人亦不敢遂以親狎為其難測惟其平易則易知易信信則人任焉以其可信人斯委任故易以有功矣道體至廣所以有言易有言小有言大無乎不在坤至柔而動也剛乃積大勢成而然爾乾至健無體為感速故易知坤至順不煩其施普故簡能志大則才大事業大故曰可大又曰富有志久則氣久德性久故曰可久又曰日新德業不可久不可大不足謂之賢况可謂之聖乎易簡理得則知幾知幾然後經可正天下達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉成位乎其中與天地合其德聖人設卦觀象繫辭焉而明吉凶剛柔相推而生變化是故吉凶者失得之象也悔吝者憂虞之象也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也吉凶者失得之著也變化者進退之著也設卦繫辭所以示其著也吉凶變化悔吝剛柔易之四象歟悔吝由羸不足而生亦兩而已變化進退之象云者進退之動也微必驗之於變化之著故察進退之理為難察變化之象為易六爻盡利而動所以順隂陽剛柔仁義性命之理也故曰六爻之動三極之道也是故君子所居而安者易之序也序猶言分也易之中有貴有賤有吉有凶皆其自然之分也所居皆安之君子安分也所樂而玩者爻之辭也言君子未嘗須臾學不在易玩玩習也每讀則每有益所以可樂動則觀其變而玩其占占非卜筮之謂但事在外可以占驗也觀乎事變斯可以占矣蓋居則觀其象而玩其辭此所以動則觀其變而玩其占也彖者言乎其象也象謂一卦之質齊小大者存乎卦卦有稱名至小而與諸卦均齊者各著其義也蓋稱名小而取類大也辨吉凶者存乎辭欲見小疵者必存乎辭憂悔吝者存乎介悔吝吉凶之萌惟介於石者能見幾而作憂悔吝者存乎介欲觀易象之小疵宜存志靜知所動之幾微也靜知亦作靜志震無咎者存乎悔凡言無咎者必求其始皆有悔今能改之也有咎而免者善震而補也易與天地凖故能彌綸天地之道易與天地凖此言易之書也易行乎其中造化之謂也言彌綸範圍此語必夫子所造彌者彌縫補綴之義綸者往來經營之義易之為書與天地凖易即天道獨入于爻位繫之以辭者此則歸於人事蓋卦本天道三隂三陽一升一降而變成八卦錯綜為六十四分而有三百八十四爻也因爻有吉凶動靜故繫之以辭存乎教誡使人動則觀其變而玩其占其出入以度內外使知懼又明於憂患與故無有師保如臨父母聖人與人撰出一法律之書使人知所向避易之義也仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之說天文地理皆因明而知之非明則皆幽也此所以知幽明之故萬物相見乎離非離不相見也見者由明而不見非無物也乃是天之至處彼異學則皆歸之空虛蓋徒知乎明而已不察夫幽所見一邊耳氣聚則離明得施而有形氣不聚則離明不得施而無形方聚也安得不謂之有方其散也安得遽謂之無故聖人仰觀俯察但云知幽明之故不云知有無之故盈天地之間者法象而已文理之察非離不相覩也方其形也有以知幽之故方其不形也有以知明之故與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流知天地無私則於道不離然遺物而獨化又過乎大中之表也故下文曰範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知未能周萬物則必有過過失也君子立法必其智周天下之利害而其道又足以濟天下然後不過過失也知周萬物道濟天下然後不錯若不如此或得於彼則或失於此也天惟運動一氣鼓萬物而生無心以恤物聖人則有憂患不得似天天地設位聖人成能聖人主天地之物又智周乎萬物而道濟天下必也為之經營不可以有憂付之無憂旁行不流圓神不倚也安土敦乎仁故能愛安土樂其所自生忠厚之道也範圍天地之化而不過過則溺於空淪於靜既不能存其神又不能知夫化矣大抵過則不是著有則是著無聖人自不言有無諸子乃以有無為說說有無斯言之陋也在易則惟曰神則可以兼統通乎晝夜之道而知不偏滯於晝夜之道故曰通知故神無方而易無體繫辭言易大槩是語易書制作之意其言易無體之類則是天易也神易雖是一事方與體雖是一義以其不測故言無方以其生生故言無體然則易近於化一隂一陽之謂道一隂一陽是道也能繼繼體此而不已者善也善之猶言能繼此者也其成就之者則必俟見性是之謂聖仁者不已其仁始謂之仁知者不已其知方謂之知此是致曲曲能有誠也誠則有變化必仁智會合乃為聖人也前謂聖者於一節上成性也夷惠所以亦得稱聖人然行在一節而已百姓日用而不知蓋所用莫非在道飲食男女皆性也但己不自察由旦至暮凡百舉動莫非感而不之知今夫心又不求感又不求所以醉而生夢而死者衆也繼之者善也成之者性也言繼繼不已者善也其成就者性也仁智各以成性猶仁禮以成性勉勉而不息可謂善成而存存在乎性仁知見之所謂曲能有誠者也不能見道其仁知終非性之有也性未成則善惡混故亹亹而繼善者斯為善矣惡盡去則善因以亡故舍曰善而曰成之者性神不可致思存焉可也化不可助長順焉可也存虛明久至德順變化達時中仁之至義之盡也知微知彰不舍而繼其善然後可以成之性矣仁者見之謂之仁知者見之謂之知聞見不足以為己有仁者見之謂之仁知者見之謂之知心各有本性始為己有茍未見性須當勉勉今學者既知趨向殊不費力何謂不勉勉百姓日用而不知百姓日用不知溺於流也鼓萬物而不與聖人同憂老子言天地不仁以萬物為芻狗此是也聖人不仁以百姓為芻狗此則異矣聖人豈有不仁所患者不仁也天地則何意於仁鼓萬物而已聖人則仁耳此其為能𢎞道也天不能皆生善人政以天無意也鼓萬物而不與聖人同憂聖人之於天下法則無不善也然古者治世多而後世不治何也人徒見文字所記自唐虞以上幾治幾亂須歸之運數有大運有小運故孟子曰天之生民久矣一治一亂系之為言或說易書或說天或說人卒歸一道蓋不異術故其參錯而理則同也鼓萬物而不與聖人同憂則於是分出人之道不可混天鼓萬物而與聖人同憂此言天德之至也與天同憂樂垂法於後世雖是聖人之事亦猶聖人之末流耳神則不屈無復回易鼓萬物而不與聖人同憂者此直謂天也天則無心神故可以不詘聖人則豈忘思慮憂患雖聖亦人耳焉得遂欲如天之神庸不害於其事聖人茍不用思慮憂患以經世則何用聖人天治自足矣聖人所以有憂者聖人之仁也不可以憂言者天也蓋聖人成能所以異於天地富有之謂大業日新之謂盛德富有廣大不禦之盛歟日新悠久無疆之道歟富有者大無外也日新者久無窮也顯其聚也隱其散也顯且隱幽明所以存乎象聚且散推蕩所以妙乎神日新之謂盛德過而不有不凝滯於心知之細也非盛德日新惟日新是謂盛德義理一貫然後日新生生之謂易生生猶言進進也極數知來之謂占極數知來前知也前知其變有道術以通之君子所以措於民者遠矣通變之謂事能通其變而措於民聖人之事業也易簡之善配至德循天下之理之謂道得天下之理之謂德故曰易簡之善配至德知崇禮卑崇效天卑法地天地設位而易行乎其中矣成性存存道義之門非知德不崇非禮業不廣崇天也形而上也通晝夜之道而知其知崇矣知及之而不以禮性之非己有也故知禮成性而道出如天地位而易行天地位定而易行其中知禮成而道義出夫易聖人所以崇德廣業以知為德以禮為業也蓋知崇則德崇矣此論易書之道而聖人亦以教人天地設位而易行乎其中比下文成性存存道義之門而言也天地設位故易行乎其中知禮成性則道義自此而出也道義之門者由仁義行也聖人亦必知禮成性然後道義從此出譬之天地設位則造化行於其中知則務崇禮則惟欲乎卑成性須是知禮存存則是長存知禮亦如天地設位何以致不息成性則不息誠成也誠為能成性也仁人孝子所以成身柳下惠不息其和也伯夷不息其清也於清和以成其性故亦得為聖人也然清和猶是一端不得完正不若知禮以成性即道義從此出智極其高故效天禮著實處故法地人必禮以立失禮則孰為道天地設位而易行乎其中成性存存道義之門得知禮以成性性乃存然後道義從此出學不能自信而明者患在不勉耳當守道不回如川之流源泉混混不捨晝夜無復回却則自明自得之也易曰繼之者善也惟能相繼而不已者道之善也至于成性則不勉而中不思而得從容中道矣易曰成性存存道義之門繫辭焉以斷其吉凶是故謂之爻言天下之至賾而不可惡也易語天地隂陽情僞至隱賾而不可惡也諸子馳騁說辭窮高極幽而知德者厭其言故言為非艱使君子樂取之為貴易之為書有君子小人之雜道有隂陽爻有吉凶之戒使人先事決疑避凶就吉擬之而後言議之而後動擬議以成其變化凡一言動是非可不可隨之而生所以要愼言動擬之而後言議之而後動不越求是而己自此以下皆著爻象之詞所以成變化之道擬議以教人也凡有一迹出則便有無限人議論處至如天之生物亦甚有不齊處然天則無心不恤此所以要愼易曰擬之而後言議之而後動只是要求是也子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭君子自知自信了然不惑又於出處語默之際獲與人同則其志決然利可斷金惟仁者能聽盡言己不欲為善則己茍欲為善惟恐人之不言二人同心其利斷金夫一人固自明矣又有一人言而同心其為利也如金鐵之可斷義理必至于出處語默之不可易如此其同也己固自信又得一人與之同故利可斷金大衍之數五十其用四十有九大衍之數五十其用四十有九天地之數也一固不為用天一地二天三地四天五地六天七地八天九地十夫混然一物無有終始首尾其中何數之有然言者特示有漸耳理須先數天又須先言一次乃至於十也且天下之數止於十窮則自十而反一又數當止於九其言十者九之耦也揚雄亦曰五復守於五行者蓋地數無過天數之理孰有地大於天乎故知數止於九九是陽極也十也者姑為五之耦焉耳分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後掛天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也乾之策二百一十有六坤之策百四十有四凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也極兩兩是謂天參雖三其實一也象成而未形也兩兩地兩效剛柔之法也七離九六坎八參天兩地此但天地之質也通其數為五乾坤止合為坎離之數當六七精為日月粗為水火坎離合而後萬物生得天地最靈為人故人亦參為性兩為體推其次序數當八九八九而下土其終也故土之為數終於地十過此以往萬億無窮不越十終反一而己陽極於九隂終於十數乃成五行奇耦乃備過此周而反始滋至無算不越於是陽用其極隂不用極而用六者十者數之終九之配也地無踰天之理終於其終而己焉參天兩地五也一地兩二也三三地兩六也坤用五五地兩十也一天三三也天三九也乾用天三十五也凡三五乘天地之數總四十有五並參天兩地者數之五共五十虛太極之一故其用四十有九掛一象三象天地之三也揲象四時四時揲之數不過十十時乃三歲半舉三揲多之餘也直云五歲再閏者盡餘多之極也揲餘九則揲者四十而已四十乃時之數也六七八九十五四三二一此相間循環之數也五位相得而各有合一二相間是相得也各有合以對相合也如一六二七三八四九各有合神也位相得化也奇所掛之一也扐左右手四揲之餘也再扐後掛者每成一爻而後掛也謂第二第三揲不掛也閏常不及三歲而再至故曰五歲再閏此歸奇必俟於再扐者象閏之中間再歲也成變化行鬼神成行隂陽之氣而已矣是故四營而成易十有八變而成卦八卦而小成引而伸之觸類而長之天下之能事畢矣顯道神德行是故可與酬酢可與祐神矣示人吉凶其道顯隂陽不測其德神顯故可與酬酢神故可與祐神受命如響故可與酬酢知來藏往故可與祐神示人吉凶其道顯矣知來藏往其德行神矣語蓍龜之用也顯道者危使平易使傾懼以終始其要無咎之道也神德行者寂然不動𡨕㑹於萬化之感而莫知為之者也受命如響故可與酬酢曲盡鬼謀故可與祐神顯道神德行此言蓍龜之行也子曰知變化之道者其知神之所為乎化之於己須臾之化則知須臾之頃必顯一日之化則知一日之化有殊易知變化之道則知神之所為又曰知幾其神乎惟神為能變化以其一天下之動也人能知變化之道其必知神之為也聖人之進豈不自見今在學者區别是非有化於神者猶能知之况聖人乎易言窮神知化又言知變化之道安得不知易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占辭變象占皆聖人之所務也易道具焉一本無易道具焉四字有故曰神而明之存乎其人十字尚辭則言無所茍尚變則動必精義尚象則法必致用尚占則謀必知來四者非知神之所為孰能與於此知德之難言知之至也孟子謂我於辭命則不能又謂浩然之氣難言易謂不言而信存乎德行又以尚辭為聖人之道非知德達乎是哉學未至于知德語皆有病形而上者得辭斯得象矣故變化之理須存乎辭言所以顯變化也易有聖人之道而曰以言者尚其辭辭者聖人之所以聖人言命字極難辭之盡理而無害者須出於精義易有聖人之道四曰以言者尚其辭必至於聖人然後其言乃能無敝蓋由精義所自出也故辭不可以不修是以君子將有為也將有行也問焉而以言其受命也如響無有遠近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天地之文極其數遂定天下之象非天下之至變其孰能與於此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也有不知則有知無不知則無知是以鄙夫有問仲尼竭兩端而空易受命乃如響無有遠近幽深遂知來物非天下之至精孰能與於此言易之為書也至精者謂聖人窮理極盡精微處中庸所謂至矣天下之理斯盡因易之三百八十四爻變動以寓之人事告人以當如何時如何事如何則吉如何則凶宜動宜靜丁寧以為告戒所以因二以濟民行也既言參伍矣參伍而上復如何分别氣之聚散於太虛猶氷凝釋於水知太虛即氣神變易而已諸子淺妄有有無之分非窮理之學也易非天下之至精則辭不足待天下之問非深不足通天下之志非通變極數則文不足以成物象不足以制器幾不足以成務非周知兼體則其神不能通天下之故不疾而速不行而至也非至精至變至神不能與故曰神而明之存乎其人無知者以其無不知也若言有知則有所不知也惟其無知故能竭兩端易所謂寂然不動感而遂通也無知則神矣茍能知此則於神為近無知者亦以其術素備也道前定則不窮一故神譬之人身四體皆一物故觸之而無不覺不待心使至此而後覺也此所謂感而遂通不行而至不疾而速也物形乃有小大精粗神則無精粗神即神而己不必言作用譬之三十輻共一轂則為車若無轂與輻亦何以見車之用感皆出於性性之流也惟是君子上達小人下達之别易言感而遂通者蓋語神也雖指暴者謂之神然暴亦固有漸是亦化也聖人通天下之志雖愚人與禽獸猶能識其意有所感則化感亦有難專以化言感而遂通者神又難專謂之化也天一地二天三地四天五地六天七地八天九地十此語恐在天數五地數五處然聖人之於書亦有不欲併一說盡慮易知後則不復研究故有易有難或在此說或在彼說然要終必見但俾學者潛心子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也開物成務物凡物也務事也開明之也成處之也事無大小不能明何由能處雖至粗至小之事亦莫非開物成務譬如不深耕易耨則稼穡烏得而立惟深也故能通天下之志惟幾也故能成天下之務是則開物成務者必也有濟時之才是故聖人以通天下之志以定天下之業以斷天下之疑是故蓍之德圓而神卦之德方以知圓神故能通天下之志方知故能定天下之業爻貢所以斷天下之疑易書成三者備民患明聖人得以洗濯其心而退藏於密矣能通天下之志者為能感人心吉凶與民同患吉凶可以正勝非聖人之患也神以知來知以藏往非神不能顯諸仁非知不知藏諸用開物於幾先故曰知來明憂患而弭其故故曰藏往古之聰明睿知神武而不殺者夫神武不殺神知之大者使知懼而不犯神武者也是以明於天之道而察於民之故是興神物以前民用言天之變遷禍福之道由民之逆順取捨之故故作易以先之聖人以此齊戒以神明其德夫民患除憂疑亡用利身安故可退藏於密窮神知化以崇高其德也自此而下又歷言其德之出而異名也是故闔戶謂之坤闢戶謂之乾一闔一闢謂之變闔戶靜密也闢戶動達也形開而目覩耳聞受於陽也一動一靜是道之常專於動靜則偏也一闔一闢謂之變人之有息蓋剛柔相摩乾坤闔闢之象也制而用之謂之法因其變而裁制之以教天下聖人之法也利用出入民咸用之謂之神用之不窮莫知其鄉故名之曰神是故易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業四象即乾之四德四時之象故下文云變通莫大乎四時盡吉凶之理則能盡天人之助而成位乎其中矣故下云崇高莫大乎富貴有吉凶利害然後人謀作大業生若無施不宜則何業之有天生神物聖人則之天生蓍龜聖人則之以占兆一云占之以兆天地變化聖人效之天地變化聖人作易以著效之故曰聖人效之天垂象見吉凶聖人象之作易以示人猶天垂象見吉凶河出圖洛出書聖人則之作書契效法猶地出圖書一云猶河洛易曰自天祐之吉無不利子曰祐者助也天之所助者順也自易曰自天祐之此篇宜在立心勿恆凶下蓋上言莫益之故此言多助也變而通之以盡利理勢既變不能與時順通非盡利之道鼓之舞之以盡神鼓天下之動者存乎神神一作詞天下之動神鼓之也神則主於動故天下之動皆神為之也詞不鼓舞則不足以盡神詞謂易之詞也於象固有此意矣又繫之以詞因而駕說使人向之極盡動之義也歌舞為巫風言鼓舞之盡神者與巫之為人無心若風狂然主於動而己故以好歌舞為巫風猶之如巫也巫主於動以至于鼓舞之極也故曰盡神因說鼓舞之義故取巫以為言語其動而已乾坤其易之縕邪乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣隂陽剛柔仁義之本立而後知趨時應變故乾坤毁則無以見易感而後有通不有兩則無一故聖人以剛柔立本乾坤毁則無以見易乾坤既列則其間六十四卦爻位錯綜以為變成茍乾坤不列則何以見易易不見則是無乾坤乾坤天地也易造化也聖人之意莫先乎要識造化既識造化然後有理可窮彼惟不識造化以為幻妄也不見易則何以知天道不知道則何以語性是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業一隂一陽不可以形器拘故謂之道乾坤成列而下皆易之器乾坤交變因約裁其變而别之故謂之變推而行其變盡利而不遺可謂通矣舉盡利之道而錯諸天下之民以行其典禮易之事業也遺一作匱約裁其化而指别之則名體各殊故謂之變運於無形之謂道形而下者不足以言之鼓萬物而不與聖人同憂天道也聖不可知也無心之妙非有心所及也形而上是無形體者也故形以上者謂之道也形而下是有形體者故形以下者謂之器無形迹者即道也如大德敦化是也有形迹者即器也見於事實如禮義是也聖人因天地之化裁節而立法使民知寒暑之變故謂之春夏秋冬亦化而裁之一端耳凡不形以上者皆謂之道惟是有無相接與形不形處知之為難須知氣從此首蓋為氣能一有無無則氣自然生是道也是易也化而裁之存乎變推而行之存乎通變則化由粗入精也化而裁之謂之變以著顯微也化而裁之存乎變存四時之變則周歲之化可裁存晝夜之變則百刻之化可裁推四時而行則能存周歲之通推晝夜而行則能存百刻之通神而明之存乎其人默而成之不言而信存乎德行上天之載無聲臭可象惟儀刑文王當𡨕契天德而萬邦信說故易曰神而明之存乎其人不知上天之載當存文王默成存德性則自然默成而信矣神而明之存乎其人道至有難明處而能明之此則在人也凡言神亦必待形然後著不得形神何以見神而明之存乎其人然則亦須待人而後能明乎神繫辭下八卦成列象在其中矣因而重之爻在其中矣剛柔相推變在其中矣繫辭焉而命之動在其中矣吉凶悔吝者生乎動者也剛柔者立本者也變通者趨時者也吉凶者貞勝者也變其勢也動其情也情有邪正故吉凶生變能通之則盡利能正夫一則吉凶可勝而天地不能藏其迹日月不能眩其明辭各指其所之聖人之情也指之使趨時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣所謂變動以利言者也然爻有攻取愛惡本情素動因生吉凶悔吝而不可變者乃所謂吉凶以情遷者也能深存繫辭所命則二者之動見矣又有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂也之類三者異情不可不察天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也著天地日月以剛柔立其本也其變雖大蓋不能遷夫正者也一本下有剛柔立本故又著見之正明不為日月所眩正觀不為天地所遷貞正也本也不眩不惑不倚之謂也天地之道至廣至大貞乃能觀也日月之明貞乃能明也天下之動貞乃能一也蓋言天地之道不眩惑者始能觀之日月之明不眩惑者始能明之天下之動不眩惑者始能見夫一者也所以不眩惑者何正以是本也本立則不為聞見所轉其見其聞須透徹所從來乃不眩惑此蓋謂人以貞而觀天地明日月一天下之動也正明不為日月之所眩正觀不為天地之所遷正觀正明是已以正而明日月觀天地也為日月之明與天地變化所眩惑故必已以正道觀之能如是不越乎窮理豈惟耳目所聞見必從一德見其大源至於盡處則可以不惑也存默識實有信有此茍不自信則終為物役事千變萬化其究如此而已天下之動貞夫一者也爻象動乎內吉凶見乎外因爻象之既動明吉凶於未形故曰爻象動乎內吉凶見乎外功業見乎變隨爻象之變以通其利故功業見也聖人之情見乎辭聖人之情存乎教人而已天地之大德曰生將陳理財養物於下故先叙天地生物聖人之大寶曰位何以守位曰仁失位則無以參天地而措諸民也昔者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜此皆是聖人取之於糟粕也地之宜如為黑為剛鹵為大塗以通神明之德以類萬物之情神明之德通於萬殊萬物之情類於形器作結繩而為罔罟以佃以漁蓋取諸離柔附於物飲血茹毛之教古所先有包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益天施地生損上益下播種次之日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑聚而通交相有無次之神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之鴻荒之世食足而用未備堯舜而下通其變而教之也神而化之使不知所以然運之無形以通其變不類革之使民宜之也立法須是過人者乃能之若常人安能立法凡變法須是通通其變使民不倦豈有聖人變法而不通也黃帝堯舜垂衣裳而天下治蓋取諸乾坤君逸臣勞上古無君臣尊卑勞逸之别故制以禮垂衣裳而天下治必是前世未得如此其文章禮樂簡易朴略至堯則煥乎其有文章然傳上世者止是伏犧神農此仲尼道古也猶據聞見而言以上則不可得而知所傳上世者未必有自從來如此而已安知其間固嘗有禮文一時磨滅耳又安知上世無不如三代之文章者乎然而如周禮則不過矣可謂周盡今言治世且指堯舜而言可得傳者也歷代文章自夫子而損益之見其禮而知其政聞其樂而知其德不可加損矣刳木為舟剡木為楫舟楫之利以濟不通致遠以利天下蓋取諸渙舟車之作舟易車難故舟先於車服牛乘馬引重致遠以利天下蓋取諸隨不勞而得其欲故動而悅重門擊柝以待暴客蓋取諸豫有備則無患故豫斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過備物致用過以養物弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌養道雖至禁網尚疏但懲其乖亂而已上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯剛以承上柔以覆下上其棟下其宇之象棟屋脊檁也宇椽也若指第二檁為棟則其間已有宇不得上棟也若指袱為棟又益遠矣宇垂而下故言下宇上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬禮成教備養道足而後刑可行政可明明而不疑易說制作之意蓋取諸某卦止是取義與象契非必見卦而後始有為也然則是言夫子之言耳備一作修陽一君而二民君子之道也隂二君而一民小人之道也一其歸者君子之道多以御者小人之理御一作禦陽遍體衆隂衆隂共事一陽理也是故二君共一民一民事二君上與下皆小人之道也一君而體二民二民而宗一君上與下皆君子之道也易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而歲成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也正惟存神爾不能利用使不思不勉執多以御故憧憧之心勞而德喪矣將陳恬智交養故序日月寒暑屈伸相感之義也君子行義以達其道精一於義使不思而得不勉而中如介于石故能見幾而作天下何思何慮明屈伸之變斯盡之矣日月相推而明生焉寒暑相推而歲成焉神易無方體一隂一陽不測皆所謂通乎晝夜之道也屈伸相感而利生感以誠也情僞相感而利害生雜之僞也精義入神事豫吾內求利吾外也利用安身素利吾外致養吾內也窮神知化乃養成自然非思勉之能强故崇德而外君子未或致知也精義入神養之至也義以反經為本經正則精仁以敦化為深化行則顯義入神動一靜也仁敦化靜一動也仁敦化則無體義入神則無方何思何慮行其所無事而已下文皆是一意行其所無事惟務崇德但妄意有意即非行其所無事行其所無事則是意必固我已絶今天下無窮動靜情僞止一屈伸而已在我先行其所無事則復何事之有日月寒暑之往來尺蠖之屈龍蛇之蟄莫非行其所無事是以惡其鑿也百慮而一致先得此一致之理則何用百慮慮雖百卒歸乎理而已此章憧憧往來要其有心至於德之盛也率本此意咸之九四有應在初思其朋是咸其心也不言心而言心之事不能虛以受人乃憧憧而致其思咸道失矣憧憧往來心之往來也不能虛以接物而有所係著非行其所無事也精義入神豫而已學者求聖人之學以備所行之事今日先撰次來日所行必要作事如此若事在一月前則自一月前裁培挨排則至是時有備言前定事前定皆在於此積纍乃能有功天下九經自是行之者一惟豫而已撰次豫備乃擇義之精若是則何患乎物至事來精義入神須從此去豫則事無備備則用利用利則身安凡人應物無節則往往自失故要在利用安身益以養德也若夫窮神知化則是德之盛故云未之或知蓋大則猶可勉而至大而化則必熟化即達也精義入神以致用謂貫穿天下義理有以待之故可推用窮神是窮盡其神也入神是僅能入於神也言入如自外而入義固有淺深精義入神要得盡思慮臨事無疑精義入神固不待接物然君子何嘗不接物人則見君子閒坐獨處不知君子接物在其中睡雖不與物接然睡猶是成熟者知幾其神精義入神皆豫之至也豫者見事於未萌豫即神也精義入神利用安身此大人之事大人之事則在思勉力行可以擴而至之未之或知以上事是聖人德盛自致非思勉可得猶大而化之大則人為可勉也化則待利用安身以崇德然後德盛仁熟自然而致也故曰窮神知化德之盛也自是别隔為一節義有精粗窮理則至于精義若精義盡性則是入神蓋為一故神通天下為一物在已惟是要精義入神所存能靜而不能動者此則存博學則利用用利則身安身安所以崇其德也所應皆善應過則所存者復神窮神知化德之盛也德盛者神化可以窮盡故君子崇之一作窮理盡性化事之變也大而化也大而化不可為也在熟而已易謂窮神知化乃德盛仁熟之致非智力能强也形而上者得辭幾得象矣神為不測故緩詞不足以盡神化為難知故急詞不足以體化易所以明道窮神則無易矣見幾則義明動而不括則用利屈伸順理則身安而德滋窮神知化與天為一豈有我所能勉哉乃能照物須放心寬快公平以求之乃可見道况德性自廣大易曰窮神知化德之盛也豈淺心可得易曰困于石據于蒺藜入于其宮不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪此明不能利其用者寡助之至親戚畔之易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器于身待時而動何不利之有動而不括是以出而有獲語成器而後動者也此明能精義以致用者子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也暗於事變者子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也明君子之見幾子曰德薄而位尊知小而謀大力小而任重鮮不及矣不知利用以安身者子曰知幾其神乎君子上交不諂下交不瀆其知幾乎人道之用盡於接人而已諂瀆召禍理勢必然故君子俯仰之際直而好義知幾莫大焉知幾者為能以屈為伸幾者動之微吉之先見者也幾知象見而未形也形則涉乎明不待神而後知也吉之先見云者順性命則所先皆吉也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣知幾其神由經正以貫之則寧用終日而斷可識矣君子見其幾則隨有所處不可過也豈俟終日幾者動之微吉之先見者也夫幾則吉凶皆見特言吉者不作則已作則求乎向吉不終日貞吉言速正則吉也六二以隂居隂獨無纍於四故其介如石雖體柔順以其在中而靜何俟終日必知幾而正矣常易故知險常簡故知阻君子見常不動故能得動之微君子見幾而作不俟終日茍見其幾則時處置不欲過何俟終日幾動之微吉之先見特言吉者事則直須求向吉也豫之六二常不動故能得動之微君子知微知彰知柔知剛萬夫之望未嘗不得其中故動止為衆人之表一無止字知崇禮卑叩其兩端而竭也崇既效天卑必法地易曰原始要終故知死生之說死生止是人之終始也學必知幾造微知微之顯知風之自知遠之近可以入德由微則遂能知其顯由末即至於本皆知微知彰知柔知剛之道也子曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也知不善未嘗復行不二過也盛德之士然後知化如顏子庶乎知化也有不善未嘗不知己得善者辨善與不善也易有不善未嘗不知顏子所謂有不善者必只是以常意有迹處便為不善而知之此知幾也於聖人則無之矣知德為至當而不忘至之可見吉於微也蓋欲善不捨則善雖微必知之不誠於善者惡能為有為無雖終身由之不知其道烏足與幾乎顏子心不違仁故不善未嘗不知其致一也孔子稱顏子不善未嘗不知知之未嘗復行其知不善非獨知己凡天下不善皆知之不善則固未嘗復行也又曰吾未見能見其過而內自訟亦是非獨自見其過乃見人之過而自訟其殆庶幾言庶幾於知幾天地絪縕萬物化醇男女構精萬物化生始陳上下交以盡接人之道卒具男女致一之戒而人道畢矣氣坱然太虛升降飛揚未嘗止息易所謂絪縕莊生所謂生物以息相吹野馬者歟此虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感遇聚散為風雨為霜雪萬品之流形山川之融結糟粕煨爐無非教也心所以萬殊者感外物而不一也天大無外其為感者絪縕二端而已萬物之所以相感者利用出入莫知其鄉一萬物之妙者歟子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶此又終以昧於致用之戒子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體推而行之存乎通所謂合德隤然確然所謂有體乾於天為陽於地為剛於人為仁坤於天則隂於地則柔於人則義先立乾坤以為易之門户既定剛柔之體極其變動以盡其時至于六十四此易之所以教人也其稱名也雜而不越其文詞錯綜而條理不雜於稽其類其衰世之意邪世衰則天人交勝其道不一易之情也人一作理夫易彰往而察來而微顯闡幽如坤初六驗履霜於己然察堅冰於將至之類一云數往知來其義一也其事肆而隱顯者則微之使求其原幽者則闡之使見其用故曰其事肆而隱因二以濟民行無有遠近幽深遂知來物非天下之至精孰能與於此此言易之為書也至精者謂聖人窮理以至于極盡精微處也天下之理既已思盡思易之三百八十四爻變動以寓之人事告人以當如何時如何事若其應也如何則吉如何則凶宜動宜靜丁寧以為告戒此因二以濟民行也易之興也其於中古乎作易者其有憂患乎諳識情僞吉凶之變故能體盡性命巽德之制也量宜接物故曰制也履和而至和必以禮節之注意極佳益長裕而不設益必實為有益如天之生物長必裕之非虛設也益物必誠如天之生物日息必誠如川之方至施之妄學之不勤欲自益且不足益人難哉易曰益長裕而不設信夫益長裕而不設益以實也妄加以不誠之益非益也巽稱而隱順以達志故事舉而意隱井以辨義稱物平施隨所求小大與之此辨義也巽以行權不巽則失其宜也易之為書也不可遠為道也屢遷心不存之是遠也不觀其書亦是遠也蓋其為道屢遷易之為書也原始要終以為質也六爻相雜唯其時物也於一卦之義原始要終究兩端以求其中六爻則各指所之非卦之質也故吉凶各類其情指其所之其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣初上終始三四非貴要之用非內外之主中爻以要存亡吉凶如困卦正大人吉無咎蓋以剛中也小過小事吉大事凶以柔得中之類柔之為道不利遠者柔之用近也道有變動故曰爻爻有等故曰物物相雜故曰文爻者交雜之義易之興也其當殷之末世周之盛德邪當文王與紂之事邪剛柔錯雜美惡渾淆文王與紂當之矣是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也不齊戒其心則雜而著也百物不廢巨細無不察也夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻能悅諸心能研諸侯之慮擬議云為非乾坤簡易以立本則易不可得而見也簡易故能悅諸心知險阻故能研諸慮簡易然後能知險阻簡易理得然後一以貫天下之道繫辭言能研諸慮止是剩侯之二字說者就而解諸侯有為之主若是者即是隨文耳太虛之氣隂陽一物也然而有兩健順而己又不可謂天無意陽之至健不爾何以發散隂之性常順然而地體重濁不能隨則不能順則有變矣有則有象如乾健坤順有此氣則有此象可得而言若旡則直無而已謂之何而可是無可得名故形而上者得詞斯得象但於不形中得以措詞者已是得象可狀也今雷風有動之象須謂天為健雖未嘗見然而成象故以天道言及其發則是效也著則是成形成形則是道也若以耳目所及求理則安得盡如言寂然湛然亦須有此象有氣方有象雖未形不害象在其中定天下之吉凶成天下之亹亹者是故變化云為吉事有祥象事知器占事知來天地設位聖人成能人謀鬼謀百姓與能言易於人事終始悉備行善事者易有祥應之理萌兆之事而易具著見之器疑慮而占則易示將來之驗有以見天地之間成能者聖人而己能畏信於易者雖百姓之愚能盡人鬼幽明之助天能為性人謀為能大人盡性不以天能為能而以人謀為能故曰天地設位聖人成能天人不須强分易言天道則與人事一袞論之若分别則是薄乎云耳自然人謀合蓋一體也人謀之所經畫亦莫非天理耳八卦以象告爻彖以情言八卦有體故象在其中錯綜為六十四爻彖所趨各異故曰情言變動以利言吉凶以情遷能變通則盡利纍於其情則陷於吉凶矣情僞相感而利害生凡卦之所利與爻之所利皆變通之宜也如利建侯利艱貞誠則順理而利僞則不循理而害易言情僞相感而利害生則是專以人事言故有情僞利害也屈伸相感而利生此則是理也惟以利言說卦昔者聖人之作易也幽贊於神明而生蓍方其將有謀也將有問也命於蓍此所謂生蓍非謂在野而生蓍也事在未來之前吉凶在書策上蓍在手中卒歸三處一時合豈非幽贊於神明而得爾也起其用也參天兩地而倚數觀變於隂陽而立卦地所以兩分剛柔男女而效之法也天所以參一太極兩儀而象之性也一物兩體氣也一故神兩在故不測兩故化推行於一此天之所以參也兩不立則一不可見一不可見則兩之用息兩體者虛實也動靜也聚散也清濁也其䆒一而已有兩則有一是太極也若一則有兩亦在無兩亦一在然無兩則安用一不以太極空虛而己非天參也和順於道德而理於義理義即是天道也易言理於義一也求是即為理義言理義不如且言求是易曉求是之心俄頃不可忘理於義此理云者猶人言語之間常所謂理者非同窮理之理凡觀書不可以相類而泥其義不爾則字字相梗觀其文勢上下如充實之美與詩之言美輕重不同窮理盡性以至於命性盡其道則命至其源也一作至於原也致與至為道殊遠盡性然後至於命不可謂一不窮理盡性即是戕賊不可至於命者止能保全天所稟賦本分者且不可以有加也既言窮理盡性則不容有不知天道即性也故思知人不可不知天能知天斯知人矣知人與窮理盡性以至于命同意釋氏無天用故不取理彼以性為無吾儒以參為性故先窮理而後盡性凡人剛柔緩急趨識無有同者此乾道變化各正性命也及盡性則皆忘之窮理亦當有漸見物多窮理多從此就約盡人之性盡物之性天下之理無窮立天理乃各有區處窮盡性言性已是近人言也既窮理又盡性然後能至於命命則又就已而言之也昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽剛柔仁義所謂性命之理易一物而三才備隂陽氣也而謂之天剛柔質也而謂之地仁義德也而謂之人一物而兩體其太極之謂歟隂陽天道象之成也剛柔地道法之效也仁義人道性之立也三才兩之莫不有乾坤之道也易一物而合三才天人一隂陽其氣剛柔其形仁義其性數往者順知來者逆是故易逆數也如孟子曰茍求其故則千歲之日至可坐而致也神也者妙萬物而為言者也全備天理則其體孰大於此是謂大人以其道變通無窮故謂之聖聖人心術之運固有不疾而速不行而至默而識之處故謂之神動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮造化之功發乎動畢達乎順形諸明養諸容載遂乎悅潤勝乎健不匱乎勞始終乎止乾健也坤順也震動也巽入也坎陷也離麗也艮止也兌說也健動陷止剛之象順麗入說柔之體巽為雞飛遷躁動不能致遠雞之象乾為寒為冰為大赤乾為大赤其正色也為冰健極而寒甚也自此而下皆所以明萬物之情明一作類坤為文為衆坤為文衆色也為衆容載廣也震為敷為蒼莨竹為萑葦震為萑葦為蒼莨竹為敷皆蕃鮮也巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其䆒為躁卦巽為木萌於下滋於上也為繩直順以達也為工巧且順也為白因所遇而從也為長為高木之性也為臭風也入也於人為寡髮廣顙躁人之象也坎為血卦為赤坎為血卦周流而勞血之象也為赤其色也離為乾卦其於木也為科上稿離為乾卦於木為科上稿附其燥也一作且躁也艮為徑路為小石艮為小石堅難入也為徑路通或寡也兌為毁折為附決兌為附決內實則外附必决也為毁折物成則上柔者必折也序卦序卦相受聖人作易須有次序序卦無足疑序卦不可謂非聖人之緼今欲安置一物猶求審處况聖人之於易其間雖無極至精義大槩皆有意思觀聖人之書須布遍細密如是大匠豈以一斧可知哉有天地然後萬物生焉盈天地之間者為萬物故受之以屯聚而不得出故盈雖雷亦然物生必䝉蒙冒未肆一作䝉稚者䝉昧未肆需者飲食之道也雲上於天物皆有待之象比必有所畜故受之以小畜物畜然後有禮故受之以履德積則行必有方物積則散必有道坎者陷也離者麗也一陷溺而不得出為坎一附麗而不能去為離夷者傷也傷於外者必反於家故受之以家人傷於外必反於家萬物之理自然雜卦屯見而不失其居險在外故不失其居與渙解義反故曰緩必有所失䝉雜而著蒙雜而著著古著字雜著於物所以為䝉䝉昏蒙也兌見而巽伏也兌說在外巽入在隱井通而困相遇也澤無水理勢適然故曰相遇小過過也過而未顚也履不處也危者安其位者也故履以不處為吉大過顚也過至於顚故曰大歸妹女之終也妹歸而長女之終也一作歸妹繫辭所舉易義是聖人議論到此因舉易義以成之亦是人道之大且要者也繫辭反復惟在明易所以為易撮聚衆意以為解欲曉後人也化不可言難知可以言難見如日景之行則可知之其所以行難見也人於龜䇿無情之物不知其將如何惟是自然莫或使之然者隂陽不測之類也已方虛心以鄉之卦成於爻以占之其辭如何取以為占聖人則又於隂陽不測處以為占或於夢寐或於人事卜之然聖人於卜筮亦鮮蓋其為疑少故也不見易則不識造化不識造化則不知性命既不識造化則將何謂之性命也大易不言有無言有無諸子之陋也人雖信此說然不知能以何為有以何謂之無如人之言曰自然而鮮有識自然之為體觀其幾者善之幾也惡不可謂之幾如曰幾者動之微吉之先見亦止言吉耳上交不諂下交不瀆人事不過於上下之交此可盡人道也且如孝弟仁之本亦可以言幾造端乎夫婦亦可以言幾親親而尊賢亦可以為幾就親親尊賢而求之又有幾焉又如言不誠其身不悅於親亦是幾處茍要入德必始於知幾欲觀易先當玩辭蓋所以說易象也不先盡繫辭則其觀於易也或遠或近或太艱難不知繫辭而求易正猶不知禮而學春秋也繫辭所以論易之道既知易之道則易象在其中故觀易必由繫辭繫辭獨說九卦之德者蓋九卦為德切於人事有謂心即是易造化也心又焉能盡易之道易象繫之以辭者於卦既已具其意象矣又切於人事言之以示勸戒釋氏之言性不識易識易然後盡性蓋易則有無動靜可以兼而不偏舉也無則氣自然生氣之生即是道是易乾不居正位是乾理自然惟人推之使然邪主應物不能固知此行而流也入德處不移則是道不進重滯者也動靜不失其時是時措之宜也集義也集義久則自有光明靜則無見必動乃見其道光明以其本之光明故其發也光明學行之乃見至其疑處始是實疑於是有學險而止䝉夫於不當止而止是險也如告子之不動心必以義為外是險而止也䝉險在內是蒙昧之義䝉方始務求學而得之始是得所止也若蹇則是險在外者也易乃是性與天道其字日月為易易之義包天道變化易非止數春秋大義不止在元在易則是至理在孟子則是氣張子全書卷十一
