body:
  text: 張子全書儒家類提要臣等謹案張子全書十四卷宋張載撰載字子厚考載所著書見於宋史藝文志者有易說三卷正蒙十卷經學理窟十卷文集十卷虞集作吳澄行狀稱嘗校正張子之書以東西銘冠篇正䝉次之今未見其本此本不知何人所編題曰全書而止有西銘一卷正䝉二卷經學理窟五卷易說三卷語録抄一卷文集抄一卷又拾遺一卷又採宋元諸儒所論及行狀等作為附録一卷共十五卷自易說西銘以外與史志卷數皆不相符又語録文集皆稱曰抄尤灼然非其完帙蓋後人選録之本名以全書殊為乖舛然明徐時逹所刻已屬此本嘉靖中吕柟作張子抄釋稱文集已無完本惟存二卷康熙己亥朱軾督學於陜西稱得舊稿於其裔孫五經博士繩武家為之重刋勘其卷次篇目亦即此本則其來已久矣張子之學主於深思自得本不以著作繁富為長此本所録雖卷帙無多而去取謹嚴橫渠之奧論微言其精英業已備採矣乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張子全書序歲己丑豫奉命巡學陜右蒞扶風率諸生謁橫渠張子廟雖車服禮器鮮有存者然登其堂不覺斂容屏息肅然起敬焉既而博士繩武示豫橫渠全集且曰是書多錯簡欲重刻未逮也豫自幼讀西銘正蒙雖未窺見奧藴然每一展卷輒胸臆爽豁既得讀全書益有鼓舞不盡之致焉大抵言性言命使人心玩之而如其所欲言者必身體之而適得其力之能至者也集中經學理窟諸篇於禮樂詩書井田學校宗法喪祭討論精確實有可見之施行薛思菴曰張子以禮為教不言理而言禮理虛而禮實也儒道宗㫖就世間綱紀倫物上著腳故由禮入最為切要即約禮復禮的傳也西銘言仁大而非夸蓋太極明此性之全體西銘狀此性之大用體虛而微用𢎞而實焉正䝉論天地太和絪緼風雨霜雪萬品之流行山川之融結即器即道皆前人之所未發朱子所謂親切嚴密是也史稱橫渠以易為宗以中庸為體以孔孟為法與諸生言學每告以知禮成性變化氣質之道學必為聖人而後已以為知人而不知天求為賢人而不求為聖人此學者大蔽也又曰為天地立心為生民立命為往聖繼絶學為萬世開太平卓哉張子其諸光輝而近於化者歟若其所從入則循循下學正䝉所謂言有教動有法息有養瞬有存數語盡之矣是故學張子之學而實踐其事者斯不愧讀張子之書而洞晰其理豫也不敏何足以言學然竊喜讀張子書而有鼓舞不盡之致用校正而梓之以成博士志焉時康熙五十八年冬至月髙安後學朱軾序
