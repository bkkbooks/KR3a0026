body:
  text: 張子全書卷五禮樂禮反其所自生樂樂其所自成禮别異不忘本而後能推本為之節文樂統同樂吾分而已禮天生自有分别人須推原其自然故言反其所自生樂則得其所樂即是樂也更何所待是樂其所自成周樂有象有大武有酌象是武王為文王廟所作下武繼文也武功本於文王武王繼之故武王歸功於文王以作此樂象文王也大武必是武王既崩國家所作之樂奏之於武王之廟酌必是周公七年之後制禮作樂時於大武有增添也故酌言告成大武也其後必是酌以祀周公治亂以相為周召作訊疾以雅為太公作入門而縣興金奏此言兩君相見凡樂皆作必肆夏也至升堂之後其樂必不皆作奏必有品次大合樂猶今之合曲也必無金石止用匏竹之類也八音克諧堂上堂下盡作也明矣古樂不可見蓋為今人求古樂太深始以古樂為不可知只此虞書詩言志歌永言聲依永律和聲求之得樂之意蓋盡於是詩只是言志歌只是永其言而已只要轉其聲令日可聽今人歌者亦以轉聲而不變字為善歌長言後卻要入於律律則知音者知之知此聲入得何律古樂所以養人德性中和之氣後之言樂者止以求哀故晉平公曰音無哀於此乎哀則止以感人不善之心歌亦不可以太髙亦不可以太下太髙則入於噍殺太下則入於嘽緩蓋窮本知變樂之情也周禮言樂六變而致物各異此恐非周公之制作本意事亦不能如是確然若謂天神降地祇出人鬼可得而禮則庸有此理商角徴羽皆有主出於唇齒喉舌獨宫聲全出於口以兼五聲也徴恐只是徴平或避諱為徴仄如是則清濁平仄不同矣齒舌之音異矣今尺長於古尺尺度權衡之正必起於律律本黃鐘黃鐘之聲以理亦可定古法律管當實千有二百粒秬黍後人以羊頭山黍用三等篩子透之取中等者用此特未為定也此尺只是器所定更有因人而制如言深衣之袂一尺二寸以古人之身若止用一尺二寸豈可運肘即知因身而定羊頭山老子說一桴二米秬黍直是天氣和十分豐熟山上便有山下亦或有之律吕有可求之理德性深厚者必能知之後之言厯數者言律一寸而萬數千分之細此但有其數而無其象耳聲音之道與天地同和與政通蠶吐絲而商絃絶正與天地相應方蠶吐絲木之氣極盛之時商金之氣衰如言律中大簇律中林鍾於此盛則彼必衰方春木當盛卻金氣不衰便是不和不與天地之氣相應先王之樂必須律以考其聲今律既不可求人耳又不可全信正惟此為難求中聲須得律律不得則中聲無由見律者自然之至此等物雖出於自然亦須人為之但古人為之得其自然至如為規矩則極盡天下之方圓矣鄭衛之音自古以為邪淫之樂何也蓋鄭衛之地濵大河沙地土不厚其間人自然氣輕浮其地土苦不費耕耨物亦能生故其人偷脫怠墮弛慢頽靡其人情如此其聲音同之故聞其樂使人如此懈慢其地平下其間人自然意氣柔弱怠墮其土足以生古所謂息土之民不才者此也若四夷則皆踞髙山溪谷故其氣剛徑此四夷常勝中國者此也移人者莫甚於鄭衛未成性者皆能移之所以夫子戒顔回也今之琴亦不遠鄭衛古音必不如是古音只是長言聲依於永於聲之轉處過得聲和婉決無預前定下腔子禮所以持性蓋本出於性持性反本也凡未成性須禮以持之能守禮已不畔道矣禮即天地之德也如顔子者方勉勉於非禮勿言非禮勿動勉勉者勉勉以成性也禮非止著見於外亦有無體之禮蓋禮之原在心禮者聖人之成法也除了禮天下更無道矣欲養民當自井田始治民則教化刑罰俱不出於禮外五常出於凡人之常情五典人日日為但不知耳今之人自少見其父祖從仕或見其鄉閭仕者其心正欲得利祿縱欲於義理更不留意有天生性美則或能孝友亷節者不美者縱惡而已性元不曾識磨礪時措之宜便是禮禮即時措時中見之事業者非禮之禮非義之義但非時中者皆是也非禮之禮非義之義又不可一槩言如孔子喪出母子思守禮為非也又如制禮以小功不稅使曾子制禮又不知如何以此不可易言時中之義甚大須是精義入神以致用觀其㑹通以行典禮此則真義理也行其典禮而不達㑹通則有非時中者矣禮亦有不須變者如天叙天秩如何可變禮不必皆出於人至如無人天地之禮自然而有何假於人天之生物便有尊卑大小之象人順之而已此所以為禮也學者有專以禮出於人而不知禮本天之自然告子專以義為外而不知所以行義由內也皆非也當合內外之道能答曾子之問能教孺悲之學斯可以言知禮矣進人之速無如禮學學之行之而復疑之此習矣而不察者也故學禮所以求不疑仁守之者在學禮也學者行禮時人不過以為迂彼以為迂在我乃是徑捷此則從吾所好文則要密察心則要洪放如天地自然從容中禮者盛德之至也古人無椅卓智非不能及也聖人之才豈不如今人但席地則恆恭可以拜伏今坐椅卓至有坐到起不識動者主人始親一酌已是非常之欽蓋後世一切取便安也氣質變化氣質孟子曰居移氣養移體况居天下之大居者乎居仁由義自然心和而體正更要約時但拂去舊日所為使動作皆中禮則氣質自然全好禮曰心大體胖心既𢎞大則自然舒大而樂也若心但能𢎞大不謹敬則不立若但能謹敬而心不𢎞大則入於隘須寬而敬大抵有諸中者必形諸外故君子心和則氣和心正則氣正其始也固亦須矜持古之為冠者以重其首為履以重其足至於盤盂几杖為銘皆所以慎戒之人之氣質美惡與貴賤夭夀之理皆是所受定分如氣質惡者學即能移今人所以多為氣所使而不得為賢者蓋為不知學古之人在鄉閭之中其師長朋友日相教訓則自然賢者多但學至於成性則氣無由勝孟子謂氣一則動志動猶言移易若志一亦能動氣必學至於如天則能成性誠意而不以禮則無徴蓋誠非禮無以見也誠意與行禮無有先後須兼修之誠謂誠有是心有尊敬之者則當有所尊敬之心有養愛之者則當有所撫字之意此心苟息則禮不備文不當故成就其身者須在禮而成就禮則須至誠也天本無心及其生成萬物則須歸功於天曰此天地之仁也仁人則須索做始則須勉勉終則復自然人須當存此心及用得熟卻恐忘了若事有汩沒則此心旋失失而復求之則才得如舊耳若能常存而不失則就上日進立得此心方是學不錯然後要學此心之約到無去處也立本以此心多識前言往行以畜其德是亦從此而辨非亦從此而辨矣以此存心則無有不善古人耕且學則能之後人耕且學則為奔迫反動其心何者古人安分至一簞食一豆羮易衣而出只如此其分也後人則多欲故難能然此事均是人情之難故以為貴所謂勉勉者謂繼之者善也成之者性也繼繼不已乃善而能至於成性也今聞說到中道無去處不守定又上面更求則過中也過則猶不及也不以學為行室則有奧而不居反之他而求位猶此也是處不守定則終復狂亂其不是亦將莫之辨矣譬之指鹿為馬始未嘗識馬今指鹿為之則亦無猶識鹿也學釋者之說得便為聖人而其行則小人也只聞知便為了學者深宜以此為戒孔子文王堯舜皆則是在此立志此中道也更勿疑聖人於此上别有心人情所以不立非才之罪也善取善者雖於不若已采取亦有益心苟不求益則雖與仲尼處何益君子於不善見之猶求益况朋友交相取益乎人於異端但有一事存之於心便不能至理其可取者亦耳可取者不害為忠臣孝子如是心不能存德虛牢固操則存捨則亡道義無由得生如地之安靜不動然後可以載物生長以出萬物若今學者之心出入無時記得時存記不得時即休如此則道義從何而生於不賢者猶有所取者觀已所問何事欲問耕則君子不如農夫問織則君子不如婦人問制器不如問工人問財利不如問商賈但臨時已所問學者舉一隅必數隅反後生可畏有異於古則雖科舉不能害其志然不如絶利一源學者有息時一如木偶人撁搐則動舍之則息一日而萬生萬死學者有息時亦與死無異是心死也身雖生身亦物也天下之物多矣學者本以道為生道息則死也終是僞物當以木偶人為譬以自戒知息為大不善因設惡譬如此只欲不息欲事立須是心立心不欽則怠墮事無由立况聖人誠立故事無不立也道義之功甚大又極是尊貴之事苟能屈於長者便是問學之次第云爾整齊即是如切如磋也鞭後乃能齊也人須偏有不至處鞭所不至處乃得齊爾不知疑者只是不便實作既實作則須有疑必有不行處是疑也譬之通身㑹得一邊或理會一節未全則須有疑是問是學處也無則只是未嘗思處來也君子不必避他人之言以為太柔太弱至於瞻視亦有節視有上下視髙則氣髙視下則心柔故視國君者不離紳帶之中學者先須去客氣其為人剛行則終不肯進堂堂乎張也難與並為仁矣蓋目者人之所常用且心常記之視之上下且試之已之敬傲必見於視所以欲下其視者欲柔其心也柔其心則聽言敬且信人之有朋友不為燕安所以輔佐其仁今之朋友擇其善柔以相與拍肩執袂以為氣合一言不合怒氣相加朋友之際欲其相下不倦故於朋友之間主其敬者日相親與得效最速仲尼嘗曰吾見其居於位也與先生並行也非求益者也欲速成者也則學者先須溫柔溫柔則可以進於學詩曰溫溫恭人惟德之基蓋其所益之多多聞見適足以長小人之氣君子莊敬日強始則須拳拳服膺出於牽勉至於中禮卻從容如此方是為已之學鄉黨說孔子之形色之謹亦是敬此皆變化氣質之道也道要平曠中求其是虛中求出實而又轉之以文則彌堅轉誠不得文無由行得誠文亦有時有庸敬有斯須之敬皆歸於是而已存心之始須明知天德天德即是虛虛上更有何說也求養之道心只求是而已蓋心𢎞則是不𢎞則不是心大則百物皆通心小則百物皆病悟後心常𢎞觸理皆在吾術內覩一物又敲點著此心臨一事又記念著此心常不為物所牽引去視燈燭亦足以警道大率因一事長一智只為持得術博凡物常不能出博大之中求心之始如有所得久思則茫然復失何也夫求心不得其要鑽研大甚則惑心之要只是欲平曠熟後無心如天簡易不已今有心以求其虛則是已起一心無由得虛切不得令心煩求之太切則反昏惑孟子所謂助長也孟子亦只言存養而已此非可以聰明思慮力所能致也然而得博學於文以求義理則亦動其心乎夫思慮不違是心而已尺蠖之屈以求伸也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也此相交養之道夫屈者所以求伸也勤學所以修身也博文所以崇德也惟博文則可以力致人平居又不可以全無思慮須是考前言往行觀昔人制節如此以行其事而已故動焉而無不中理學者既知此心且擇所安而行之已不愧疑則闕之更多識前言往行以養其德多聞闕疑多見闕殆而今方要從頭整理將前言往行常合為一有不合自是非也人能不疑便是德進蓋已於大本處不惑雖未加工思慮必常在此積久自覺漸變學者惡其自足足則不復進立本既正然後修持修持之道既須虛心又須得禮內外發明此合內外之道也當是畏聖人之言考前言往行以畜其德度義擇善而行之致文於事業而能盡義者只是要學曉夕參詳比較所以盡義惟博學然後有可得以參較琢磨學博則轉密察鑽之彌堅於實處轉為實轉誠轉信故只是要博學學愈博則義愈精微舜好問好察邇言皆所以盡精微也舜與仲尼心則同至於密察處料得未如孔子大抵人君則有輔弼疑丞中守至正而已若學者則事必欲皆自能又將道輔於人舜為人君猶起於側微學者所志至大猶恐所得淺况可便志其小苟志其小志在行一節而已若欲行信亦未必能信自古有多少要如仲尼者然未有如仲尼者顔淵學仲尼不幸短命孟子志仲尼亦不如仲尼至如樂正子為信人為善人其學亦全得道之大體方能如此又如漆雕開言吾斯之未能信亦未說信甚事只是謂於道未信也慎喜怒此只矯其末而不知治其本宜矯輕警惰若天祺公之弟御史氣重也亦有矯情過實處人多言安於貧賤其實只是計窮力屈才短不能營畫耳若稍動得恐未肯安之須是誠知義理之樂於利欲也乃能天資美不足為功惟矯惡為善矯惰為勤方是為功人必不能便無是心須使思慮但使常游心於義理之間立本處以易簡為是接物處以時中為是易簡而天下之理得時中則要博學素備張子全書卷五
