body:
  text: 張子全書卷四周禮周禮是的當之書然其間必有末世添入者如盟詛之屬必非周公之意葢盟詛起於王法不行人無所取直故要之於神所謂國將亡聽於神葢人屈抑無所伸故也如深山之人多信巫祝蓋山僻罕及多為強有力者所制其人屈而不伸必咒詛於神其間又有偶遭禍者遂指以為果得伸於神如戰國諸侯盟詛亦為上無王法今山中人凡有疾者專使巫者視之且十人間有五人自安此皆為神之力如周禮言十失四已為下醫則十人自有五人自安之理則盟詛決非周公之意亦不可以此病周公之法又不可以此病周禮詩云侯詛侯咒靡屆靡䆒不與民究極則必至於詛咒治天下不由井地終無由得平周道止是均平肉刑猶可用於死刑今大辟之罪且如傷舊主者死軍人犯逃走亦死今且以此比刖足彼亦自幸得免死人觀之更不敢犯今之妄人往往輕視其死使之則足亦必懼矣此亦仁術天官之職須襟懐洪大方看得葢其規模至大若不得此心欲事事上致曲窮究湊合此心如是之大必不能得也釋氏錙銖天地可謂至大然不嘗為大則為事不得若畀之一錢則必亂矣至如言四句偈等其先必曰人所恐懼不可思議及在後則亦是小人所共知者事今所謂死雖奴𨽻竈間豈不知皆是空彼實是小人所為後有文士學之增飾其間或引入易中之意或更引他書文之故其書亦有文者實無所依取莊子雖其言如此實是畏死亦為事不得一市之博百歩之地可容萬人四方必有屋市官皆居之所以平物價收滯貨禁爭訟是決不可闕故市易之政非官專欲取利亦所以為民百貨亦有全不售時官則出錢以畱之亦有不可買時官則出而賣之官亦不失取利民亦不失通其所滯而應其所急故市易之政止一市官之事耳非王政之事也井田至易行但朝廷出一令可以不笞一人而定盖人無敢据土者又須使民悦従其多有田者使不失其為富借如大臣有据土千比者不過封與五十里之國則已過其所有其他隨土多少與一官使有租税人不失故物治天下之術必自此始今以天下之土棊晝分布人受一方養民之本也後世不制其産止使其力又反以天子之貴專利公自公民自民不相為計百姓足君孰與不足百姓不足君孰與足其術自城首起立四隅一方正矣又增一表又治一方如是百里之地不日可定何必毁民廬舍墳墓但見表足矣方既正表自無用待軍賦與治溝洫者之田各有處所不可易旁加損井地是也百里之國為方十里者百十里為城城出革車一乗是百乗也然開方計之百里之國南北東西各三萬步一夫之田為方步者萬今聚南北一步之博而㑹東西三萬步之長則為方步者三萬也是三夫之田也三三如九則百里之地得九萬夫也革車一乗甲士三人步卒七十二人以千乗計之凡用七萬五千人今有九萬夫故百里之國亦可言千乗也以地計之足容車千乗然取之不如是之盡其取之亦什一之法也其間有山陵林麓不在數廛而不征廛者猶今之地基錢也葢貯物之地官必取錢不征者不税歛之也法而不廛法者治之以市官之法而已廛與不廛亦觀臨時如何逐末者多則廛所以抑末也逐末者少不必廛也既使為采地其所得亦什一之法井取一夫之出也然所食必不得盡必有常限其餘必歸諸天子所謂貢也諸侯卿大夫采地必有貢貢者必於時享天子皆廟受之是四海之内各以其職來祭之義其貢亦有常限食采之餘致貢外必更有餘此所謂天子幣餘之賦也以此觀之古者天子既不養兵財無所用必大殷富以此知井田行至安榮之道後世乃不肯行以為至難復以天子之威而歛奪人財汲汲終嵗亦且不足卿大夫采地圭田皆以為永業所謂世祿之家然古者世祿之家必不如今日之官戸也必有法葢舍役者惟老者疾者貧者賢者能者服公事者舍此雖世禄之家役必不免也明矣井田亦無他術但先以天下之地棊布畫定使人受一方則自是均前日大有田産之家雖以田授民然不得如分種如租種矣所得雖差少然使之為田官以掌其民使人既喻此意人亦自從雖少不願然悦者衆而不悦者寡矣又安能每每恤人情如此其始雖分公田與之及一二十年猶須别立法始則因命為田官自後則是擇賢欲求古法亦先須熟觀文字使上下之意通貫大其胸懐以觀之井田卒歸於封建乃定封建功有大功徳者然後可以封建當未封建前天下井邑當如何為治必立田大夫治之今既未可議封建只使守令終身亦可為也所以必要封建者天下事之分得簡則治之精不簡則不精故聖人必以天下分之於人則事無不治者聖人立法必計後世子孫使周公當軸雖攬天下之政治之必精後世安得如此且為天下者奚為紛紛必親天下之事今便封建不肖者復逐之有何害豈有以天下之勢不能正一百里之國使諸侯得以交結以亂天下自非朝廷大不能治安得如此而後世乃謂秦不封建為得䇿此不知聖人之意也人主能行井田者須有仁心又更強明果敢及宰相之有才者唐太宗雖英明亦不可謂之仁主孝文雖有仁心然所施者淺近但能省刑罰薄稅歛不慘酷而已自孟軻而下復無其人揚雄擇聖人之精艱難而言之正止得其淺近者使之為政又不知如何據此所知又不遇其時無所告訴然揚雄比董生孰優雄所學雖正當而徳性不及董生之博大但其學差溺於公羊䜟緯而已婦人之拜古者首低至地肅拜也因肅遂屈其膝今但屈其膝直其身失其義也一畝城中之宅授於民者所謂廛里國中之地也百家謂之廛二十五家為里此無征其有未授閑宅區外有占者征之什一使自賦也五畝國宅城中授於士者五畝以其父子異宫有東宫西宫聨兄弟也亦無征城外郭内授於民者亦五畝於公無征十畝塲圃所任園地也詩十畝之間此也不獨築塲納稼亦可毓草木也地在郭外征之二十而一葢中有五畝之宅當受而無征者但五畝外者出税耳二十五畝宅田士田賈田所任近郊之地也孟子曰餘夫二十五畝此也宅田士之在郊之宅田也士田士所受圭田也兼宅田共五十畝賈田賈者所受之田孟子曰卿以下有圭田五十畝此言士者卿士通言之五十畝官田牛田賞田牧田者所任遠郊之地也官田庶人在官者之田牛田牧公家牛之田賞田賞賜之田牧田有二牧六畜者一也授於鄉民者一也此四者皆以五十畝為區賞田以厚薄多寡給之百畝鄉民所受井田不易者也此鄉田百畝兼受牧田五十畝故其征二十而三百五十畝田百畝萊五十畝遂人職曰夫廛餘夫亦如之廛者統百畝之名也又有萊五十畝可薪者也野曰萊鄉曰牧猶民與氓之别其受田之家耕者之外猶有餘夫則受二十五畝之田萊亦半之故曰亦如之其征二十而三二百畝田百畝萊百畝此在二十而三與十二之征之間必更有法三百畝田百畝萊二百畝者其征十二以萊田半見耕之田通田萊三百畝都計之得十二也惟其漆林之征二十而五者其上園地近郊逺郊甸稍縣都之漆林也周制受田自一畝至三百畝計九等餘夫增減猶在數外耳國中以免者多役者少故晚征而早蠲之野以其免者少役者多故早征而晚蠲之貴者賢者能者服公事者老疾者多居國中故免者多宅不毛者乃郭中受五畝之宅者於公則無征然其間不可毓草木取利但於里中出布止待里中之用也居於田而不耕者出屋中之粟間民轉移之餘無職事者無所貢故出夫家之征或征其力不用力則必有他征孟子所謂力役之征夫者一夫家者兼餘夫旅師間粟野之田者有未受而閒者或已受之民徙於他處或疾病死亡不能耕者其民之有力者權耕所出之粟也旅師掌而用之耡粟助貸於民之粟或元有官給之本或以屋粟間粟貸之得其興積則平頒之幣金玉齒革泉布之雜名近郊疑亦通謂之國中十一使自賦之者葢迫近王城未容井授故其稅十一以為正遠郊二十而三謂逺郊地寛雖上地猶更給萊田五十畝故其法二十而三餘夫則無萊田六遂然後餘夫有萊田故遂人職云餘夫亦如之國宅無征則逺郊之宅有征可知耡粟興助之粟屋粟不授田徙居之粟間粟井田耕民不時死徙其田偶閒而未歸空土有量力者暫資以為生者之粟此三粟非公家正賦專以資里宰之師所謂旅師者里中之養供服器之用為賞罸之柄廛里與園廛之别廛城中族居之名里郭内里居之稱園廛在園地其制百畝之間十家區分而衆居者詩人所謂十畝之間之田也作詩者以國地侵削外無井受之田徒有近郭園廛而已故耕者無所用其力則桑者閑閑而多也十畝之外他人亦然則削小無所容尤為著矣一夫藉則有十畝之收盡入於公一夫税則計十畝中嵗之收取其一畝借如十畝藉中歳十石則税當一石而無公田矣十一而税此必近之夫家之征疑無過家一人者謂之夫餘夫竭作或三人或二人或二家五人此謂之家夫家之征疑但力征而已無布縷米粟之征若嵗無力征則出夫布閭師所謂無職者出夫布非謂常出其布不征其力則出夫布以代之也周制上田以授食多者下田以授食少者此必天下之通制也又遂人上田萊五十畝中百畝下二百上田萊五十畝比遠郊井受牧田之民二十而税三者無以異中萊百畝以肥瘠倍上萊下萊二百畝以肥瘠倍中萊此三等葢折𠂻之均矣然授上萊者税二十而三受下萊者乃多至十二葢田均則食少者優不得不加之税爾周道如砥此之謂也周禮惟太宰之職難看葢無許大心胸包羅記得復忘彼其混混天下之事當如捕龍蛇搏虎豹用心力看方可故議論天下之是非易處天下之事難孔子常語弟子如或知爾則何以哉其他五官便易看止一職也守祧先公之遷主於后稷之廟疑諸侯無祧廟亦藏之於始祖之廟謂之圭田恐是畦田若菜圃之類故授之在近又少也詩書周南召南如乾坤上天之載無聲無臭但儀刑文王則可以取信家邦言學文王者也􅤔蝀者隂氣薄而日氣見也有二者其全見者是隂氣薄處不全見者是隂氣厚處聖人文章無定體詩書易禮春秋只隨義理如此而言李翺有言觀詩則不知有書觀書則不知有詩亦近之順帝之則此不失赤子之心也冥然無所思慮順天而已赤子之心人皆不可知也惟以一靜言之古之能知詩者惟孟子為以意逆志也夫詩之志至平易不必為艱險求之今以艱險求詩則已喪其本心何由見詩人之志文王之於天下都無所與焉文王陟降在帝左右只觀天意如何耳觀文王一篇便知文王之美有君人之大徳有事君之小心萬事只一天理舜舉十六相去四凶堯豈不能堯固知四凶之惡然民未被其虐天下未欲去之堯以安民為難遽去其君則民不安故不去必舜而後因民不堪而去之也髙宗夢傅說先見容貌此事最神夫夢不必須聖人然後夢為有理但天神不間人入得處便入也萬頃之波與汙泥之水皆足受天之光但放來平易心便神也若聖人起一欲得靈夢之心則心固已不神矣神又焉有心聖人心不艱難所以神也髙宗只是正心思得聖賢是以有感天無心心都在人之心一人私見固不足盡至於衆人之心同一則郤是義理總之則卻是天故曰天曰帝者皆民之情然也謳歌訟獄之不之焉人也而以為天命武王不薦周公必知周公不失為政尚書難看葢難得胸臆如此之大只欲解義則無難也書稱天應如影響其禍福果然否大抵天道不可得而見惟占之於民人所悅則天必悦之所惡則天必惡之只為人心至公也至衆也民雖至愚無知惟於私已然後昏而不明至於事不干礙處則自是公明大抵衆所向者必是理也理則天道存焉故欲知天者占之於人可也稽衆舍己堯也與人為善舜也聞言則拜禹也用人惟已改過不吝湯也不聞亦式不諫亦入文王也皆虚其心以為天下也欽明文思堯徳也濬哲文明温㳟允塞舜徳也舜之徳與堯不同葢聖人有一善之源足以兼天下之善若以字之多寡為徳之優劣則孔子温良㳟儉遜又多於堯一字至於八元八凱齊聖廣淵明允篤誠忠肅㳟懿宣慈惠和則其字又甚多如是反過於聖人如孟子言堯舜之道孝悌而已葢知所本今稱尚書恐當稱尚書尚奉上之義如尚衣尚食先儒稱武王觀兵於孟津後二年伐商如此則是武王兩畔也以其有此故於中庸言一戎衣而有天下解作一戎衣葢自説作兩度也孟子稱取之而燕民不悦弗取文王是也只為商命未改取之而燕民悦則取之武王是也此事間不容髪當日而命未絶則是君臣當日而命絶則為獨夫故予不奉天厥罪惟均然問命絶否何以卜之只是人情而已諸侯不期而㑹者八百當時豈由武王哉靈臺民始附也先儒指以為文王受命之年此極害義理又如司馬遷稱文王自羑里歸與太公行隂徳以傾紂天下如此則文王是亂臣賊子也惟董仲舒以為文王閔悼紂之不道故至於日昃不假食至於韓退之亦能識聖人作羑里操有臣罪當誅兮天王聖明之語文王之於紂事之極盡道矣先儒解經如此君臣之道且不明何有義理哉如考槃之詩永矢弗過弗告解以永不復告君過君豈是賢者之言詩序必是周時所作然亦有後人添入者則極淺近自可辨也如言不肯飲食教載之只見詩中云飲之食之教之誨之命彼後車謂之載之便云教載絶不成言語也又如髙子曰靈星之尸分明是髙子言更何疑一也七月之詩計古人之為天下國家只是豫而已堯夫解他山之石可以攻玉玉者温潤之物若兩玉相攻則無所成必石以磨之譬如君子與小人處為小人侵凌則修省畏避動心忍性增益其所不能如此便道理出來宗法管攝天下人心收宗族厚風俗使人不忘本須是明譜系世族與立宗子法宗法不立則人不知統系來處古人亦鮮有不知來處者宗子法廢後世尚譜牒猶有遺風譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄宗子之法不立則朝廷無世臣且如公卿一日崛起於貧賤之中以至公相宗法不立既死遂族散其家不傳宗法若立則人人各知來處朝廷大有所益或問朝廷何所益公卿各保其家忠義豈有不立忠義既立朝廷之本豈有不固今驟得富貴者止能為三四十年之計造宅一區及其所有既死則衆子分裂未幾蕩盡則家遂不存如此則家且不能保又安能保國家夫所謂宗者以己之旁親兄弟來宗已所以得宗之名是人來宗己非已宗於人也所以繼襧則謂之繼襧之宗繼祖則謂之繼祖之宗曾髙亦然言宗子者謂宗主祭祀宗子為士庶子為大夫以上牲祭於宗子之家非獨宗子之為士為庶人亦然宗子之母在不為宗子之妻服非也宗子之妻與宗子共事宗廟之祭者豈可夫婦異服故宗子雖母在亦當為宗子之妻服也東酌犧象西酌罍尊須夫婦共事豈可母子共事也未娶而死則難立後為其無母也如不得已須當立後又須并其妾母與之大不得已也未娶而死有妾之子則自是妾母也天子建國諸侯建宗亦天理也譬之於木其上下挺立者本也若是旁枝大叚茂盛則本自是須低摧又譬之於河其正流者河身若是涇流泛濫則自然後河身轉而隨涇流也宗之相承固理也及旁支昌大則須是郤為宗主至如伯邑考又不聞有罪只為武王之聖顧伯邑考不足以承太王之緒故須立武王所以然者與其使祖先享卿大夫之祭不若享人君之禮至如人有數子長者至微賤不立其間一子仕宦則更不問長少須是士人承祭祀古所謂支子不祭也者惟使宗子立廟主之而已支子雖不得祭至於齋戒致其誠意則與祭者不異與則以身執事不可與則以物助之但不别立廟為位行事而已後世如欲立宗子當從此義雖不與祭情亦可安若不立宗子徒欲廢祭適足長惰慢之志不若使之祭猶愈於已也今日大臣之家且可方宗子法譬如一人數子且以適長為大宗須據所有家計厚給以養宗子宗子勢重即願得之供宗子外乃將所有均給族人宗子須專立教授宗子之得失責在教授其他族人别立教授仍乞朝廷立條族人須管遵依祖先立法仍許族人將已合轉官恩澤乞囬授宗子不理選限官及許將奏薦子弟恩澤與宗子且要主張門户宗子不善則别擇其次賢者立之後來朝廷有制曾任兩府則宅舍不許分意欲後世尚存某官之宅或存一影堂知嘗有是人然宗法不立則此亦不濟事唐狄人傑顔杲卿眞卿後朝廷盡與官其所以旌别之意甚善然亦處之未是若此一人死遂卻絶嗣不若各就墳冡給與田五七頃與一閑名目使之世守其祿不惟可以為天下忠義之勸亦是為忠義者實受其報又如先代帝王陵寢其下多有閑田每處與一閑官世守之禮言祭畢然後敢私祭為如父有二子幼子欲祭父來兄家祭之此是私祭祖有諸孫適長孫已祭諸孫來祭者祭於長孫之家是為公祭王制言大夫之廟一昭一穆與太祖之廟而三若諸侯則以有國指始封之君為太祖若大夫安得有太祖宗子既廟其祖襧支子不得别祭所以嚴宗廟合族屬故曰庶子不祭祖襧明其宗也宗子為士立二廟支子為大夫當立三廟是曾祖之廟為大夫立不為宗子立然不可二宗别統故其廟亦立於宗子之家張子全書卷四
