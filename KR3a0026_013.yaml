body:
  text: 張子全書卷十三文集答范巽之書第一所訪物怪神姦此非難說顧語未必信耳孟子所論知性知天學至於知天則物所從出當源源自見知所從出則物之當有當無莫不心喻亦不待語而知諸公所論但守之不失不為異端所劫進進不已則物怪不須辨異端不必攻不逾期年吾道勝矣若欲委之無窮付之以不可知則學為疑撓智為物昏交來無間卒無以自存而溺於怪妄必矣朝廷以道學政術為二事此正自古之可憂者㢲之謂孔孟可作將推其所得而施諸天下邪將以其所不為而強施之於天下歟大都君相以父母天下為王道不能推父母之心於百姓謂之王道可乎所謂父母之心非徒見於言必須視四海之民如己之子設使四海之內皆為己之子則講治之術必不為秦漢之少恩必不為五伯之假名巽之為朝廷言人不足與適政不足與間能使吾君愛天下之人如赤子則治德必日新人之進者必良士帝王之道不必改途而成學與政不殊心而得矣慶州大順城記第二慶歷三年某月日經略元帥范公仲淹鎮役總若干建城於柔遠寨東北四十里故大順川越某月日城成汴人張載謹次其事為之文以記其功詞曰兵久不用文張武縱天警我宋羌蠢而動恃地之彊謂兵之衆傲侮中原如撫而弄天子曰嘻是不可捨養姦縱殘何以令下講謨于朝講士于野鍖刑斧誅選付能者皇皇范侯開府于慶北方之師坐立以聽公曰彼羌地武兵徑我士未練宜勿與競當避其彊徐以計勝吾視塞口有田其中賊騎未迹卯橫午縱余欲連壁以禦其衝保兵儲糧以俟其窮將吏掾曹軍師卒走交口同辭樂贊公命月良日吉將奮其旅出卒于營出器于府出幣于帑出糧于庾公曰戒哉無敗我舉汝礪汝戈汝銎汝斧汝于汝誅汝勤汝與既戒既言遂及城所索木箕土編繩奮杵胡虜之來百千其至自朝及辰衆積我倍公曰無誰是亦何害彼姦我乘及我未備勢雖不敵吾有以恃爰募彊弩其衆纍百依城而陳以堅以格戒曰謹之無鬬以力去則勿追往終我役賊之逼城傷死無數謨不我加因潰而去公曰可矣我功汝全無怠無遽城之惟堅勞不纍日池陴以完深矣如泉高焉如山百萬雄師莫可以前公曰濟矣吾議其旋擇士以守擇民而遷書勞賞才以飫以筵圖到而止薦聞于天天子曰嗟我嘉汝賢錫號大順因名其川于金于湯保之萬年女戒第三婦道之常順惟厥正婦止柔順是曰天明天之顯達是其帝命命女使順嘉爾婉娩克安爾親往之爾家呂氏汝家克施克勤能行孝順能勤爾順惟何無違夫子夫子壻也無然臯臯臯臯難與言也無然訿訿訿訿難與事也彼是而違爾焉作非違是則非彼舊而革爾焉作儀改舊乃汝安正制度惟非惟儀女生則戒在毛詩斯干篇王姬肅雍酒食是議周王之女亦然貽爾五物以銘爾心錫爾佩巾墨豫誨言銅爾提匜謹爾賔薦賔客祭禮玉爾奩具素爾藻絢藻絢粧飾不可大華枕爾文竹席爾吳管念爾書訓因枕文思訓思爾退安安爾退居之席彼實有室男當有室爾勿從室不得從而有其室也遜而提提遜謹退也提提安也爾生引逸引長也逸樂也賀蔡密學第四兹審顯被眷圖擢升要近寵輝之渙雖儒者至榮付任所期蓋朝廷有待藹傳中外孰不欣愈竊以篤實輝光日新而不可掩者德之修禍福吉凶人力所不能移者命之正今天下謀明守固功纍治勤浮議不能拒强力不能破未有若明公之盛也上知之民信之所不知獨未施於廟堂之上耳頃慶卒內嚮惶駭全陜府郡晝閉莫知所為士民失措室家相弔繼聞為渭師所敗潰遁而東其氣沮摧十亡八九雖非盛舉然應機敏捷使大患遽銷明識之士知有望焉今戎毒日深而邊兵日弛後患可懼而國力既殫將臣之重豈特司命士卒惟是三秦生齒存亡舒慘之本莫不繫之旌斾在秦正猶長城巨防利兵堅甲幸少選未召乃西陲不資之福載投迹山荒所有特一家之衆擔石之儲方且仰依兵庇有恃而生誠願明公置懷安危推夙昔自信之心日升不息以攘患保民為己任蓋知浮議强力不足以勝人心奪天命則含識之徒不勝至幸引跂門仞無任歡欣祈俟之極策問第五問三代道失而民散民散浸淫而盜不勝誅矣魯之衰也季康子患盜孔子謂茍子之不欲雖賞之不竊夫制産厚生昭節儉賤貨財使人安其分宜若可為也今欲使舉世之民厚賞焉不竊如夫子之言其亦有道乎問世祿之榮王者所以録有功尊有德愛之厚之示恩遇之不窮也為人後者所宜樂職勸功以服勤事任長廉遠利以嗣述世風而近世公卿子孫方且下比布衣工聲病售有司為不得已為貧之仕誠何心哉蓋孤秦以戰力竊攘滅學法壞田制使儒者風義寖弊不傳而士流困窮有至糟麩不厭自非學至於不動心之固不惑之明莫不降志辱身起皇皇而為利矣求口實而朵其頤為身謀而屈其道習久風變固不知求仕非義而反羞循理為不能不知廕襲為榮而反以虛名為善繼今欲舉三王教胄之法使英才知勸而志行修阜四方養士之財使寒暖有歸而衣食足取充之計講擢之方近於古而適於今必有中制衆君子彊學待問固將裨益盛明助朝廷政治著于篇觀厥謀之得失邊議第六城中之民既得以依城自郊外百姓朝廷不豫為慮非潰亡失生則殺戮就死縱或免焉則其老幼孳畜屋廬積聚莫不為之驅除蕩焚於死亡均矣欲為之計莫如選吏行邊為講族閭鄰里之法問其所謀諭之休戚使之樂羣以相聚協力以相資聽其依山林據險阻自為免患之計官不拘制一從其宜則積聚幼老得以先自為謀而處之有素冦雖深入野無所資而民免誅掠此為計之當先者也右清野師為虜致則喪陷之患多城不自完則應援之兵急凡今近城邊邑尤當募善守之人計定兵力庶使勢可必全不假外救足以技捂踰月應援之師不為倉皇牽制則守必力而師不勞此禦患之尤急者也然所謂善守者要以省兵為能假設一城之小千夫可完不才者十倍之而未必固善守者加損之而尚可全則守城乘障之人必也力與之計而省吾兵厚賞其功而示之信右固守戍而費財豈善戍之計欲不費必也計民以守不足然後益之以兵如是則為守之力在民居多而用兵無幾守既在民則今日守兵片城有餘皆得以移用他所或乘間可戰以自解其圍矣竊計關內守餘之兵無慮十萬四帥之城各餘萬人為備問其多少之冦此其大略也則舉中大數有移使之卒常不減六七萬人義勇既練則六七萬人從而省去亦攻守為有餘矣兵省費輕就使戎壘對峙用日雖多而吾計常足顧朝廷未嘗資守於民以兵多為患耳种世衡守環州吏士有罪射中則釋之僧道飲酒犯禁能射則縱之百姓繫者以能射則必免租稅逋負以能射必寬當是時環之內外莫不人人樂射一州之地可不用一卒而守以此觀之省戍豈甚難之計哉右省戍計民以守必先相視城池大小夫家衆寡為力難易為地緩急周圍步尺莫不盡知然後括以保法萃以什伯形以圖繪稽以文籍便其居處正其分位平時使之知所守識所向習登降時繕完賊至則授甲付兵人各謹備老幼供餉婦女守室如是則民心素安伎藝素講冦不能恐吏不能侵無倉卒之變無顚亂之憂民力不足然後濟之以兵此三代法制雖萬世可行不止利今日之民右因民城池之實欲其牢不可破甲盾之實欲其堅不可攻營陳之實欲其虜不可搖士卒之實欲其人致死力講訓之實欲其伎無不精兵矢之實欲其中無不彀今衆物備具而事不可期蓋實未始講而講不致實今朝廷未假塞外之功徒欲自固然尚且憂形廟堂而民不安土則講實之說豈容一日而緩蓋億萬矢之利其致利也必自一矢而積億萬人之能其盡能也必自一人而求千里之防必由一鍤而致堅江河之廣必由一勺而浸至今欲物一作均求其實而闊步高視謂小事無一有傷字一作小無事而忽之恐卒不見其成也本朝之論雖必以大計為言至於講治之精亦不可不思慮而致思可致而力不容緩則授補之方當知未易輕議趨今之急急在治兵矢舉鬭射种世衡守環州吏士有罪能射則釋之胥徒請告能射則給之僧道飲酒犯禁能射則置之百姓輕繫者能射則縱之租稅逋負者能射則緩之當是時環之士民人人樂射一州之地可不煩一卒而守然則得一臣如种世衡則朝廷不問其細而一城守矣宜推世衡之術於四方右講實擇帥之重非議者得言本朝以武臣典强藩輕戰忘患故選用文臣節制為計得矣然冦讐入境則舉數萬之甲付一武人驅之於必戰之地前後取敗非一二而已然則副總管之任繫安危勝負之速甚於元帥而大率以資任官秩次遷而得竊為朝廷危之右擇帥帥得其人則守邊之守聽帥擇為宜帥不可知則守之廢置一從內也不為過矣御大體極邊之郡攻守兼固須精選異才方稱其任其次邊及腹心州軍利於滋穀食教民戰為持久取勝之策為守必擇愛民謹事精審之人愛民則雖亟使之而不匱精審謹事則大小必舉事無不舉則雖深入不能乘間於腹心民不匱則戰精而食足右擇守養兵之費在天下十居七八今邊患作矣將謹防於外修實於內為持久之計而不愛用吾財則患日增而力日不足豈善為計議者哉今關內諸城誠能因民固守以省戍教義勇知一作習戰以省兵則每歲省費不啻二百餘萬不踰數年粟實財豐而不可勝用矣不如是恐財匱力殫敵乘吾敝將無從而制也右足用警敗者以中國取敗戎虜古今相繼而莫知所以致敗之端此言敗一作警之由一作欲既知此弊則免為所敗故曰警敗其不以制勝為言者以敵人用兵習知此利今吾亦得之適與之勢均法同故止可以免為所敗而已制勝之法當他圖矣凡用兵於山必能制人於原用兵於水一作原必能制人於川除高下逆順之利餘利皆得以一無以字繼此而言矣屋瓦將墜人居其下則不安巖壁有罅人過其下則必走女子乘城勇夫不敢出其前冦讎據勝地茍不計利而後進茍一作則後一作妄暗於戰而必敗也不疑間或獲全者非將之才智殊絶不侔則天耳大凡居高瞰下無可遁之情使之知所守識所向習登降時繕完賊至則受甲付兵云云右警敗與蔡帥邊事畫一第七近日傳聞諒祚身死已有朝旨令接引告哀人使過界足見朝廷含容之意務在息民隨物應機達於事變雖元凶巨惡尚不欲乘其憂患别議討除使四夷知中國為一無為字仁義為計甚善然諒祚猖狂罪在不赦邊陲釁隙已動干戈君臣之義既虧約束之令不守今其嗣子始立遣介告哀事同初附理必精思若不以丁寧指渾提耳告諭的確事節當面叙陳將恐羽翼既成卻論舊怨志懷稍適輒踵前非謀之不臧亂靡有定某今有人使到闕朝廷合降指揮畫一事件伏望少賜裁擇具如後當靣一作當回一乞降朝旨令館伴臣僚分明說與西界人使自种諤等及沿邊得力使臣所以建議開納橫山人戶為見汝主諒祚招納過沿邊逃亡罪人景珣之徒信其狂謀公然任用僭擬官名制度及諸般妄動不臣之狀一一指實事言與自來內外臣僚多議興兵問罪朝廷不欲煩民致使沿邊忠臣義士不勝憤怒遂有今日專輒之舉一乞降朝旨說與西人言种諤等所以專擅修築綏州安存嵬名山等投來人口為見汝主有從來招收下本朝逃亡軍人百姓作樂官工匠及僭創作簇馬御龍直名目諸般占使是致邊臣久一作不憤一乞降朝旨令說與西人令先縛送取景珣并其家屬及前後諒祚所存洎逃走軍人百姓盡還漢界朝廷當與汝國别定兩界約束事件各常遵守一乞降朝旨說與西人汝主諒祚違拒朝命不納詔使前後逆節不一今來朝廷以汝主諒祚既死不欲乘汝國凶喪饑旱便謀剪戮惜愛兩地百姓須仰汝主將取知恩改過結罪文字進來朝廷更待觀汝主誠意禮節如何别有指揮一乞說與西界人使言為諒祚猖狂及今來汝主幼小竊慮主張本國事體不定常萌僭逆今來欲將本國歲賜分減一半與汝國近上主兵用事臣僚十數人正令受朝廷官祿主持國事安存汝幼主不令妄動及為朝廷保守封疆不擾百姓令本國君臣具利害文字進來一乞將上件五事揀擇中外有心智詞筆臣僚令作詔書付夏國新主以觀其謀以奪其心以正其初使知過惡在彼不敢妄動及宣示陜西一路及沿邊蕃漢軍民令自今後更不得亂出一人一騎妄生事節聽候夏國新主奏報如何别聽處分涇原路經略司論邊事狀第八當司據今月二十一日西路先鋒巡檢王寧狀探報候得西界已議遣人詣保安軍進奉及界首斬戮誘殺楊知軍賊人納誓表請和觀西賊意度委實是為國內饑凶厭苦兵革思欲卻通舊好茍假安息故凡百婉順一如朝旨有以見朝廷德澤之盛威略之遠上干天心下副人望其備職邊帥不勝慶幸然某竊以安危之幾必通其變誓約之信在正其初今日諒祚已亡其子方立遣使告哀納欵詞禮恭順義同初附事必正名若不得丁寧指揮提耳告諭的當事節當面指陳乘其求也要之以誓書及其衰也啖之以厚利將恐志懷稍適卻踵前非羽翼既成輒修舊怨某今有時幾所見條一如右一訪聞傳西界有意縛送景珣并母妻卻出一作至漢界交付此雖未知虛的然聞景珣於諒祚在日特見信任以是西界內外臣僚莫不側目憎惡視如冦讎今諒祚已死其國中主議之人卻欲送還未足深怪然慮西人既還景珣之後必卻有繫送嵬名山之請竊恐朝廷未能決從轉滋嫌怨况景珣才識鄙下無足觀取留之賊中決不能為邊陲大患伏乞朝廷示之以優游閒暇特賜詔書褒嘉夏國臣主奉詔官守誓約之心及引用登極赦恩免景珣一家死刑更不令送歸漢界置之度外聽其用捨以示朝廷涵濡之廣赦令之信仍仰就問景珣更有無親屬兄弟尚在中國悉令遣送與之以愧快其心亦屏之遠方終身不齒之義使四夷知朝廷天包海蓄之度無以窺測且免日後有難從之請委得允當一勘㑹陜西一路射入之饒商市之富自來亦賴戎夷博易之便自興兵以來鹽幣虧損議者皆知由邊市不通商旅不行所致從來西人只知本國利中原物貨願欲稍通博買但苦朝廷未嘗許與故已各定一作安分不敢妄有求請治平元年中施昌言在本路嘗因誘引過景珣公事斷絶私下博買西界㸃集壓境欲謀奔衝令德順運通判劉忱靜邊塞監押党武與之說話開示意度却許令民間暗行些小博易西人樂聞此言即時唱喏遣罷兵衆此足見西界願欲通行博買之意然不知此事若行尤繫朝廷大利今來西人若再議通和竊恐主計臣僚為見即目課利頻虧遽陳此說不務艱難其事因以成功為拓土息兵豐財制敵之計伏望朝廷愛惜此事重惜者無為輕發必候擘畫得長久大計十分祥順西人凡百聽命然後與之商量一竊見古渭州一帶生熟蕃戶據地數百里兵數十萬土壤肥沃本漢唐名郡自來以頭項不一無所統屬厭苦西賊侵凌樂聞內附但以朝廷避引惹未甚開納今為西賊貪噬歲被驅劫往往不戰就降甘為臣制然西賊所以不能舉兵跨有者良由道路差遠恐延慶涇原之乘其虛也鋭意攻侵而不能捨者貪其富利其弱且欲漸有之通右臂以為秦蜀之患也今朝廷每欲修一城築一堡未嘗不㸃兵侵占以誅討順蕃熟戶為名只緣分未定而貪未息也朝廷誠能先使敏幹才辨之人誘得一方人心盡皆歸順擇一能臣賢將使之都護一隅開府塞外橫絶古渭西南一帶分疆塹山盡為漢界使人一面曉喻夏國應係今日以前順漢蕃戶不能妄有侵害則許令延慶涇原三路議定榷場通市之法著於誓書垂為永久某以為平夏之人必將捨遠取未成之謀就近便樂趍之利欣然聽命而邊患消矣縱彼不能盡從所議然秦鳳事宜兵備亦可十去六七至若經界之規畫行移之辭令則在巧者為之此不容悉也經略司畫一第九今據鄰路關報及諸處城塞探到西界見有黃河衷外㸃集人馬深慮乘此秋熟妄行冦抄及蹂踐緣邊苗稼未見得本路州軍至時如何禦捍邀殺須當預行指揮審問逐處畫一合行事件如後一要見本州從將來果若西賊大段入冦本州除堅壁清野不失防守外更有如何畫䇿可以立功取勝一要見本州從來准擬下是何將校緩急賊至令帶領甚色額甲兵多少人數更令與甚人同心共力㑹合出入不至落賊姦便一要見本州如是賊衆深入有幾處可以伏截邀擊山川道路及除見戰城壁外更有幾處須索戰守要害地方一要見本州自來有幾人官員將佐有心力膽量逐人宜合將領蕃兵或弓箭手或馬軍步人及約量逐人才力可以將領得多少人數一要見本州得力官員將校從來如何訓練得手下人馬武藝精强及各人手下的實揀練得多少來堪戰人數有無籍記定姓名及逐人所長事藝一要見本州官員將校一本有幾人二字或遇事宜出入各願在甚人名下及與甚人從來熟分至時可與同謀共力相助立功一要見本州據所有兵馬相度將校材力各人勝銷人數合作幾頭項使喚一要見本州如是西賊入冦鄰路或鄰州至時有甚人可令將兵䇿應及銷多少人馬可以必然立功仍令各自供析斟量已力可將人數不得妄有張皇務令當司可以應副其間若係素有材量之人必是擘畫布置便見方略如何一本州一州利害盡委自知州通判及主將官員通同商量揀擇聚議所長預先凖擬下逐節合行應敵事件各擇有心力官員一二人一本中更知州及各有心力官員三人尋委恭詳可否密切實封供申不得看狥人情務要公當不誤臨時邊事一本州舉內如有素負膽勇才武有心計敢戰不係正兵諸色人委本州勸誘招募令各自推擇首領預先赴官投狀情願團結面分相得材勇之人令各自團結隊遞相委保自備弓馬衣糧候西賊果是入冦先經逐近官司驗呈過處領人數任便各取勝地邀殺立功如委有顯效别無諸般情弊當議比附正兵功勞倍加酬賞仍更量其功大小特與敷奏不須廣求人數及夾帶徼幸無用之人在內凖備當司勾抽試驗一本州知州將校如有急速合行事件委是難以文字陳述須索親到本司商量便仰權交割職事與以次官員徑馬赴當司取稟一本州不拘僧道舉人公人百姓弓箭手如有拽硬及八九斗以上一本有射親二字有膽氣可使之人並仰召來試驗如委是上等事藝當議勾赴當司特與相度安排或納與請受令各自團結取情願處使用一本州諸軍下如有似此上項弓箭事藝並仰籍記姓名供申當司凖備緩急勾來試驗雜詩第十鞠歌行鞠歌胡然兮邈余樂之不猶宵耿耿其尚寐兮日孜孜焉繼豫乎厥修井行惻兮王收曰曷賈不售兮阻德音其幽幽述空文以繼志兮庶感通乎來古搴昔為之純美兮又申申其以告鼓弗躍兮麾弗前千五百年寥哉寂焉謂天實為兮則吾豈敢惟審已兮乾乾君子行君子防未然見幾天地先開物象未形弭災憂患前公旦立無方不恤流言喧將聖見亂人天厭懲孤偏竊攘豈豫思瓜李安足論送蘇修撰赴闕四首秦弊于今未息肩高蕭從此法相沿生無定業田疆壞赤子存亡任自然道大寧容小不同顓愚何敢與機通井疆師律三王事請議成功器業中闔闢天機未始休袗衣胝足兩何求巍巍只為蒼生事彼美何嘗與九州出異歸同禹與顏未分黃閣與青山事機爽忽秋毫上聊驗天心語默間别館中諸公九天宮殿鬱岧嶤碧瓦參差逼絳霄藜藿野心雖萬里不無忠戀向清朝聖心聖心難用淺功求聖學須專禮法修千五百年無孔孟誰從活水見源頭老大老大心思久退消個中終日面岧嶤六年無限詩書樂一種難忘是本朝有喪有喪不免道中非少為親嫌老為衰舉世只知隆考妣切思不見我心悲土牀土牀烟足紬衾暖瓦釡泉乾豆粥新萬事不思溫飽外漫然清世一間人芭蕉芭蕉心盡展新枝新卷新心暗已隨願學新心養新德旋隨新葉起新知貝母貝母階前蔓百尋雙桐盤繞葉森森剛强顧我蹉跎甚時欲低柔警寸心題解詩後置心平易始通詩逆志從容自解頥文害可嗟高叟固十年聊用勉經師詩上堯夫先生兼寄伯淳正叔先生高卧洛城中洛邑簪纓幸所同顧我七年清渭上並遊無侶又春風病肺支離恰十春病深樽爼久埃塵人憐舊病新年減不道新添别病深張子全書卷十三
