body:
  text: 張子全書卷九易説上乾乾元亨利貞乾之四德終始萬物迎之不見其首隨之不見其後然推本而言當父母萬物明萬物資始故不得不以元配乾坤其偶也故不得不以元配坤天下理得元也會而通亨也説諸心利也一天下之動正也貞者專靜也不曰天地而曰乾坤言天地則有體言乾坤則無形故性也者雖乾坤亦在其中初九潛龍勿用九二見龍在田利見大人大而得易簡之理當成位乎天地之中時舍而不受命乾九二有焉及夫化而聖矣造而位天德矣則富貴不足以言之九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎處隂故曰在淵九五飛龍在天利見大人上九亢龍有悔用九見羣龍無首吉彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞雲行雨施散而無不之也言乾發揮遍被於六十四卦各使成象變言其著化言其漸萬物皆始故性命之各正惟君子為能與時消息順性命躬天德而誠之行也精義時措故能保合太和健利且正孟子所謂終始條理集大成於聖智者歟易曰大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞其此之謂乎乾道變化各正性命此謂六爻言天道變化趨時者六爻各隨時自正其性命謂六位隨時正性命各有一道理蓋為時各不同首出庶物萬國咸寧不一則乖競象曰天行健君子以自強不息潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也道行也所行即是道易亦言天行健天道也或躍在淵進無咎也或躍進退皆可在淵者性退也故指其極而言也飛龍在天大人造也乾之九五曰飛龍在天利見大人乃大人造位天德成性躋聖者耳若夫受命首出則所性不存焉故不曰位乎君位而曰位乎天德不曰大人君矣而曰大人造也成性則躋聖而位天德乾九二正位於內卦之中有君德矣而非上治也九五言上治者通言乎聖人之德聖人之性捨曰君而謂之天見大人德與位之者皆造也至健而易至順而簡故其險其阻不可階而升不可逸而至仲尼猶天九五飛龍在天其致一也亢龍有悔盈不可久也用九天德不可為首也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞仁統天下之善禮嘉天下之會義公天下之利信一天下之動初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也孔子喜弟子之不仕蓋為德未成則不可以仕是行而未成者也故潛勿用龍德而未顯者也不成名不求聞也養實而已樂行憂違不可與德者語也用則行舍則藏惟我與爾有是夫顔子龍德而隱故遁世不見知而不悔直與聖者同能遁世不見知而不悔聖人不為沽激之行以求時知依乎中庸人莫能知以此自信不知悔也大而得簡易之理當成位乎天地之中時舍而不受命乾九二有焉及夫化而聖矣造而位天德矣則富貴不足以言之樂則行之憂則違之主於吾志而已無所求於外故善世博化龍德而見也潛而未見則為己而已不暇及夫人者也孟子不得已而用潛龍者也顔子不用潛龍者也孟子主教故須説豫豈好辨哉豫不得已也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也庸言庸行蓋天下經德達道大人之德施於是者博矣天下之文明於是著矣然非窮變化之神以時措之宜則或陷於非禮之禮非義之義此顔子所以求龍德而正中乾乾進德思處其極未敢以方體之常安吾止也顔氏求龍德正中而未見其止故擇中庸得一善則拳拳服膺歎夫子忽焉前後也乾三四位過中重剛時不可舍庸言庸行不足以濟之雖大人之盛有所不安外趨變化內正性命故其危其疑艱於見德者時不得舍也九五大人化矣天德位矣成性聖矣故既曰利見大人又曰聖人作而萬物覩亢龍以位畫為言若聖人則不失其正何亢之有德博而化言化物也以其善世即是化也善其身自化也兼善天下則是化物也知化則是德化聖人自化也化之況味在學者未易見焉但有此次序九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣乾九三修辭立誠非繼日待旦如周公不足以終其業忠信所以進德學者止是一誠意耳若不忠信如何進德不驕德當至也不憂業當終也適在不安之位故曰因其時求致用者幾不可緩將進德者涉義必精此君子所以立多凶多懼之地乾乾德業不少懈於趨時也知至極盡其所知也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎以陽居隂故曰在淵位非所安故或以躍德非為邪故進退上下惟義所適惟時所合故曰欲及時也能如此擇義則無咎也九四以陽居隂故曰在淵能不忘於躍乃可免咎非為邪也終其義也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流溼火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也谷神能象其聲而應之非謂能報以律呂之變也猶卜筮叩以是言則報以是物而已易謂同聲相應是也王弼謂命呂者律語聲之變非此之謂也聖人作萬物覩故利見大人本乎天者親上本乎地者親下此一章止為飛龍在天而發龍虎水火之喻蓋明各逐一類去本在上者却上去本在下者却逐下德性本得乎天者今復在天是各從其類也上九曰亢龍有悔何謂也子曰貴而無位髙而無民賢人在下位而無輔是以動而有悔也亢而自喪之也潛龍勿用下也見龍在田時舍也終日乾乾行事也或躍在淵自試也飛龍在天上治也亢龍有悔窮之災也乾元用九天下治也居大中安止之地至于三四則不得所安也聖人神其德不私其身故乾乾自強所以成之於天耳潛龍勿用陽氣潛藏見龍在田天下文明終日乾乾與時偕行或躍在淵乾道乃革飛龍在天乃位乎天德亢龍有悔與時偕極顔子未成性是為潛龍亦未肯止于見龍蓋以其德其時則須當潛顔子與孟子時異顔子有孔子在可以不顯孟子則處師道亦是已老故不得不顯耳九二九三九四至上九皆是時也九四曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也此時可上可下可進可退非為邪也即是直也天道不越乎直直方大則不須習行之自無不利非為邪則是陟降庭止也進德修業欲及時即是無然畔援無然歆羡誕先登于岸也言無畔去亦無援引亦無歆向亦無羡而不為誕知登于岸耳岸所處地位也此與進無咎同意惟志在位天德而已位天德大人成性也九三九四大體相似此二時處危難之大聖人則事天愛民不恤其他誕先登于岸九五大人造也造成就也或謂造為至意亦可大人成性則聖也化化則純是天德也聖猶天也故不可階而升聖人之教未嘗以性化責人若大人則學可至也位天德則神神則天也故不可以神屬人而言莊子言神人不識義理也又謂至人真人其辭險窄皆無可取孟子六等至於神則不可言人也上九亢龍緣卦畫而言須分初終終則自是亢極言君位則易有極之理聖人之分則安有過亢易雖以六爻為次序而言如此則是以典要求也乾初以其在初處下況聖修而未成者可也上以居極位畫為亢聖人則何亢之有若二與三皆大人之事非謂四勝於三三勝於二五又勝於四如此則是聖可階也三四與二皆言所遇之時二之時平和見龍在田者則是可止之處也時舍時止也以時之和平故利見不至於有害三四則皆時為難危又重剛又不中至九五則是聖人極致處不論時也飛龍在天況聖人之至若天之不可階而升也大人與聖人自是一節妙處精義入神以致用也利用安身以崇德也以理計之如崇德之事尚可勉勉修而至若大人以上事則無修故曰過此以往未之或知言不可得而知也直待己實到窮神知化是德之極盛處也然而人為者不過大人之事但德盛處惟己知之默而成之不言而信不怒而威如此方是成就吾之所行大人之事而已故於此爻却説大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶如此則是全與天地一體然不過是大人之事惟是心化也故嘗謂大可為也大而化不可為也在熟而已蓋大人之事修而可至化則不可加功加功則是助長也要在乎仁熟而已然而至於大以上自是住不得言在熟極有意大與聖難於分别大以上之事如禹稷臯陶輩猶未必能知然須當皆謂之聖人蓋為所以接人者與聖同但已自知不足不肯自以為聖如禹之德斯可謂之大矣其心以天下為己任規模如此又克己若禹則與聖人直無間别孔子亦謂禹於吾無間然矣久則須至堯舜有人於此敦厚君子無少異聖人之言行然其心與真仲尼須自覺有殊在他人則安能分别當時至有以子貢為賢於仲尼者惟子貢則自知之人能以大為心常以聖人之規模為己任久於其道則須化而至聖人理之必然如此其大即是天也又要細密處行之并暗隙不欺若心化處則誠未易至孔子猶自謂若聖與仁則吾豈敢儻曰吾聖矣則人亦誰能知故曰知我者其天乎然則必九五言乃位乎天德蓋自成聖實到也不言首出所性不存焉其實天地也不曰天地而曰天德言德則德位皆造故曰大人造也至此乃是大人之事畢矣五乾之極盛處故以此當聖人之成德言乃位即是實到為己有也若由思慮勉勉而至者止可言知不可言位也乃位則實在其所矣大抵語勉勉者則是大人之分也勉勉則猶或有退少不勉勉斯退矣所以須學問進德修業欲成性也成性則縱心皆天也所以成性則謂之聖者如夷之清惠之和不必勉勉彼一節而成性若聖人則於大以成性剛健故應乎天文明故時行乾二五皆正中之德五則曰大人造也又曰聖人作而萬物覩大人而升聖乃位乎天德也不言帝王而言天德位不足道也所性不存焉潛龍自是聖人之德備具但未發見見龍成性至飛龍則位天德乾元用九乃見天則乾元者始而亨者也利貞者性情也利貞者性情也以利解性以貞解情利流通之義貞者實也利快利也貞實也利性也貞情也情儘在氣之外其發見莫非性之自然快利盡性所以神也情則是實事喜怒哀樂之謂也欲喜者如此喜之欲怒者如此怒之欲哀欲樂者如此樂之哀之莫非性中發出實事也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也剛健中正中爻之德剛健中正純粹精也主以中正為精也六爻發揮言時各異旁通情也情猶言用也六爻擬議各正性命其乾德旁通不失大和而和且正也時乘六龍以御天也雲行雨施天下平也君子以成德為行日可見之行也成德為行德成自信而不疑所以日見于外可也潛之為言也隱而未見行而未成是以君子弗用也君子學以聚之問以辨之寬以居之仁以行之君子之道成身成性以為功者也未至於聖皆行未成之地耳顔子之徒隱而未見行而未成故曰吾聞其語矣未見其人也龍德而隱聖修而未成者也非如學者之未成凡言龍喻聖也若顔子可以當之雖伯夷之學猶不可言龍龍即聖人之德顔子則術正也易曰見龍在田利見大人君德也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎此以六畫分三才也以下二畫屬地則四逺於地故言中不在人若三則止言不在天在田而已夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎浩然無間則天地合德照無偏係則日月合明天地同流則四時合序酬酢不倚則鬼神合吉凶天地合德日月合明然後能無方無體然後無我先後天而不違順至理以推行知無不合也雖然得聖人之任皆可勉而至猶不害於未化爾坤坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉以西南為得朋乃安貞之德也以東北為喪朋雖得主有慶而不可懷也西南土之位東北木之位也西南得朋東北喪朋江沱之間有嫡不以其媵備數是不能喪朋也媵遇勞而無怨却是能喪朋者其卒嘯也歌是乃終有慶也此婦人之教大者也西南致養之地東北反西南者也隂陽正合則隂相對者必陽也西南得朋是始以類相從而來也東北喪朋喪朋相忘之義聽其自治不責人不望人是喪其朋也喪朋則有慶矣江有沱有汜有渚皆是始離而終合之象也有嫡不以其媵備數是不能喪朋媵遇勞而無怨是能喪朋也以其能喪朋故能始離而終合之子歸自嫡也不我以不我與不我過皆言其始之不均一也其後也悔嫡自悔也處既安既處之處也始離而終既處也歌是乃終有慶慶則同有慶彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常坤先迷不知所從故失道後能順聽則得其常矣西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆象曰地勢坤君子以厚德載物初六履霜堅氷至象曰履霜堅氷隂始凝也馴致其道至堅氷也六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也地道之有孚者故曰光也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也六三以隂居陽不獨有柔順之德其知光大含蘊文明可從王事者也然不可動以躁妄故可靜一以俟時不可有其成功故無成乃有終也六四括囊無咎無譽象曰括囊無咎慎不害也六五黃裳元吉象曰黃裳元吉文在中也上六龍戰于野其血玄黃象曰龍戰于野其道窮也用六利永貞象曰用六永貞以大中也文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行效法故光屈伸動靜終始各自别今以剛柔言之剛何嘗無靜柔何嘗無動坤至柔而動也剛則柔亦有剛靜亦有動但舉一體則有屈伸動靜終始乾行不妄則坤順必時也積善之家必有餘慶積不善之家必有餘殃餘慶餘殃百祥百殃與中庸必得之義同善者有後不善者無後理當然其不然者亦恐遲晚中間譬之瘠之或秀腴之或不秀然而不直之生也幸而免遇外物大抵適然耳君子則不恤惟知有義理臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也直其正也方其義也君子敬以直內義以方外敬以直內則不失於物義以方外則得已敬義一道也敬所以成仁也蓋敬則實為之實為之故成其仁敬義立而德不孤直方大不習無不利則不疑其所行也隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理正位居體美在其中而暢於四支發於事業美之至也隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫玄黃者天地之雜也天玄而地黃正位居體所以應黃裳之美屯屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧往則失其居矣象曰雲雷屯君子以經綸雲雷皆是氣之聚處屯聚也初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也磐桓猶言柱石磐磐石也桓桓柱也謂利建侯如柱石在下不可以動然志在行正也六二屯如邅如乘馬班如匪寇婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也班布不進之貌六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也處非其地故曰入于林中虞防禁也二以乘剛有寇故五若可親五屯其膏故不若捨之六四乘馬班如求婚媾往吉無不利象曰求而往明也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也上六乘馬班如泣血漣如象曰泣血漣如何可長也待求而往蒙蒙亨匪我求童蒙童蒙求我初筮告再三瀆瀆則不告利貞禮聞取道義於人不聞取其人之身來之為言屬有道義者謂之來來學者就道義而學之往教者致其人而取教也童蒙求我匪我求童蒙是也教人當以次守得定不妄施易曰初筮告再三瀆瀆則不告是剛中之德也彖曰蒙山下有險險而止蒙險而止蒙蒙亨以亨行時中也夫險而不止則入于坎入于蹇不止則是安其危之類也以其知險而止也故成蒙之義方以有求童蒙求我匪我求童蒙以蒙而求故能時中所以亨也人心多則無由光明蒙雜而著著古著字雜著於物所以為蒙蒙昏蒙也蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也象曰山下出泉蒙君子以果行育德時之義甚大如蒙亨以亨行時中也者蒙何嘗有亨以九二之亨行蒙者之時中故蒙所以得亨也蒙無遽亨之理以九二循循行時中之亨也蒙卦之義主之者全在九二彖之所論皆二之義教者但觀蒙者時之所及則道之此是亨行時也此時也正所謂如時雨化之如既引之中道而不使之通則是教者之過當時而道之使不失其正則是教者之功養其蒙使正者聖人之功也初六發蒙利用刑人用説桎梏以往吝象曰利用刑人以正法也以柔下賢居於坎陷然無所私係用心存公雖不能諭人於道以辨曲直正法可也善行法者多説於任刑道非𢎞矣故以往吝故君子哀矜而弗喜也故一作終九二包蒙吉納婦吉子克家象曰子克家剛柔接也擇婦而納之則吉九二以下卦之中主卦德故曰子克家以子任家必剛柔得中乃濟不可嚴厲也六三勿用取女見金夫不有躬無攸利金夫二也不有躬履非正則不能固於一也象曰勿用取女行不順也六四困蒙吝象曰困蒙之吝獨逺實也六五童蒙吉象曰童蒙之吉順以巽也不願不信蒙之失正者也故蒙正如童吉與夫彖之義同上九擊蒙不利為寇利禦寇象曰利用禦寇上下順也蒙暗犯寇禦之可也以剛明極顯而寇蒙暗則傷義而衆不率也九二以剛居中故能包蒙而吉需需有孚光亨貞吉利涉大川剛健而不陷而能俟時故有孚於光亨也訟需坎皆言有孚必然之理也又如未濟飲酒濡首亦言有孚義同此彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也象曰雲上於天需君子以飲食宴樂雲上於天需君子以飲食宴樂九五需于酒食貞吉未濟亦有孚于飲酒以隂在前無所施為惟於飲食而已初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也九三需于泥致寇至象曰需于泥災在外也自我致寇敬慎不敗也六四需于血出自穴象曰需于血順以聽也以柔居隂不能禦強來則聽順而辟其路九五需于酒食貞吉象曰酒食貞吉以中正也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也上無所出故降入自穴恭以納之雖處極上不至於失訟訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也象曰天與水違行訟君子以作事謀始初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初於正應中有隂陽之間不無訟但以隂居下體為柔順履險方初不永所事其理辨直故小有言終吉直一作正九二不克訟歸而逋其邑人三百户無眚象曰不克訟歸逋竄也自下訟上患至掇也處險體剛好訟者也上下二隂俱非己應理為不直故不訟歸而逋竄使其邑人之衆無辜被禍故曰邑人無眚六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也履非其位處險之極若能不為他纍専應上九則雖危終吉故曰舊德以隂居陽又處成功必有悔吝故曰無成九四不克訟復即命渝安貞吉象曰復即命渝安貞不失也九五訟元吉象曰訟元吉以中正也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也體健而比於三理為不直故不克訟師師貞丈人吉無咎丈人過剛太公近之剛正剛中則是大人聖人得中道也太公則必待誅紂時雖鷹揚所以為過剛不得稱大人彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣象曰地中有水師君子以容民畜衆初六師出以律否臧凶象曰師出以律失律凶也師出以律師之始也體柔居賤不善用律故凶九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也懷愛萬邦故所以重將帥六三師或輿尸凶象曰師或輿尸大無功也隂柔之質履不以正以此帥衆固不能一師丈人吉非隂柔所禦六四師左次無咎象曰左次無咎未失常也次之不戰之地則不失其常六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也柔居盛位見犯乃較故無咎任寄非一行師之凶也上六大君有命開國承家小人勿用象曰大君有命以正功也小人勿用必亂邦也師終必推賞然小人雖有功不可胙之以土長亂也承猶繼世之承也比比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也象曰地上有水比先王以建萬國親諸侯必原筮者慎所與也初六有孚比之無咎有孚盈缶終來有它吉象曰比之初六有它吉也柔而無應能擇有信者親之已之誠素著顯終有他吉比好先也六二比之自內貞吉象曰比之自內不自失也愛自親始人道之正故曰貞吉六三比之匪人象曰比之匪人不亦傷乎履非其正比之必匪其人故可傷六四外比之貞吉象曰外比於賢以從上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也上六比之無首凶象曰比之無首無所終也失前禽謂三面而驅意在緩逸之不務殺也順奔然後取之故被傷者少也以剛居中而顯明比道伐止有罪不為濫刑故邑人不誡為上用中此之謂也不比者不懲非用中也故比必顯之然殺不可務也一云上使中者付得其人也小畜小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也象曰風行天上小畜君子以懿文德自我西郊剛陽之氣進而不已也初九復自道何其咎吉象曰復自道其義吉也以理而升進之於應也九二牽復吉象曰牽復在中亦不自失也初反自道三為説輻二以彚征在中故未為失九三輿説輻夫妻反目象曰夫妻反目不能正室也近而相比故説輻而不能進反為柔制故曰反目非其偶也故不能正其室六四有孚血去惕出無咎象曰有孚惕出上合志也以隂居隂其體不躁故曰有孚能上比於五與之合志雖為羣下所侵被傷而去懷懼而出於義無咎九五有孚攣如富以其鄰象曰有孚攣如不獨富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也六四為衆陽之主已能接之以信攣如不疑則亦為衆所歸故曰富以其鄰履履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨説雖應乾而二不纍五也剛中正履帝位而不疚光明也無隂柔之纍故不疚此所以正一卦之德也象曰上天下澤履君子以辨上下定民志初九素履往無咎象曰素履之往獨行願也隂纍不干無應於上故其履潔素九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也中正不纍無援於上故中不自亂得幽人之正六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也大君者為衆爻之主也武人者剛而不德也九四履虎尾訴訴終吉象曰訴訴終吉志行也二五不纍於己處多懼之地近比於三能常自危則志願終吉陽居隂故不自肆常自危也九五夬履貞厲象曰夬履貞厲位正當也上九視履考祥其旋元吉象曰元吉在上大有慶也視所履以考求其吉莫如旋而反下則獲應而有喜也乘剛未安其進也寧旋泰泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也象曰天地交泰后以財成天地之道輔相天地之宜以左右民初九拔茅茹以其彚征吉象曰拔茅征吉志在外也九二包荒用馮河不遐遺朋亡得尚于中行象曰包荒得尚于中行以光大也中行中立之行也若朋比則未足尚也舜文之大不是過也九三無平不陂無往不復艱貞無咎勿恤其孚于食有福象曰無往不復天地際也因交與之際以著戒能艱貞則享福可必六四翩翩不富以其鄰不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也隂陽皆未安其分故家不富志不寧六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也雖隂陽義反取交際為大義上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰極則否非力所支故不可以師其勢愈亂正以命令諭衆然終吝道也故知者先幾艱貞無咎著戒未然也否否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也象曰天地不交否君子以險德辟難不可榮以祿蓋言上下不交便天下無邦有邦而與無邦同以不成國體也在天下他國皆無道只一邦治亦不可言天下無道須是都不治然後是天下無道也於否之時則天下無邦也古之人一邦不治别之一邦直至天下皆無邦可之則止有隱耳無道而隱則惟是有朋友之樂而已子欲居九夷未敢必天下之無邦或夷狄有道於今海上之國儘有仁厚之治者初六拔茅茹以其彚貞吉亨象曰拔茅貞吉志在君也柔順處下居否以靜者也能以類正吉而必亨不事茍合志在得主者歟六二包承小人吉大人否亨象曰大人否亨不亂羣也處二隂之間上順下容衆不可異故其道否乃亨六三包羞象曰包羞位不當也處否而進履非其位非知恥者也九四有命無咎疇離祉象曰有命無咎志行也居否之世以陽處隂有應於下故雖有所命無咎也九五休否大人吉其亡其亡繫于苞桑象曰大人之吉位正當也上九傾否先否後喜象曰否終則傾何可長也以亡為懼故能休其否包桑從下叢生之桑叢生則其根牢書云厥草惟包如竹叢蘆葦之類河朔之桑多從根斬條取葉其生叢然同人同人于野亨利涉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志象曰天與火同人君子以類族辨物不能與人同未足為正也天下之心天下之志自是一物天何常有如此間别初九同人于門無咎象曰出門同人又誰咎也六二同人于宗吝象曰同人于宗吝道也九三伏戎于莽升其高陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也上九同人于郊無悔象曰同人于郊志未得也二與五應而為他間已直人曲望之必深故號咷也師直而壯義同必克故遇而後笑大有大有元亨彖曰大有柔得尊位大中而上下應之曰大有其德剛健而文明應乎天而時行是以元亨柔得盛位非所固有故曰大有剛健故應乎天文明故時行象曰火在天上大有君子以遏惡揚善順天休命柔能大有非天道也乃天命也故曰順天休命遏惡揚善勉衆也初九無交害匪咎艱則無咎象曰大有初九無交害也二應於五三能自通四匪其旁惟初無交故有害然非其咎九二大車以載有攸往無咎象曰大車以載積中不敗也九三公用亨于天子小人弗克象曰公用亨于天子小人害也非柔中文明之主不能察非剛健不私之臣不能通故曰小人弗克九四匪其彭無咎象曰匪其彭無咎明辨晳也六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而無備也人威重有德望則人自畏服易曰厥孚交如威如吉君子以至誠交人然後有威重威如之吉易而無備也君子至平易有何關防擬備惟以抑抑威儀為德之隅儼然人望而畏之既易而無備則威如乃吉也上九自天祐之吉無不利象曰大有上吉自天祐也以剛而下柔居上而志應於中故曰履信思順又以尚賢蓋五陽一隂又無物以間焉耳剛柔相求情也信也謙謙亨君子有終彖曰謙亨天道下濟而光明止於下故光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也人樂尊之故光而不掩志下於人故人不能加天以廣大自然取貴人自要尊大須意我固必欲順己尊己又悅己之情此所以取辱取怒也謙尊而光卑而不可踰夫尊者謙則更光卑者己謙又如何踰之此天德至虛者焉以其能謙故尊而益光卑又無人可踰蓋已謙矣復如何踰越也謙天下之良德象曰地中有山謙君子以裒多益寡稱物平施隱髙於卑謙之象也易大象皆是實事卦爻小象則容有寓意而已言風自火出家人家人之道必自烹飪始風風也教也蓋言教家人之道必自此始也又如言木上有水井則明言井之實事也又言地中有山謙夫山者崇高之物非謙而何又如言雲雷屯雲雷皆是氣之聚處屯聚也多者寡者皆量宜下之初六謙謙君子用涉大川吉象曰謙謙君子卑以自牧也牧逸也六二鳴謙貞吉象曰鳴謙貞吉中心得也體柔居正故以謙獲譽與上六之鳴異矣故曰貞吉九三勞謙君子有終吉象曰勞謙君子萬民服也中心安之也有終則吉人則難能六四無不利撝謙象曰無不利撝謙不違則也裒多益寡無不盡道舉措皆謙六五不富以其鄰利用侵伐無不利象曰利用侵伐征不服也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也下應於三其迹顯聞故曰鳴謙最上用謙為衆所服故利用行師然聲鳴其謙必志有求焉非如六二之正也三止於下如邑國之未賔也一云鳴謙則師有名豫豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎上動而下不順非建侯行師之利也天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉象曰雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考王者之樂莫大於是初六鳴豫凶象曰初六鳴豫志窮凶也知幾者上交不諂今得應於上豫獨著聞終凶之道也故几豫之理莫若安其分動以義也六二介于石不終日貞吉象曰不終日貞吉以中正也六三盱豫悔遲有悔象曰旴豫有悔位不當也九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也六五貞疾恆不死象曰六五貞疾乘剛也恆不死中未亡也上六冥豫成有渝無咎象曰冥豫在上何可長也不終日貞吉言疾正則吉也六二以隂居隂獨無纍於四故其介如石坤體柔順以其在中而靜何俟終日必知幾而正矣體順用中以隂居隂堅介如石故在理則悟為豫之吉莫甚焉不以悅豫而流也隨隨元亨利貞無咎彖曰隨剛來而下柔動而説隨大亨貞無咎而天下隨時隨時之義大矣哉象曰澤中有雷隨君子以嚮晦入宴息上九下居於初也故曰剛來下柔初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也言凡所治務能變而任正不膠柱也處隨之初為動之主心無私係故能動必擇義善與人同者也六二係小子失丈夫象曰係小子弗兼與也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也舍小隨大所求可得必守正不邪乃吉九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也以陽居隂利於比三則凶也處隨之世為衆所附茍利其獲凶之道也能以信存道則功業可明無所咎矣九五孚于嘉吉象曰孚于嘉吉位正中也上六拘係之乃從維之王用亨于西山象曰拘繫之上窮也處隨之世而剛正宅尊善為衆信故吉或曰孚於二則吉蠱蠱元亨利涉大川元亨然後利涉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱憂患內萌蠱之謂也泰終反否蠱之體也弱而止待能之時也蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也象曰山下有風蠱君子以振民育德後甲三日成前事之終先甲三日善後事之始也剛上柔下故可為之倡是故先甲三日以蠲其法後甲三日以重其初明終而復始通變不窮也至於巽之九五以其上下皆柔故必無初有終是故先庚後庚不為物首也於甲取應物而動順乎民心也一本為事之倡法一作治初六幹父之蠱有子考無咎厲終吉象曰幹父之蠱意承考也處下不係應於上如子之專制雖意在承考然亦危厲以其柔巽故終吉九二幹母之蠱不可貞象曰幹母之蠱得中道也處中用巽以剛係柔幹母之蠱得剛柔之中也九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也義如初六小有悔者以其剛也六四裕父之蠱往見吝象曰裕父之蠱往未得也裕父之蠱不能為父除患能寬裕和緩之而已以柔居隂失之太柔故吝正固乃可幹事以柔致逺往未得也六五幹父之蠱用譽象曰幹父用譽承以德也雖天子必有繼也故亦云幹父之蠱上九不事王侯高尚其事象曰不事王侯志可則也隱居以求其志故可則也臨臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也象曰澤上有地臨君子以教思無窮容保民無疆臨言有凶者大抵易之於爻變陽至二便為之戒恐有過滿之萌未過中已戒猶履霜堅氷之義及泰之三曰無平不陂無往不復皆過中之戒也初九咸臨貞吉象曰咸臨貞吉志行正也臨為剛長已志應上故雖感而行正也九二咸臨吉無不利象曰咸臨吉無不利未順命也非咸則有上下之疑有所不利六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也體説乘剛故甘邪説求容而以臨物安有所利能自憂懼庶可免咎六四至臨無咎象曰至臨無咎位當也以隂居隂體順應正盡臨之道雖在剛長可以無咎正一作説六五知臨大君之宜吉象曰大君之宜行中之謂也順命行中天子之宜上六敦臨吉無咎象曰敦臨之吉志在內也體順則無所違極上則無所進不以無應而志在於臨故曰敦臨志在內也觀觀盥而不薦有孚顒若盥求神而薦褻也彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣象曰風行地上觀先王以省方觀民設教內順外巽示民以順而外從巽此祭所以為教之本故盥而不薦中正以觀天下又曰大觀在上皆謂五也凡言觀我生亦皆謂五也天不言藏其用而四時行神道如盥而不薦之類盥簡潔而神薦褻近而煩也有兩則須有感然天之感有何思慮莫非自然聖人則能用感何謂用感凡教化設施皆是用感也作於此化於彼者皆感之道聖人以神道設教是也天不言而四時行聖人設教而天下服誠於此動於彼神之道歟初六童觀小人無咎君子吝象曰初六童觀小人道也所觀者末小人之道施於君子則吝六二窺觀利女貞象曰窺觀女貞亦可醜也得婦人之道雖正可羞六三觀我生進退象曰觀我生進退未失道也觀上所施而進退雖以隂居陽於道未失以其在下卦之體而應於上故曰進退六四觀國之光利用賔于王象曰觀國之光尚賔也體柔巽而以隂居下賔之必無過也故利下一作隂九五觀我生君子無咎象曰觀我生觀民也觀我所自出者上九觀其生君子無咎象曰觀其生志未平也以剛陽極上之德居不臣不任之位以觀國家之政志有所未平也有君子循理之心則可免咎俯視九五之為故曰觀其生噬嗑噬嗑亨利用獄彖曰頥中有物曰噬嗑噬嗑而亨子路禮樂文章未足盡為政之道以其重然諾言為衆信故片言可以折獄如易利用獄利用刑人皆非卦爻盛德適能是而已焉剛柔分動而明雷電合而章九五分而下初六分而上故曰剛柔分合而章合而成文也柔得中而上行雖不當位利用獄也象曰雷電噬嗑先王以明罰敕法六自初而進之於五故曰上行初九屨校滅趾無咎象曰屨校滅趾不行也戒之在初小懲可止故無咎六二噬膚滅鼻無咎象曰噬膚滅鼻乘剛也六三居有過之地而已噬之乘剛而動為力不勞動未過中故無咎六三噬臘肉遇毒小吝無咎象曰遇毒位不當也所間在四四為剛陽故曰臘肉非禮傷義故曰遇毒能以為毒而舍之雖近不相得小有吝而無咎也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也五為隂柔故喻乾胏能守正得剛直之義故艱正吉其德光大則其正非艱也六五噬乾肉得黃金貞厲無咎象曰貞厲無咎得當也上九何校滅耳凶象曰何校滅耳聰不明也九四上九難于屈服故曰乾肉得居中持堅之義正而危則得無咎也賁賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下象曰山下有火賁君子以明庶政無敢折獄無敢折獄者明不兼於下民未孚也故止可明政以示民耳初九賁其趾舍車而徒象曰舍車而徒義弗乘也文明之德以貴居賤修飾於下故曰賁其趾義非茍進故曰舍車而徒六二賁其須象曰賁其須與上興也賁其須起意在上也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也上下皆柔無物陵犯然不可邪妄自肆故永貞然後終保無悔六四賁如皤如白馬翰如匪寇婚媾象曰六四當位疑也匪寇婚媾終無尤也以隂居隂性為艮止故志堅行深終無尤纍六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也隂陽相固物所阜生柔中之德比於上九上九敦素因可恃而致富雖為悔吝然獲其吉也其道上行故曰丘園悔一作隘上九白賁無咎象曰白賁無咎上得志也上而居髙潔無所纍為物所貴故曰上得志也上一作止剝剝不利有攸往彖曰剝剝也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也象曰小附於地剝上以厚下安宅處剝之時順上以觀天理之消息盈虛初六剝牀以足蔑貞凶象曰剝牀以足以滅下也六二剝牀以辨蔑貞凶象曰剝牀以辨未有與也三雖隂類然志應在上二不能進剝陽爻徒用口舌間説力未能勝故象曰未有與也然志在滅陽故亦云蔑貞凶六三剝之無咎象曰剝之無咎失上下也獨應於陽故反為衆隂所剝然無所咎六四剝牀以膚凶象曰剝牀以膚切近災也迫近君位猶自下剝牀至牀之膚將及於人也不言蔑正剝道成矣一云五於隂陽之際義必上比故以喻膚六五貫魚以宮人寵無不利象曰以宮人寵終無尤也六五為上九之膚能下寵衆隂則陽獲安而無不利矣異於六三者以其居尊制裁為卦之主故不云剝之也終無尤怨者以小人之心不過圖寵利而已不以官人見畜為恥也隂陽之際近必相比六五能上附於陽反制羣隂不使進逼方得處剝之善下無剝之之憂上得陽功之庇故曰無不利上九碩果不食君子得輿小人剝廬象曰君子得輿民所載也小人剝廬終不可用也處剝之世有美實而不見採然其德備猶為民所載小人處下則剝牀處上則反傷於下是終不可用之也復復亨出入無疾朋來無咎反復其道七日來復利有攸往靜之動也無休息之期故地雷為卦言反又言復終則有始循環無窮人指其化而裁之耳深其反也幾其復也故曰反復其道又曰出入無疾彖曰復亨剛反動而以順行是以出入無疾朋來無咎反復其道七日來復天行也利有攸往剛長也復其見天地之心乎復言天地之心咸恆大壯言天地之情心內也其原在內時則有形見情則見於事也故可得而名狀自姤而剝至於上九其數六也剝之與復不可容線須臾不復則乾坤之道息也故適盡即生更無先後之次也此義最大臨卦至于八月有凶此言七日來復何也剛長之時豫戒以隂長之事故言至于八月有凶若復則不可須臾斷故言七日七日者晝夜相繼元無斷續之時也大抵言天地之心者天地之大德曰生則以生物為本者乃天地之心也地雷見天地之心者天地之心惟是生物天地之大德曰生也雷復於地中却是生物彖曰終則有始天行也天行何嘗有息正以靜有何期程此動是靜中之動靜中之動動而不窮又有甚首尾起滅自有天地以來以迄于今蓋為靜而動天則無心無為無所主宰恆然如此有何休歇人之德性亦與此合乃是已有茍心中造作安排而靜則安能久然必從此去蓋靜者進德之基也象曰雷在地中復先王以至日閉關商旅不行后不省方凡言后者大率謂繼體守成之主也復言先王以至日閉關商旅不行后不省方以此校之則后為繼承之主明矣先王以至日閉關者先王所重於至日以其順隂陽往來閉關者取其靜也閉關則商旅不行先王無過放事順時以示法亦以示民后不省方如言富庶優暇不甚省事又明是繼文之主初九不逺復無祗悔元吉象曰不逺之復以修身也祗猶承也受也一云祗悔作神祗之祗祗之為義示也效也見也言悔可使亡不可使成而形也六二休復吉象曰休復之吉以下仁也下比於陽故樂行其善六三頻復厲無咎象曰頻復之厲義無咎也所處非位非頻蹙自危不能無吝吝一作咎六四中行獨復象曰中行獨復以從道也柔危之世以中道合正應故不與羣爻同六五敦復無悔象曰敦復無悔中以自考也性順位中無它應援以敦實自求而已剛長柔危之世能以中道自考故可無悔不然取悔必矣上六迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征象曰迷復之凶反君道也君道過亢反常無施而可故天災人害師敗君凶久衰而不可振也無妄無妄元亨利貞其匪正有眚不利有攸往彖曰無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不祐行矣哉無妄四德無妄而後具四德也其曰匪正有眚對無妄雷行天動也天動不妄故曰無妄天動不妄則物亦無妄乾道變化各正性命也象曰天下雷行物與無妄先王以茂對時育萬物物因雷動雷動不妄則物亦不妄故曰物與無妄育不以時害莫甚焉初九無妄往吉象曰無妄之往得志也易所謂得志者聖賢獲其願欲者也得臣無家堯之志也貞吉升階舜之志也六二不耕穫不災畬則利有攸往象曰不耕穫未富也柔之為道不利遠者能遠利不為物首則可乘剛處實則凶六三無妄之災或繫之牛行人之得邑人之災象曰行人得牛邑人災也妄災之大莫大於妄誅於人以隂居陽體躁而動遷怒肆暴災之甚者繫牛為説緣耕穫生詞九四可貞無咎象曰可貞無咎固有之也九五無妄之疾勿藥有喜象曰無妄之藥不可試也體健居尊得行其志故以無妄為疾無妄之疾疾無妄之謂也欲妄動而不敢妄是則以無妄為疾者也如孟子言有法家拂士是疾無妄者也以無妄為病而醫之則妄之意遂矣故曰勿藥有喜又曰不可試也言不可用藥治之上九無妄行有眚無攸利象曰無妄之行窮之災也進而過中是無妄而行也大畜大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉養賢也利涉大川應乎天也象曰天在山中大畜君子以多識前賢往行以畜其德剛健篤實日新其德乃天德也陽卦在上而上九又在其上故曰剛上而尚賢強學者往往心多好勝必無心處一乃養也定然後始有光明惟能定己是光明矣若常移易不定何求光明易大抵以艮為止止乃光明時止時行動靜不失其時其道光明謙天道下濟而光明天在山中大畜君子以剛健篤實輝光日新其德定則自光明故大學定而至於能慮人心多則無由光明蒙雜而著著古著字雜著於物所以為蒙蒙昏蒙初九有厲利己象曰有厲利己不犯災也趨其應則有二三之阻故不若己也九二輿説輹象曰輿説輹中無尤也不阻於三則見童於四不躁進者位中也九三艮馬逐利艱貞日間輿衛利有攸往象曰利有攸往上合志也不防輿衛而進歷二隂則或有童牿説輻之害不利其往也本乎天者親上故上合志也六四童牛之牿元吉象曰六四元吉有喜也六五豶豕之牙吉象曰六五之吉有慶也上九何天之衢亨象曰何天之衢道大行也其道大行也升於天何待衢路而進言無所不通也衢字當為絶句艮為止止二隂也不以止其類也故亨頤頥貞吉觀頤自求口實彖曰頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頥之時大矣哉觀頥辨養道得失欲觀人處已之方象曰山下有雷頥君子以慎言語節飲食山下有雷畜養之象初九舍爾靈龜觀我朵頥凶象曰觀我朵頥亦不足貴也體躁應上觀我而朵其頥求養而無恥者也六二顛頥拂經于丘頥征凶象曰六二征凶行失類也凡頥之正以貴養賤以陽養隂所謂經也頥卦羣隂皆當聽養於上六二違之反比於初以隂養陽顛頥者也羣隂上所聚養者也六二亂經於聚養之義失隂類之常故以進則凶六三拂頥貞凶十年勿用無攸利象曰十年勿用道大悖也履邪好動係説於上不但拂經而己害頥之正莫甚焉故凶係説於上一作係而説上六四顛頥吉虎視耽耽其欲逐逐無咎象曰顛頥之吉上施光也體順位隂得頥之正以貴養賤而得賢者雖反陽爻養隂之義以上養下其施光矣然以柔養剛非嚴重其德廣大其志則未免於咎六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也聽養於上正也以隂居頥卦之尊拂經也上九由頥厲吉利涉大川象曰由頥厲吉大有慶也由頥自危然後乃吉者下有衆隂順從之慶驕則有它吝此卦得養之正者方利涉大川蓋養然後可動耳大過大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而説行利有攸往乃亨大過之時大矣哉象曰澤滅木大過君子以獨立不懼遁世無悶陽剛過實於中本末過弱於外故當過矯相與也初六藉用白茅無咎象曰藉用白茅柔在下也九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也扶衰於上使枯木生稊拯弱於下使微隂獲助此剛中下濟之功亦自獲助於物也九三棟橈凶象曰棟橈之凶不可以有輔也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也志在拯弱則棟隆而吉若私應為心則撓乎下吝也九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也九五上係上六故不能下濟大事徒益其末耳無拯物之心所施者狹老婦士夫所與者不足道枯楊生華勢不能久故無譽未至長亂故無咎上六過涉滅頂凶無咎象曰過涉之凶不可咎也隂居上極雖過而不足涉難故凶大過之極故滅頂而無咎也習坎習坎有孚維心亨行有尚習坎重襲之義八純卦惟此加習者餘皆一字可盡其義坎取其險故重之而其險乃著也色以離見聲以震聞臭以巽知味以坎達坎離者天地之中二氣之正交然離本隂卦坎本陽卦以此見二氣其本如此而交性也非此二物則無易彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉象曰水洊至習坎君子以常德行習教事可盈則非謂重險也中柔則心無常何能亨也內外皆險義不可止故行有尚也坎維心亨故行有尚外雖積險茍處之心亨不疑則雖難必濟而往有功也今水臨萬仞之山要下即下無復凝滯人在前惟知有義理而己則復何迥避所以心通初六習坎入于坎窞凶象曰習坎入坎失道凶也比于二無出險之志故云入于坎窞也九二坎有險求小得象曰求小得未出中也險難之際弱必附強上下俱隂求必見從故求則必小得然二居險中而未出也六三來之坎坎險且枕入于坎窞勿用象曰來之坎坎終無功也前之入險退來枕險入窞與初六同六四樽酒簋二用缶納約自牖終無咎象曰樽酒簋二剛柔際也四五俱得隂陽之正險阻之際近而相得誠素既接雖簡略於禮無咎也上比於五有進出之漸故無凶九五坎不盈祗既平無咎象曰坎不盈中未大也險難垂出而下比於四不能勉成其功光大其志故聖人惜之曰只既平無咎而已矣不能往有功也一本云坎盈則進而往有尚矣上六係用徽纆置于叢棘三嵗不得凶象曰上六失道凶三嵗也上六過中逃險而失道者也不附比陽中幾於迷復之凶故為所係纍也隂柔不能附比於陽處隂之極乘剛宜其為所拘戮也離離利貞亨畜牝牛吉以柔麗乎中正故利貞彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也日月草木麗天地麗附著也象曰明兩作離大人以繼明照于四方明目達聽繼明之道也人患墮於博覽惟大人能勉而繼之初九履錯然敬之無咎象曰履錯之敬以辟咎也履錯然與之者多也無應於上無所朋附以剛處下物所願交非矜慎之甚何以免咎六二黃離元吉象曰黃離元吉得中道也九三日昃之離不鼓缶而歌則大耋之嗟凶象曰日昃之離何可久也明正將老離過於中故哀樂之不常其德凡人不能久也故君子為德夭壽不二人向衰暮則尤樂聽聲音蓋留連光景視桑榆之暮景不足則貪於為樂惟鄭衛之音能令人生此意易謂不鼓缶而歌則大耋之嗟凶悲衰暮故為樂不為則復嗟年景之不足也九四突如其來如焚如死如棄如象曰突如其來如無所容也處多懼之地而以乘剛故其來也遽其處也危無所容安如見棄逐皆所麗之失中也三剛而不可乘五正而不見容六五出涕沱若戚嗟若吉象曰六五之吉離王公也言王公之貴人之所附下以剛進已雖憂危終以得衆而吉者柔麗中正也上九王用出征有嘉折首獲匪其醜無咎象曰王用出征以正邦也有嘉折首服而善之也獲匪其醜執訊弗賔示威以正邦而己離道已成然後不附可征張子全書卷九
